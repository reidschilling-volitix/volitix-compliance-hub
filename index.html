    const formatToNotamDMS = (input, isLon = false) => {
      if (!input) return "000000";
      const parts = input.toString().trim().split(/\s+/);
      let decimal = parts.length >= 2 ? Math.abs(parseFloat(parts[0]) || 0) + ((parseFloat(parts[1]) || 0) / 60) + ((parseFloat(parts[2]) || 0) / 3600) : Math.abs(parseFloat(input));
      if (isNaN(decimal)) return "000000";
      const degrees = Math.floor(decimal);
      const minutes = Math.floor((decimal - degrees) * 60);
      const seconds = Math.round((decimal - degrees - (minutes / 60)) * 3600);
      return `${degrees.toString().padStart(isLon ? 3 : 2, '0')}${minutes.toString().padStart(2, '0')}${seconds.toString().padStart(2, '0')}`;
    };

    const getDistanceMiles = (lat1, lon1, lat2, lon2) => {
      if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
      const R = 3958.8; 
      const dLat = (lat2 - lat1) * (Math.PI / 180);
      const dLon = (lon2 - lon1) * (Math.PI / 180);
      const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c; 
    };

    // ============================================================================

    const LeafletMap = ({ lat, lon, kmlData, jobs = [], selectedJob = null }) => {
      const mapContainerRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const featureGroupRef = useRef(null);

      useEffect(() => {
        if (!mapContainerRef.current) return;
        
        if (!mapInstanceRef.current) {
           mapInstanceRef.current = window.L.map(mapContainerRef.current, { zoomControl: false }).setView([lat || 39.82, lon || -98.57], lat ? 15 : 4);
           window.L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, attribution: 'Tiles &copy; Google' }).addTo(mapInstanceRef.current);
           featureGroupRef.current = window.L.featureGroup().addTo(mapInstanceRef.current);
        }

        const map = mapInstanceRef.current;
        const fg = featureGroupRef.current;
        fg.clearLayers();

        let hasLayers = false;

        const itemsToPlot = jobs.length > 0 ? jobs : [];
        if (jobs.length === 0 && (lat || kmlData)) itemsToPlot.push({ finalLat: lat, finalLon: lon, kmlData, id: 'single' });

        itemsToPlot.forEach(job => {
           const isSelected = selectedJob ? selectedJob.id === job.id : true;
           const color = isSelected ? '#9cd33b' : '#3b82f6'; 
           
           if (job.finalLat && job.finalLon && !isNaN(job.finalLat) && !isNaN(job.finalLon)) {
               const marker = window.L.marker([job.finalLat, job.finalLon]);
               if (job.title || job.customer) marker.bindPopup(`<b>${job.title || job.customer}</b>`);
               fg.addLayer(marker);
               hasLayers = true;
           }

           if (job.kmlData && window.omnivore) {
               try {
                   const customStyle = window.L.geoJson(null, { style: function() { return { color: color, weight: isSelected ? 4 : 2, opacity: 1, fillColor: color, fillOpacity: isSelected ? 0.4 : 0.1 }; } });
                   const runLayer = window.omnivore.kml.parse(job.kmlData, null, customStyle);
                   fg.addLayer(runLayer);
                   hasLayers = true;
               } catch(e) {}
           }
        });

        if (hasLayers) setTimeout(() => { if (fg.getBounds().isValid()) map.fitBounds(fg.getBounds(), { padding: [20, 20], maxZoom: 16 }); }, 100);
      }, [lat, lon, kmlData, jobs, selectedJob]);

      return <div ref={mapContainerRef} className="w-full h-full rounded-[2.5rem] overflow-hidden bg-slate-900 border border-slate-800" style={{minHeight: '300px', zIndex: 1}} />;
    };

    const GeoAndKmlInput = ({ state, setState, kmlRef, handleKml, notify }) => {
      const [pasteVal, setPasteVal] = useState('');
      const [parsedSuccess, setParsedSuccess] = useState(false);
      const [isDragging, setIsDragging] = useState(false);

      const handlePaste = (e) => {
         const val = e.target.value; setPasteVal(val); const str = val.trim().toUpperCase();
         const dmsRegex = /(\d+)[^\d]+(\d+)[^\d]+([\d.]+)[^\dNS]*([NS])[^\d]*(\d+)[^\d]+(\d+)[^\d]+([\d.]+)[^\dEW]*([EW])/;
         const dmsMatch = str.match(dmsRegex);
         if (dmsMatch) {
             const latDecVal = (parseInt(dmsMatch[1]) + parseInt(dmsMatch[2])/60 + parseFloat(dmsMatch[3])/3600).toFixed(6);
             const lonDecVal = (parseInt(dmsMatch[5]) + parseInt(dmsMatch[6])/60 + parseFloat(dmsMatch[7])/3600).toFixed(6);
             setState(prev => ({ ...prev, coordType: 'DMS', latDMS: { d: dmsMatch[1], m: dmsMatch[2], s: dmsMatch[3], dir: dmsMatch[4] }, lonDMS: { d: dmsMatch[5], m: dmsMatch[6], s: dmsMatch[7], dir: dmsMatch[8] }, latDec: latDecVal, latDecDir: dmsMatch[4], lonDec: lonDecVal, lonDecDir: dmsMatch[8] }));
             setParsedSuccess(true); setTimeout(() => setParsedSuccess(false), 3000); return;
         }
         const decRegex = /([+-]?\d+\.\d+)[,\s]+([+-]?\d+\.\d+)/;
         const decMatch = str.match(decRegex);
         if (decMatch) {
             const lat = parseFloat(decMatch[1]); const lon = parseFloat(decMatch[2]);
             const decToDms = (deg, isLon) => { const abs = Math.abs(deg); const d = Math.floor(abs); const m = Math.floor((abs - d) * 60); const s = ((abs - d - m / 60) * 3600).toFixed(2); const dir = isLon ? (deg >= 0 ? 'E' : 'W') : (deg >= 0 ? 'N' : 'S'); return { d: d.toString(), m: m.toString(), s: s.toString(), dir }; };
             setState(prev => ({ ...prev, coordType: 'Decimal', latDec: Math.abs(lat).toFixed(6), latDecDir: lat >= 0 ? 'N' : 'S', lonDec: Math.abs(lon).toFixed(6), lonDecDir: lon >= 0 ? 'E' : 'W', latDMS: decToDms(lat, false), lonDMS: decToDms(lon, true) }));
             setParsedSuccess(true); setTimeout(() => setParsedSuccess(false), 3000);
         }
      };

      return (
        <div className="bg-slate-950 p-8 rounded-3xl border border-slate-800 space-y-6 min-w-0 md:col-span-2">
          <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 border-b border-slate-800 pb-4 min-w-0">
            <span className="text-[10px] font-black uppercase text-[#9cd33b] tracking-widest truncate">Geolocation</span>
            <select className={`${tw.input} w-full sm:w-auto truncate`} value={state.coordType} onChange={e => setState({...state, coordType: e.target.value})}>
              <option value="Decimal">Decimal Degrees</option><option value="DMS">DMS (Deg/Min/Sec)</option>
            </select>
          </div>
          
          <div className="space-y-2 min-w-0">
             <label className={tw.label}>Quick Paste (Google Earth / Decimals)</label>
             <input type="text" placeholder="e.g. 38°31'49.64&quot;N 90°14'13.92&quot;W" className={tw.input} value={pasteVal} onChange={handlePaste} />
             {parsedSuccess && <p className="text-[9px] text-[#9cd33b] font-black uppercase tracking-widest pl-1 animate-fade-in mt-2">Parsed successfully!</p>}
          </div>

          {state.coordType === 'Decimal' ? (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 min-w-0">
               <div className="space-y-2 min-w-0">
                  <label className={tw.label}>Latitude</label>
                  <div className="flex gap-2">
                     <input type="number" step="any" className={tw.input} value={state.latDec || ''} onChange={e => setState({...state, latDec: e.target.value})}/>
                     <select className={`${tw.input} w-auto`} value={state.latDecDir || 'N'} onChange={e => setState({...state, latDecDir: e.target.value})}><option value="N">N</option><option value="S">S</option></select>
                  </div>
               </div>
               <div className="space-y-2 min-w-0">
                  <label className={tw.label}>Longitude</label>
                  <div className="flex gap-2">
                     <input type="number" step="any" className={tw.input} value={state.lonDec || ''} onChange={e => setState({...state, lonDec: e.target.value})}/>
                     <select className={`${tw.input} w-auto`} value={state.lonDecDir || 'W'} onChange={e => setState({...state, lonDecDir: e.target.value})}><option value="W">W</option><option value="E">E</option></select>
                  </div>
               </div>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 min-w-0">
               <div className="space-y-2 min-w-0">
                  <label className={tw.label}>Latitude (D/M/S)</label>
                  <div className="grid grid-cols-4 gap-2">
                     <input type="number" className={`${tw.input} text-center`} placeholder="Deg" value={state.latDMS?.d || ''} onChange={e => setState({...state, latDMS: {...state.latDMS, d: e.target.value}})}/>
                     <input type="number" className={`${tw.input} text-center`} placeholder="Min" value={state.latDMS?.m || ''} onChange={e => setState({...state, latDMS: {...state.latDMS, m: e.target.value}})}/>
                     <input type="number" className={`${tw.input} text-center`} placeholder="Sec" value={state.latDMS?.s || ''} onChange={e => setState({...state, latDMS: {...state.latDMS, s: e.target.value}})}/>
                     <select className={`${tw.input} text-center font-bold`} value={state.latDMS?.dir || 'N'} onChange={e => setState({...state, latDMS: {...state.latDMS, dir: e.target.value}})}><option>N</option><option>S</option></select>
                  </div>
               </div>
               <div className="space-y-2 min-w-0">
                  <label className={tw.label}>Longitude (D/M/S)</label>
                  <div className="grid grid-cols-4 gap-2">
                     <input type="number" className={`${tw.input} text-center`} placeholder="Deg" value={state.lonDMS?.d || ''} onChange={e => setState({...state, lonDMS: {...state.lonDMS, d: e.target.value}})}/>
                     <input type="number" className={`${tw.input} text-center`} placeholder="Min" value={state.lonDMS?.m || ''} onChange={e => setState({...state, lonDMS: {...state.lonDMS, m: e.target.value}})}/>
                     <input type="number" className={`${tw.input} text-center`} placeholder="Sec" value={state.lonDMS?.s || ''} onChange={e => setState({...state, lonDMS: {...state.lonDMS, s: e.target.value}})}/>
                     <select className={`${tw.input} text-center font-bold`} value={state.lonDMS?.dir || 'W'} onChange={e => setState({...state, lonDMS: {...state.lonDMS, dir: e.target.value}})}><option>W</option><option>E</option></select>
                  </div>
               </div>
            </div>
          )}

          {kmlRef && handleKml && (
             <div className="pt-4 border-t border-slate-800 min-w-0">
                <label className={`${tw.label} mb-2 flex items-center gap-1`}><Paperclip size={10} className="shrink-0"/> Field Boundary Configuration</label>
                <div 
                   className={`flex flex-col sm:flex-row gap-4 min-w-0 mt-2 p-4 rounded-[2rem] border-2 border-dashed transition-all duration-300 ${isDragging ? 'border-[#9cd33b] bg-[#9cd33b]/10 scale-[1.02]' : 'border-transparent bg-slate-900/30'}`}
                   onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                   onDragLeave={(e) => { e.preventDefault(); setIsDragging(false); }}
                   onDrop={(e) => {
                      e.preventDefault();
                      setIsDragging(false);
                      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                         const file = e.dataTransfer.files[0];
                         if (file.name.toLowerCase().endsWith('.kml')) {
                            handleKml({ target: { files: [file] } });
                         } else if (notify) {
                            notify("Please drop a valid .KML file", "error");
                         }
                      }
                   }}
                >
                   <div className="flex-1 flex gap-2">
                      <a href="https://earth.google.com/web/" target="_blank" rel="noopener noreferrer" className={`${tw.input} flex-1 bg-blue-500/10 text-blue-400 border-blue-500/30 text-[10px] font-black uppercase flex justify-center items-center gap-2 hover:bg-blue-500/20 transition-colors no-underline`}>
                        <Globe size={16}/> Open Google Earth
                      </a>
                   </div>
                   <div className="flex items-center text-[9px] text-slate-500 font-black uppercase tracking-widest shrink-0">OR</div>
                   <div className="flex-1 flex gap-2">
                      <button type="button" onClick={() => kmlRef.current?.click()} className={`${tw.input} flex-1 text-[10px] font-black uppercase text-center truncate ${isDragging ? 'ring-2 ring-[#9cd33b]' : ''}`}>{state.kmlFileName || 'Drop / Upload KML File'}</button>
                      {state.kmlFileName && <Button variant="danger" className="shrink-0" onClick={() => { setState({...state, kmlData: null, kmlFileName: ''}); if(kmlRef.current) kmlRef.current.value=""; }}><X size={16}/></Button>}
                      <input type="file" accept=".kml" ref={kmlRef} className="hidden" onChange={handleKml}/>
                   </div>
                </div>
             </div>
          )}
        </div>
      );
    };

         e.preventDefault();

         try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'saas_users', customUser.id), { password: newPassword });

    const ScheduleTab = ({ workOrders, isEditing, state, setState, onCancel, onSubmit, customers, products, fleet, customUser, handleDrop, handleDropToBacklog, getStatusColor, deleteItem, notify, onLogMission }) => {
      const [viewMode, setViewMode] = useState('calendar');
      const [calendarBaseDate, setCalendarBaseDate] = useState(new Date());
      const [inlineCustomer, setInlineCustomer] = useState(false);
      const [newCustData, setNewCustData] = useState(defaultCustomerState);
      const [inlineProduct, setInlineProduct] = useState(false);
      const [newProdData, setNewProdData] = useState(defaultProductState);
      const [selectedMapJob, setSelectedMapJob] = useState(null);
      const kmlRef = useRef(null);

      const calculateEstimate = (acresStr, aircraftArr, kml, appRateStr) => {
         const acres = parseFloat(acresStr) || 0;
         if (!acres || !aircraftArr || aircraftArr.length === 0) return { min: state.estHoursMin, max: state.estHoursMax };
         
         let totalAcresPerHour = 0;
         aircraftArr.forEach(droneId => {
             const droneObj = fleet.find(f => f.id === droneId);
             let rate = droneObj?.sprayRate ? parseFloat(droneObj.sprayRate) : 30; 
             totalAcresPerHour += rate;
         });
         if (totalAcresPerHour === 0) totalAcresPerHour = 30;
         
         const gpa = parseFloat(appRateStr) || 2; 
         const gpaMultiplier = Math.max(0.5, 1 + ((gpa - 2) * 0.2));
         
         let baseHours = (acres / totalAcresPerHour) * gpaMultiplier;
         baseHours += 0.3; 
         
         let hazardMultiplier = 1.0;
         let hazardCount = 0;
         if (kml) {
             const kmlLower = kml.toLowerCase();
             if (kmlLower.includes('power') || kmlLower.includes('line')) { hazardMultiplier += 0.2; hazardCount++; }
             if (kmlLower.includes('tree') || kmlLower.includes('obstacle') || kmlLower.includes('house')) { hazardMultiplier += 0.15; hazardCount++; }
             const coordMatches = (kml.match(/<coordinates>/g) || []).length;
             if (coordMatches > 2) { hazardMultiplier += 0.15; hazardCount++; } 
             if (hazardCount === 0) hazardMultiplier += 0.1; 
         }
         
         const adjustedHours = baseHours * hazardMultiplier;
         const minHrs = Math.max(0.2, (adjustedHours * 0.9)).toFixed(1);
         const maxHrs = Math.max(0.3, (adjustedHours * 1.25)).toFixed(1);
         return { min: minHrs, max: maxHrs };
      };

      const handleKml = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const kmlStr = ev.target.result;
            const est = calculateEstimate(state.acres, state.selectedAircraft, kmlStr, state.appRate);
            setState(prev => ({ ...prev, kmlData: kmlStr, kmlFileName: file.name, estHoursMin: est.min, estHoursMax: est.max }));
        };
        reader.readAsText(file);
      };

      const weekDays = Array.from({length: 7}).map((_, i) => { 
        const start = new Date(calendarBaseDate);
        start.setDate(calendarBaseDate.getDate() - calendarBaseDate.getDay());
        const d = new Date(start); d.setDate(start.getDate() + i); return d; 
      });
      
      const scheduleStats = useMemo(() => {
         const endOfWeek = new Date(weekDays[0]); endOfWeek.setDate(weekDays[0].getDate() + 6);
         return {
            unscheduled: workOrders.filter(w => !w.isScheduled && w.status !== 'Scheduled' && w.status !== 'Completed').length,
            unscheduledJobs: workOrders.filter(w => !w.isScheduled && w.status !== 'Scheduled' && w.status !== 'Completed'),
            thisWeekCount: workOrders.filter(w => w.isScheduled && new Date(w.date) >= weekDays[0] && new Date(w.date) <= endOfWeek).length,
            activeCount: workOrders.filter(w => w.status === 'Scheduled' || w.status === 'In Progress').length,
            schedAcres: workOrders.filter(w => w.status === 'Scheduled' || w.status === 'In Progress').reduce((a, w) => a + (parseFloat(w.acres)||0), 0),
            compAcres: workOrders.filter(w => w.status === 'Completed').reduce((a, w) => a + (parseFloat(w.acres)||0), 0)
         };
      }, [workOrders, weekDays]);

      const formatMonthDay = (date) => date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const calendarDateRange = `${formatMonthDay(weekDays[0])} - ${formatMonthDay(weekDays[6])}, ${weekDays[6].getFullYear()}`;

      if (isEditing) {
        return (
          <FormCard title={state.id ? "Edit Work Order" : "Create Work Order"} icon={CalendarDays} onSubmit={(e) => onSubmit(e, inlineCustomer ? newCustData : null, inlineProduct ? newProdData : null)} onCancel={onCancel} submitLabel={state.status === 'Completed' ? "Save & Log Mission" : "Save Schedule"}>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 min-w-0">
              <Input label="Job Title" value={state.title} onChange={e => setState({...state, title: e.target.value})} required placeholder="e.g. Field 1 Spray"/>
              <div className="flex flex-col gap-2 min-w-0">
                 <Select label="Customer" value={inlineCustomer ? 'ADD_NEW' : state.customer} onChange={e => { if(e.target.value === 'ADD_NEW') setInlineCustomer(true); else { setInlineCustomer(false); setState({...state, customer: e.target.value}); } }} required>
                   <option className="bg-slate-900" value="">Select Customer...</option>
                   {customers.map(c => <option className="bg-slate-900" key={c.id} value={c.name}>{String(c.name)}</option>)}
                   <option className="bg-slate-800 text-[#9cd33b]" value="ADD_NEW">+ Create New Customer</option>
                 </Select>
                 {inlineCustomer && <InlineCustomerForm data={newCustData} setData={setNewCustData} onClose={() => setInlineCustomer(false)} />}
              </div>
              
              <Input type="date" label="Scheduled Date (Optional)" value={state.date} onChange={e => {
                  const newDate = e.target.value;
                  let newStatus = state.status;
                  if (newDate && (!newStatus || newStatus === 'Pending')) newStatus = 'Scheduled';
                  if (!newDate) newStatus = 'Pending';
                  setState({...state, date: newDate, status: newStatus, isScheduled: !!newDate});
              }} />
              
              <div className="space-y-2 lg:col-span-2 min-w-0">
                 <label className={tw.label}>Assign Aircraft (Auto-calculates ETA)</label>
                 <div className="flex flex-wrap gap-2">
                    {fleet.map((d, i) => { 
                       const droneId = d.id || `Unknown-${i}`; 
                       return (
                          <button key={i} type="button" onClick={() => { 
                             const cur = state.selectedAircraft || []; 
                             const next = cur.includes(droneId) ? cur.filter(a=>a!==droneId) : [...cur, droneId]; 
                             const est = calculateEstimate(state.acres, next, state.kmlData, state.appRate);
                             setState({...state, selectedAircraft: next, estHoursMin: est.min, estHoursMax: est.max}); 
                          }} className={`px-4 py-3 rounded-xl border text-[10px] font-black uppercase tracking-widest transition-all truncate max-w-full ${(state.selectedAircraft || []).includes(droneId) ? 'bg-[#9cd33b] text-[#020617] border-[#9cd33b] shadow-lg' : 'bg-slate-950 border-slate-800 text-slate-500 hover:border-[#9cd33b]/50'}`}>
                             {String(droneId)}
                          </button>
                       ); 
                    })}
                 </div>
              </div>

              <Input type="number" label="Acreage" value={state.acres} onChange={e => {
                  const val = e.target.value;
                  const est = calculateEstimate(val, state.selectedAircraft, state.kmlData, state.appRate);
                  setState({...state, acres: val, estHoursMin: est.min, estHoursMax: est.max});
              }} required/>
              
              <Input label="App Vol. (GPA)" type="number" step="any" value={state.appRate || ''} onChange={e => {
                  const val = e.target.value;
                  const est = calculateEstimate(state.acres, state.selectedAircraft, state.kmlData, val);
                  setState({...state, appRate: val, estHoursMin: est.min, estHoursMax: est.max});
              }} rightElement={<span className="text-[9px] text-slate-500 font-black">GPA</span>} />
              
              <div className="space-y-2 min-w-0">
                 <label className={tw.label}>Est. Time Range (Hrs)</label>
                 <div className="flex gap-2">
                   <input type="number" step="any" placeholder="Min" className={tw.input} value={state.estHoursMin} onChange={e => setState({...state, estHoursMin: e.target.value})}/>
                   <input type="number" step="any" placeholder="Max" className={tw.input} value={state.estHoursMax} onChange={e => setState({...state, estHoursMax: e.target.value})}/>
                 </div>
              </div>
              
              <div className="flex flex-col gap-2 min-w-0 md:col-span-2">
                 <Select label="Chemical / Product" value={inlineProduct ? 'ADD_NEW' : (state.chemical || '')} onChange={e => { if(e.target.value === 'ADD_NEW') setInlineProduct(true); else { setInlineProduct(false); setState({...state, chemical: e.target.value}); } }} required>
                    <option className="bg-slate-900" value="" disabled>Select Product...</option>
                    {products.map(p => <option className="bg-slate-900" key={p.id} value={p.name}>{String(p.name)}</option>)}
                    <option className="bg-slate-800 text-[#9cd33b]" value="ADD_NEW">+ Create New Product</option>
                 </Select>
                 {inlineProduct && <InlineProductForm data={newProdData} setData={setNewProdData} onClose={() => setInlineProduct(false)} />}
              </div>
            </div>
            
            <GeoAndKmlInput notify={notify} state={state} setState={setState} kmlRef={kmlRef} handleKml={handleKml} />
            
            <Select label="Job Status" value={state.status} onChange={e => setState({...state, status: e.target.value})}>
              <option className="bg-slate-900" value="Pending">Pending Dispatch</option>
              <option className="bg-slate-900" value="Scheduled">Scheduled</option>
              <option className="bg-slate-900" value="In Progress">In Progress</option>
              <option className="bg-slate-900" value="Paused">Paused (Weather Hold)</option>
              <option className="bg-slate-900" value="Completed">Completed</option>
              <option className="bg-slate-900" value="Cancelled">Cancelled</option>
            </Select>
          </FormCard>
        );
      }

      return (
        <div className="space-y-6 animate-fade-in min-w-0 h-full flex flex-col">
           <div className="flex flex-col md:flex-row md:items-start justify-between gap-4 min-w-0 shrink-0">
             <div className="min-w-0">
               <h2 className="text-3xl font-black uppercase tracking-tighter text-white flex items-center gap-3 truncate"><CalendarDays className="text-[#9cd33b] shrink-0"/> Operations</h2>
               <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-2 truncate">Manage your schedule</p>
             </div>
             <div className="flex flex-wrap gap-4 shrink-0">
               <div className="flex bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-sm p-1">
                 <button onClick={() => setViewMode('calendar')} className={`px-4 py-2 rounded-xl transition-all flex items-center gap-2 text-xs font-black uppercase tracking-widest ${viewMode === 'calendar' ? 'bg-slate-800 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}><LayoutTemplate size={14}/> Calendar</button>
                 <button onClick={() => setViewMode('map')} className={`px-4 py-2 rounded-xl transition-all flex items-center gap-2 text-xs font-black uppercase tracking-widest ${viewMode === 'map' ? 'bg-slate-800 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}><MapIcon size={14}/> Map</button>
               </div>
               <Button onClick={() => setState({...defaultWorkOrderState, isEditing: true})}><Plus size={16}/> New Order</Button>

                       <div className="flex gap-2 shrink-0">

                    <Button variant="secondary" onClick={() => setCalendarBaseDate(new Date())} className="shrink-0 text-[9px] py-2 px-3">Today</Button>

                  <div className="flex-1 grid grid-cols-7 divide-x divide-slate-800 overflow-x-auto min-w-[600px]">
                    {weekDays.map((date, idx) => {
                      const isToday = date.toDateString() === new Date().toDateString();

                             <p className="text-xl font-black">{date.getDate()}</p>
                          </div>
                          <div className="flex-1 p-2 space-y-2 overflow-y-auto">
                            {dayJobs.map(job => (
                              <div key={job.id} draggable onDragStart={(e) => e.dataTransfer.setData('text/plain', job.id)} onClick={() => setState({...job, isEditing: true})} className={`p-2 lg:p-3 rounded-xl text-[9px] lg:text-[10px] shadow-sm border cursor-grab active:cursor-grabbing hover:opacity-80 transition-opacity min-w-0 ${getStatusColor(job.status)}`}>
                                 <div className="flex justify-between items-start">

                                    <button onClick={(e) => { e.stopPropagation(); onLogMission(job); }} title="Log Mission" className={`${getStatusColor(job.status).includes('bg-[#9cd33b]/10') ? 'text-[#9cd33b] hover:text-white' : 'text-white hover:text-[#9cd33b]'} shrink-0 transition-colors`}><ClipboardCheck size={12}/></button>

                            ))}
                            <div onClick={() => setState({...defaultWorkOrderState, date: strDate, isScheduled: true, isEditing: true})} className="w-full h-8 lg:h-10 border border-dashed border-slate-700 rounded-xl flex items-center justify-center text-slate-600 hover:border-slate-500 cursor-pointer transition-colors mt-2">
                               <span className="text-[9px] lg:text-[10px] font-black uppercase tracking-widest flex items-center gap-1"><Plus size={10}/> Add</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}

               </div>

               {/* BACKLOG GOES ON BOTTOM IN A GRID VIEW */}
               <div 
                 className="w-full bg-slate-900 border border-slate-800 rounded-[2.5rem] flex flex-col shadow-xl overflow-hidden shrink-0 max-h-[400px]"
                 onDragOver={e => e.preventDefault()}

               >

                     <span className="text-xs font-black uppercase tracking-widest text-slate-200 flex items-center gap-2 truncate"><Clock size={14} className="text-amber-500 shrink-0"/> Backlog (Unscheduled Orders)</span>
                  </div>
                  <div className="p-3 border-b border-slate-800 bg-amber-500/5 min-w-0">
                     <p className="text-[9px] text-amber-500/80 font-black uppercase tracking-widest text-center truncate">Drag jobs to calendar to schedule</p>
                  </div>
                  <div className="flex-1 p-4 overflow-y-auto">
                    {scheduleStats.unscheduledJobs.length === 0 ? (
                      <div className="flex flex-col items-center justify-center h-full text-slate-600 py-8"><Clock size={32} className="mb-4 opacity-20"/><p className="text-[10px] font-black uppercase tracking-widest text-center px-4">All Caught Up</p></div>
                    ) : (
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        {scheduleStats.unscheduledJobs.map(job => (

                            <div className="flex justify-between items-start mb-2 gap-2 min-w-0">
                               <span className="text-[10px] font-black text-slate-200 uppercase truncate block">{String(job.title || job.customer)}</span>
                               <GripVertical size={14} className="text-slate-600 shrink-0"/>

                            <p className="text-xs font-bold text-slate-400 truncate">{String(job.customer)}</p>

                            <div className="flex justify-end gap-2 mt-2">
                               <button onClick={(e) => { e.stopPropagation(); onLogMission(job); }} title="Log Mission" className="text-[#9cd33b] hover:text-[#bce455] transition-colors"><ClipboardCheck size={12}/></button>
                               <button onClick={(e) => { e.stopPropagation(); setState({...job, isEditing: true}); }} className={tw.actionBtnEdit}><Edit3 size={12}/></button>
                               <button onClick={(e) => { e.stopPropagation(); deleteItem('work_orders', job.id); }} className={tw.actionBtnDel}><Trash2 size={12}/></button>
                            </div>

                    )}

               </div>
             </div>
           ) : (
             <div className="flex flex-col lg:flex-row gap-6 h-[calc(100vh-12rem)] min-h-[500px] min-w-0">
                <div className="w-full lg:w-80 bg-slate-900 border border-slate-800 rounded-[3rem] flex flex-col shadow-xl shrink-0 h-full overflow-hidden">
                  <div className="p-6 border-b border-slate-800 bg-slate-900/50 min-w-0 shrink-0">
                     <h3 className="font-black uppercase tracking-widest text-slate-100 text-xs truncate">Mapped Locations</h3>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 space-y-3 min-h-0">
                     {workOrders.filter(w => w.finalLat && w.finalLon).map(job => (
                       <div key={job.id} onClick={() => setSelectedMapJob(job)} className={`p-5 rounded-2xl cursor-pointer transition-colors border shadow-sm min-w-0 ${selectedMapJob?.id === job.id ? 'bg-slate-800 border-[#9cd33b]' : 'bg-slate-950 border-slate-800 hover:border-slate-700'}`}>
                          <div className="flex justify-between items-start mb-2 gap-2 min-w-0">
                             <p className="text-[11px] font-black text-slate-200 uppercase truncate block">{String(job.title || job.customer)}</p>
                             <button onClick={(e) => { e.stopPropagation(); setState({...job, isEditing: true}); }} className={tw.actionBtnEdit}><Edit3 size={14}/></button>
                          </div>
                          <p className="text-[9px] text-slate-500 font-mono mt-1 bg-slate-900 p-2 rounded-lg inline-block truncate max-w-full">{String(job.finalLat)}, {String(job.finalLon)}</p>
                          <p className="text-[10px] text-slate-400 font-bold uppercase mt-3 tracking-widest truncate">{String(job.date || 'Backlog')} | {String(job.acres)} AC {job.appRate ? `| ${job.appRate} GPA` : ''}</p>
                       </div>
                     ))}
                     {workOrders.filter(w => w.finalLat && w.finalLon).length === 0 && <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest text-center mt-10">No mapped work orders</p>}
                  </div>
                </div>
                <div className="flex-1 bg-slate-950 border border-slate-800 shadow-xl rounded-[3rem] relative min-w-0 p-2 h-full overflow-hidden z-10 flex flex-col">
                  {selectedMapJob ? (
                     <LeafletMap lat={selectedMapJob.finalLat} lon={selectedMapJob.finalLon} kmlData={selectedMapJob.kmlData} />
                  ) : (
                     <div className="flex h-full items-center justify-center text-slate-600 border border-slate-800/50 rounded-[2.5rem] bg-slate-950/50"><div className="text-center px-4"><MapPin size={48} className="mx-auto mb-4 opacity-50"/><p className="text-[11px] font-black uppercase tracking-widest mt-4">Select a job to view map</p></div></div>

    };

    const WeatherRoutingTab = ({ workOrders, notify }) => {
      const [targetDate, setTargetDate] = useState(new Date().toLocaleDateString('en-CA'));
      const [startTime, setStartTime] = useState('08:00');
      const [routeData, setRouteData] = useState([]);
      const [isLoading, setIsLoading] = useState(false);

      const dayJobs = useMemo(() => {
        return workOrders.filter(w => w.date === targetDate && w.status === 'Scheduled' && w.finalLat);
      }, [workOrders, targetDate]);

      const [orderedJobs, setOrderedJobs] = useState([]);

      useEffect(() => {
        setOrderedJobs(dayJobs);
        setRouteData([]);
      }, [dayJobs]);

      const moveJob = (index, dir) => {
        const newJobs = [...orderedJobs];
        if (dir === 'up' && index > 0) {
          [newJobs[index], newJobs[index - 1]] = [newJobs[index - 1], newJobs[index]];
        } else if (dir === 'down' && index < newJobs.length - 1) {
          [newJobs[index], newJobs[index + 1]] = [newJobs[index + 1], newJobs[index]];
        }
        setOrderedJobs(newJobs);
        setRouteData([]); 
      };

      const updateJobHours = (id, field, value) => {
        setOrderedJobs(jobs => jobs.map(j => j.id === id ? { ...j, [field]: value } : j));
        setRouteData([]); 
      };

      const calculateRouteWeather = async () => {
        if (orderedJobs.length === 0) return notify("No mapped jobs scheduled for this date.", "error");
        setIsLoading(true);
        notify("Pinging weather satellites for route...", "info");

        try {
          const newRouteData = [];
          
          const startDt = new Date();
          const [hours, minutes] = startTime.split(':');
          startDt.setHours(parseInt(hours, 10), parseInt(minutes, 10), 0, 0);

          let currentMinTime = startDt.getTime();
          let currentMaxTime = startDt.getTime();

          for (let i = 0; i < orderedJobs.length; i++) {
            const job = orderedJobs[i];
            const lat = parseFloat(job.finalLat) || 39.82;
            const lon = parseFloat(job.finalLon) || -98.57;

            let transitData = null;
            if (i > 0) {
               const prevJob = orderedJobs[i-1];
               const pLat = parseFloat(prevJob.finalLat) || 39.82;
               const pLon = parseFloat(prevJob.finalLon) || -98.57;
               const distMiles = getDistanceMiles(pLat, pLon, lat, lon);

               const driveHours = (distMiles / 45); // Assuming 45 mph avg speed
               const transitHours = driveHours + 0.25; // add 15 mins for pack/unpack

               currentMinTime += (transitHours * 60 * 60 * 1000);
               currentMaxTime += (transitHours * 60 * 60 * 1000);

               transitData = { miles: distMiles.toFixed(1), driveMins: Math.round(driveHours * 60) };
            }
            
            const avgEtaTime = (currentMinTime + currentMaxTime) / 2;
            const avgDt = new Date(avgEtaTime);
            const etaHour = avgDt.getHours();
            
            const minEtaStr = new Date(currentMinTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const maxEtaStr = new Date(currentMaxTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const etaString = i === 0 ? minEtaStr : `${minEtaStr} - ${maxEtaStr}`;

            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&start_date=${targetDate}&end_date=${targetDate}&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`);
            const data = await res.json();
            
            if (data.hourly && data.hourly.temperature_2m[etaHour] !== undefined) {
              const dirs = ['N','NE','E','SE','S','SW','W','NW'];
              let wd = data.hourly.wind_direction_10m[etaHour];
              const dirIdx = Math.round(((wd %= 360) < 0 ? wd + 360 : wd) / 45) % 8;

              newRouteData.push({
                job,
                eta: etaString,
                temp: data.hourly.temperature_2m[etaHour],
                humidity: data.hourly.relative_humidity_2m[etaHour],
                windSpeed: data.hourly.wind_speed_10m[etaHour],
                windDir: dirs[dirIdx],
                transit: transitData
              });
            } else {
              newRouteData.push({ job, eta: etaString, transit: transitData, error: "Forecast unavailable for this hour" });
            }

            const minHrs = parseFloat(job.estHoursMin) || 1;
            const maxHrs = parseFloat(job.estHoursMax) || 1.5;
            
            currentMinTime += (minHrs * 60 * 60 * 1000);
            currentMaxTime += (maxHrs * 60 * 60 * 1000);
          }

          setRouteData(newRouteData);
          notify("Smart Route & Weather Generated", "success");
        } catch(e) {
          notify("Failed to fetch route weather data.", "error");
        }
        setIsLoading(false);
      };

      return (
        <div className="space-y-8 animate-fade-in min-w-0">
          <Card className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 !p-6 border-[#9cd33b]/20">
            <div className="flex items-center gap-5 min-w-0 flex-1">
              <div className="p-4 bg-gradient-to-br from-[#9cd33b]/20 to-[#9cd33b]/5 border border-[#9cd33b]/30 rounded-[1.5rem] text-[#9cd33b] shrink-0 shadow-[0_0_15px_rgba(156,211,59,0.15)]">
                <Cloud size={28} strokeWidth={2.5} />
              </div>
              <div className="min-w-0">
                <h2 className="text-xl font-black uppercase tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-slate-100 to-slate-400 truncate">Smart Weather Routing</h2>
                <p className="text-[10px] text-[#9cd33b] font-black uppercase tracking-widest mt-1 truncate">Predictive Environmental Analysis</p>
              </div>
            </div>
          </Card>

          <Card className="space-y-6">
             <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                <Input type="date" label="Target Date" value={targetDate} onChange={e => setTargetDate(e.target.value)} />
                <Input type="time" label="Daily Start Time" value={startTime} onChange={e => setStartTime(e.target.value)} />
                <Button onClick={calculateRouteWeather} disabled={isLoading || orderedJobs.length === 0} className="w-full h-[54px]">
                  {isLoading ? 'Pinging Satellites...' : 'Generate Route Forecast'}
                </Button>
             </div>
             
             {orderedJobs.length === 0 && (
                <div className="text-center py-12 border-2 border-dashed border-slate-800 rounded-3xl text-slate-500 font-bold uppercase tracking-widest text-[10px]">
                   No scheduled mapped jobs found for {targetDate}.
                </div>
             )}

             {orderedJobs.length > 0 && routeData.length === 0 && (
                <div className="space-y-4 mt-8">
                   <h3 className="text-[#9cd33b] font-black uppercase text-[10px] tracking-widest border-b border-slate-800 pb-2">Set Job Sequence & Estimates</h3>
                   <div className="bg-slate-950 border border-slate-800 rounded-3xl p-2 space-y-2">
                     {orderedJobs.map((job, i) => (
                        <div key={job.id} className="flex flex-col md:flex-row md:justify-between md:items-center gap-4 bg-slate-900 p-4 rounded-2xl border border-slate-800/50">
                           <div className="flex items-center gap-4 min-w-0">
                              <div className="bg-[#9cd33b]/10 text-[#9cd33b] w-8 h-8 rounded-full flex items-center justify-center font-black text-xs shrink-0">{i + 1}</div>
                              <div className="min-w-0">
                                 <p className="text-sm font-black text-slate-200 uppercase truncate">{job.title || job.customer}</p>
                                 <p className="text-[10px] text-slate-500 font-mono mt-1 truncate">{job.acres} AC | {job.chemical}</p>
                              </div>
                           </div>
                           
                           <div className="flex flex-col gap-1 sm:flex-row sm:items-center shrink-0 border-t border-slate-800 md:border-0 pt-3 md:pt-0">
                              <div className="flex items-center gap-2">
                                 <input type="number" step="any" placeholder="Min" className={`${tw.input} w-14 p-2 text-center`} value={job.estHoursMin || ''} onChange={e => updateJobHours(job.id, 'estHoursMin', e.target.value)} title="Min Hours" />
                                 <span className="text-slate-600">-</span>
                                 <input type="number" step="any" placeholder="Max" className={`${tw.input} w-14 p-2 text-center`} value={job.estHoursMax || ''} onChange={e => updateJobHours(job.id, 'estHoursMax', e.target.value)} title="Max Hours" />
                                 <span className="text-[9px] text-slate-500 font-black mr-4 uppercase">Hrs</span>
                              </div>
                              <div className="flex flex-col gap-1 border-l border-slate-800 pl-4">
                                 <button onClick={() => moveJob(i, 'up')} disabled={i === 0} className="p-0.5 text-slate-500 hover:text-white disabled:opacity-20 transition-colors"><ArrowUp size={14}/></button>
                                 <button onClick={() => moveJob(i, 'down')} disabled={i === orderedJobs.length - 1} className="p-0.5 text-slate-500 hover:text-white disabled:opacity-20 transition-colors"><ArrowDown size={14}/></button>
                              </div>
                           </div>
                        </div>
                     ))}
                   </div>
                </div>
             )}

             {routeData.length > 0 && (
                <div className="space-y-2 mt-8 relative">
                   <div className="absolute left-[4.5rem] top-8 bottom-8 w-0.5 bg-slate-800/50 hidden md:block"></div>
                   <h3 className="text-[#9cd33b] font-black uppercase text-[10px] tracking-widest border-b border-slate-800 pb-2 mb-6">Forecasted Timeline</h3>
                   
                   {routeData.map((rd, i) => {
                      const isHighWind = rd.windSpeed > 10;
                      const isHot = rd.temp > 85;

                      return (
                        <React.Fragment key={i}>
                           {rd.transit && (
                              <div className="flex flex-col md:flex-row gap-6 relative z-10 my-2 md:my-4 opacity-80">
                                 <div className="md:w-36 shrink-0 flex justify-center">
                                    <div className="h-8 w-0.5 border-l-2 border-dashed border-slate-700 hidden md:block"></div>
                                 </div>
                                 <div className="flex-1 flex items-center gap-3">
                                    <div className="h-px w-8 bg-slate-700 hidden md:block"></div>
                                    <div className="bg-slate-900 border border-slate-700 px-4 py-2 rounded-full text-[9px] font-black uppercase flex items-center gap-2 shadow-sm text-slate-400">
                                       <Navigation size={12} className="text-blue-400" />
                                       Drive: {rd.transit.miles} mi (~{rd.transit.driveMins} mins)
                                    </div>
                                 </div>
                              </div>
                           )}
                           
                           <div className="flex flex-col md:flex-row gap-6 relative z-10">
                              <div className="md:w-36 shrink-0 flex flex-row md:flex-col items-center md:items-start gap-3">
                                 <div className="bg-slate-900 border border-[#9cd33b]/50 text-[#9cd33b] px-4 py-2 rounded-xl font-black text-xs shadow-lg shadow-[#9cd33b]/10 w-full text-center">
                                    {rd.eta}
                                 </div>
                              </div>
                              
                              <div className="flex-1 bg-slate-900/80 backdrop-blur-md border border-slate-700/50 rounded-[2rem] p-6 shadow-xl flex flex-col md:flex-row md:items-center gap-6">
                                 <div className="flex-1 min-w-0">
                                    <h4 className="text-lg font-black uppercase text-slate-100 truncate">{rd.job.title || rd.job.customer}</h4>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 truncate">{rd.job.customer} | {rd.job.acres} AC</p>
                                 </div>
                                 
                                 {rd.error ? (
                                    <div className="text-red-500 text-xs font-black uppercase flex items-center gap-2 bg-red-500/10 px-4 py-3 rounded-xl border border-red-500/20"><AlertTriangle size={14}/> {rd.error}</div>
                                 ) : (
                                    <div className="flex flex-wrap gap-3 shrink-0">
                                       <div className={`flex items-center gap-2 px-4 py-3 rounded-xl text-xs font-black border ${isHot ? 'bg-red-500/10 text-red-500 border-red-500/30' : 'bg-slate-950 text-slate-300 border-slate-800'}`}>
                                          <Thermometer size={14} className={isHot ? "text-red-500" : "text-amber-500"}/> {rd.temp}°F
                                       </div>
                                       <div className={`flex items-center gap-2 px-4 py-3 rounded-xl text-xs font-black border ${isHighWind ? 'bg-red-500/10 text-red-500 border-red-500/30' : 'bg-slate-950 text-slate-300 border-slate-800'}`}>
                                          <Wind size={14} className={isHighWind ? "text-red-500" : "text-blue-400"}/> {rd.windSpeed} mph {rd.windDir}
                                       </div>
                                       <div className="flex items-center gap-2 px-4 py-3 rounded-xl text-xs font-black bg-slate-950 border border-slate-800 text-slate-300">
                                          <Droplets size={14} className="text-blue-400"/> {rd.humidity}%
                                       </div>
                                    </div>
                                 )}
                              </div>
                           </div>
                        </React.Fragment>
                      );
                   })}
                </div>
             )}
          </Card>
        </div>
      );
    };

    const CustomersTab = ({ items, logs, isEditing, state, setState, onCancel, onSubmit, onDelete, notify, companyPilots, customUser }) => {
      const handleExportQuickBooks = () => {
        if (items.length === 0) return notify("No customers to export.", "error");
        if (!logs || logs.length === 0) return notify("No flight logs available to bill.", "error");
        
        const headers = ['InvoiceNo', 'Customer', 'InvoiceDate', 'DueDate', 'ServiceDate', 'Item(Product/Service)', 'ItemDescription', 'ItemQuantity'];
        const csvRows = [headers.join(',')];
        const today = new Date();
        const invDate = today.toLocaleDateString('en-US'); 
        today.setDate(today.getDate() + 30); 
        const dueDate = today.toLocaleDateString('en-US');
        
        let billedItemsCount = 0;

        items.forEach(c => {
          const customerLogs = logs.filter(l => l.customer === c.name);
          if (customerLogs.length > 0) {
            const invoiceNo = `INV-${c.name.substring(0,3).toUpperCase()}-${Math.floor(1000 + Math.random() * 9000)}`;
            customerLogs.forEach(log => {
              const escapeCSV = (str) => `"${String(str || '').replace(/"/g, '""')}"`;
              const acres = parseFloat(log.treatedAcreage) || parseFloat(log.totalAcreage) || 0;
              const crop = log.whatWasTreated === 'ADD_NEW' ? log.customCrop : log.whatWasTreated;
              const desc = `Flight on ${log.date} at ${log.locationName || 'N/A'} - Crop: ${crop || 'N/A'} - Chemical: ${log.chemical || 'N/A'}`;
              
              csvRows.push([ escapeCSV(invoiceNo), escapeCSV(c.name), escapeCSV(invDate), escapeCSV(dueDate), escapeCSV(log.date), escapeCSV('Aerial Application'), escapeCSV(desc), escapeCSV(acres) ].join(','));
              billedItemsCount++;
            });
          }
        });
        
        if (billedItemsCount === 0) {
           return notify("None of your customers have completed flight logs to bill.", "error");
        }
        
        const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `QuickBooks_Invoices_${new Date().toISOString().slice(0,10)}.csv`;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        notify(`Exported ${billedItemsCount} billable flights!`, "success");
      };

      if (isEditing) {
        return (
          <FormCard title={state.id ? 'Edit Customer' : 'New Customer Profile'} icon={Users} onSubmit={onSubmit} onCancel={onCancel}>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <Input label="Company/Farm Name" value={state.name} onChange={e => setState({...state, name: e.target.value})} required/>
              <Input label="Contact Name" value={state.contactName} onChange={e => setState({...state, contactName: e.target.value})}/>
              <Input label="Email" type="email" value={state.email} onChange={e => setState({...state, email: e.target.value})}/>
              <Input label="Phone" value={state.phone} onChange={e => setState({...state, phone: e.target.value})}/>
              <div className="md:col-span-2"><Input label="Address" value={state.address} onChange={e => setState({...state, address: e.target.value})}/></div>
              <Input label="City" value={state.city} onChange={e => setState({...state, city: e.target.value})}/>
              <div className="flex gap-4">
                 <div className="flex-1 min-w-0"><Input label="State" value={state.state} onChange={e => setState({...state, state: e.target.value})}/></div>
                 <div className="flex-1 min-w-0"><Input label="Zip" value={state.zip} onChange={e => setState({...state, zip: e.target.value})}/></div>
              </div>
              <div className="md:col-span-2"><TextArea label="Notes" value={state.notes} onChange={e => setState({...state, notes: e.target.value})}/></div>
              
              {customUser?.role === 'Manager' && (
                <div className="md:col-span-2 space-y-2 min-w-0">
                   <label className={tw.label}>Assign to Pilots</label>
                   <div className="flex flex-wrap gap-2">
                      {companyPilots.map(p => {
                         const isAssigned = (state.assignedTo || []).includes(p.username);
                         return (
                           <button key={p.id} type="button" onClick={() => {
                              const cur = state.assignedTo || [];
                              setState({...state, assignedTo: isAssigned ? cur.filter(u => u !== p.username) : [...cur, p.username]});
                           }} className={`px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${isAssigned ? 'bg-[#9cd33b] text-[#020617] shadow-lg' : 'bg-slate-950 border border-slate-800 text-slate-500'}`}>{p.username}</button>
                         )
                      })}
                   </div>
                </div>
              )}
            </div>
          </FormCard>
        );

      const fetchWeather = async () => {
         if (!state.date || !state.startTime) return notify("Please enter a Date and Start Time first.", "error");

         let lat = parseFloat(state.latDec), lon = parseFloat(state.lonDec);
         if (state.coordType === 'DMS') {
             lat = (parseFloat(state.latDMS.d||0)+parseFloat(state.latDMS.m||0)/60+parseFloat(state.latDMS.s||0)/3600)*(state.latDMS.dir==='S'?-1:1);
             lon = (parseFloat(state.lonDMS.d||0)+parseFloat(state.lonDMS.m||0)/60+parseFloat(state.lonDMS.s||0)/3600)*(state.lonDMS.dir==='W'?-1:1);
         }
         if (isNaN(lat) || isNaN(lon) || lat === 0 || lon === 0) return notify("Enter valid coordinates first to auto-fill weather.", "error");

         notify("Fetching historical weather data...", "info");
         try {
             const flightDate = new Date(state.date);
             const today = new Date();
             const daysDiff = (today - flightDate) / (1000 * 60 * 60 * 24);
             
             const baseUrl = daysDiff > 90 ? 'https://archive-api.open-meteo.com/v1/archive' : 'https://api.open-meteo.com/v1/forecast';

             const res = await fetch(`${baseUrl}?latitude=${lat}&longitude=${lon}&start_date=${state.date}&end_date=${state.date}&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`);
             const data = await res.json();
             
             if (!data.hourly || data.hourly.temperature_2m.length === 0) throw new Error("No data");

             const hour = parseInt(state.startTime.split(':')[0], 10);

             const t = data.hourly.temperature_2m[hour];
             const h = data.hourly.relative_humidity_2m[hour];
             const ws = data.hourly.wind_speed_10m[hour];
             let wd = data.hourly.wind_direction_10m[hour];

             if (t === null || t === undefined) throw new Error("Not available for this specific hour yet");

             const dirs = ['N','NE','E','SE','S','SW','W','NW'];
             const dirIdx = Math.round(((wd %= 360) < 0 ? wd + 360 : wd) / 45) % 8;

             setState(prev => ({
                 ...prev,
                 temp: t,
                 humidity: h,
                 windSpeed: ws,
                 windDirection: dirs[dirIdx]
             }));
             notify(`Weather auto-filled for ${state.date} at ${state.startTime}!`, "success");
         } catch(err) {
