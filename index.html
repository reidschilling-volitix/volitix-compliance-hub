            <GlobalStyles /><Toast notification={notification} />
            <div className="m-auto w-full max-w-md relative z-10 py-10">
               <Card className="w-full space-y-8 animate-fade-in border-[#9cd33b]/30 shadow-[0_0_50px_rgba(156,211,59,0.1)] backdrop-blur-2xl bg-slate-900/80">
                 <div className="text-center flex flex-col items-center">
                    <div className="w-24 h-24 bg-gradient-to-br from-[#9cd33b]/20 to-transparent rounded-full flex items-center justify-center mb-6 border border-[#9cd33b]/40 shadow-[0_0_40px_rgba(156,211,59,0.2)]"><Lock className="text-[#9cd33b]" size={36} strokeWidth={2.5} /></div>
                    <h1 className="text-5xl font-['Orbitron'] font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-white to-[#9cd33b] drop-shadow-[0_0_15px_rgba(156,211,59,0.4)] mb-1">Spray Ops</h1>
                    <p className="text-slate-400 text-[9px] font-black uppercase tracking-[0.4em] mt-2 mb-2">Flight Command Center</p>
                    <div className="h-px w-12 bg-gradient-to-r from-transparent via-[#9cd33b]/50 to-transparent my-4"></div>
                    <p className="text-[#9cd33b] text-[10px] font-black uppercase tracking-widest mt-2">
                       {authMode === 'login' ? 'Secure Login' : 
                        authMode === 'register' ? 'Register Access' : 
                        authMode === 'forgot' ? 'Account Recovery' : 
                        'Reset Password'}
                    </p>
                 </div>
                 
                 {authMode === 'login' && (
                   <form onSubmit={handleLogin} className="space-y-4">
                      <Input label="Company Code" value={authForm.companyName} onChange={e => setAuthForm({...authForm, companyName: e.target.value})} required/>
                      <Input label="Username" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} required/>
                      <Input 
                        label="Password" 
                        type={showPassword ? "text" : "password"} 
                        value={authForm.password} 
                        onChange={e => setAuthForm({...authForm, password: e.target.value})} 
                        required 
                        rightElement={<button type="button" onClick={() => setShowPassword(!showPassword)} className="text-slate-500 hover:text-[#9cd33b] transition-colors focus:outline-none">{showPassword ? <EyeOff size={16}/> : <Eye size={16}/>}</button>} 
                      />
                      <Button type="submit" className="w-full py-4 mt-8">Login <ArrowRight size={16}/></Button>
                   </form>
                 )}

                 {authMode === 'register' && (
                   <form onSubmit={handleRegister} className="space-y-4">
                      <Input label="Company Code" value={authForm.companyName} onChange={e => setAuthForm({...authForm, companyName: e.target.value})} required/>
                      <Input label="Username" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} required/>
                      <Input label="Email Address" type="email" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} required/>
                      <Input 
                        label="Password" 
                        type={showPassword ? "text" : "password"} 
                        value={authForm.password} 
                        onChange={e => setAuthForm({...authForm, password: e.target.value})} 
                        required 
                        rightElement={<button type="button" onClick={() => setShowPassword(!showPassword)} className="text-slate-500 hover:text-[#9cd33b] transition-colors focus:outline-none">{showPassword ? <EyeOff size={16}/> : <Eye size={16}/>}</button>} 
                      />
                      <Select label="Role" value={authForm.role} onChange={e => setAuthForm({...authForm, role: e.target.value})}><option value="Pilot">Pilot</option><option value="Manager">Manager</option><option value="Dispatcher">Dispatcher</option></Select>
                      <Button type="submit" className="w-full py-4 mt-8">Create Key <ArrowRight size={16}/></Button>
                   </form>
                 )}

                 {authMode === 'forgot' && (
                   <form onSubmit={handleForgotPassword} className="space-y-4">
                      <p className="text-xs text-slate-400 text-center mb-6 leading-relaxed">Enter your exact registration details to verify your account and reset your password.</p>
                      <Input label="Company Code" value={authForm.companyName} onChange={e => setAuthForm({...authForm, companyName: e.target.value})} required/>
                      <Input label="Username" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} required/>
                      <Input label="Email Address" type="email" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} required/>
                      <Button type="submit" className="w-full py-4 mt-8">Verify Account <ArrowRight size={16}/></Button>
                   </form>
                 )}

                 {authMode === 'reset' && (
                   <form onSubmit={handleResetPassword} className="space-y-4">
                      <div className="bg-[#9cd33b]/10 border border-[#9cd33b]/30 p-4 rounded-2xl mb-6">
                         <p className="text-xs text-[#9cd33b] font-bold text-center">Account verified for <span className="font-black">{resetUserDoc?.username}</span>.</p>
                      </div>
                      <Input 
                        label="New Password" 
                        type={showPassword ? "text" : "password"} 
                        value={authForm.password} 
                        onChange={e => setAuthForm({...authForm, password: e.target.value})} 
                        required 
                        rightElement={<button type="button" onClick={() => setShowPassword(!showPassword)} className="text-slate-500 hover:text-[#9cd33b] transition-colors focus:outline-none">{showPassword ? <EyeOff size={16}/> : <Eye size={16}/>}</button>} 
                      />
                      <Button type="submit" className="w-full py-4 mt-8">Update Password <ArrowRight size={16}/></Button>
                   </form>
                 )}

                 {authMode === 'login' && (
                   <div className="flex flex-col gap-4 text-center pt-8 border-t border-slate-800 mt-8">
                      <button type="button" onClick={() => setAuthMode('forgot')} className="text-[10px] text-blue-400 hover:text-blue-300 uppercase font-black tracking-widest transition-colors">Forgot Password?</button>
                      <button type="button" onClick={() => setAuthMode('register')} className="text-[10px] text-slate-400 hover:text-slate-200 uppercase font-black tracking-widest transition-colors">Need an account? Register Here</button>
                   </div>
                 )}
                 {(authMode === 'register' || authMode === 'forgot' || authMode === 'reset') && (
                   <div className="text-center pt-8 border-t border-slate-800 mt-8">
                      <button type="button" onClick={() => { setAuthMode('login'); setResetUserDoc(null); }} className="text-[10px] text-slate-400 hover:text-slate-200 uppercase font-black tracking-widest transition-colors">{authMode === 'reset' ? 'Cancel' : 'Already have access? Login Here'}</button>
                   </div>
                 )}
               </Card>
            </div>
          </div>
        );
      }

      const tabs = [
        ...(customUser.role !== 'Dispatcher' ? [{ id: 'dashboard', icon: ShieldCheck, label: 'Dashboard' }] : []),
        ...(customUser.role !== 'Dispatcher' ? [{ id: 'schedule', icon: CalendarDays, label: 'Schedule' }] : [{ id: 'dispatch', icon: Send, label: 'My Orders' }]),
        ...(customUser.role !== 'Dispatcher' ? [{ id: 'smart-weather', icon: Cloud, label: 'Smart Route' }] : []),
        { id: 'customers', icon: Users, label: 'Customers' },
        { id: 'products', icon: FlaskConical, label: 'Products' },
        ...(customUser.role !== 'Dispatcher' ? [
           { id: 'fleet', icon: Plane, label: 'Aircraft Fleet' },
           { id: 'certifications', icon: Award, label: 'Certifications' }, { id: 'maintenance', icon: Wrench, label: 'Maintenance' },
           { id: 'log', icon: FileText, label: 'Mission Log' }, { id: 'notam', icon: Navigation, label: 'NOTAM Tool' },
           { id: 'faa-report', icon: FileBarChart, label: 'FAA Report' }
        ] : []),
        ...(customUser.role === 'Manager' ? [{ id: 'settings', icon: Settings2, label: 'Settings' }] : [])
      ];

      return (
        <div className="flex h-full w-full bg-[#020617] overflow-hidden font-sans selection:bg-[#9cd33b] selection:text-[#020617] relative">
          <div className="bg-lightning-container"><div className="lightning-veins"></div></div>
          <div className="absolute top-0 left-0 w-full h-[30rem] bg-gradient-to-b from-[#9cd33b]/[0.02] to-transparent pointer-events-none"></div>
          <GlobalStyles /><Toast notification={notification} />
          
          {deleteConfirm && (
            <div className="fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-4 animate-fade-in">
              <Card className="max-w-sm w-full border-red-500/30">
                <div className="flex items-center gap-3 text-red-500 mb-4">
                   <AlertTriangle size={24} />
                   <h3 className="text-xl font-black uppercase tracking-widest">Confirm Deletion</h3>
                </div>
                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-8 leading-relaxed">This record will be permanently removed from the database. This action cannot be reversed.</p>
                <div className="flex gap-4">
                   <Button variant="secondary" className="flex-1 py-4" onClick={() => setDeleteConfirm(null)}>Cancel</Button>
                   <Button variant="danger" className="flex-1 py-4" onClick={executeDelete}>Delete</Button>
                </div>
              </Card>
            </div>
          )}

          {showProfileModal && (
            <div className="fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-4 animate-fade-in">
               <Card className="max-w-md w-full relative">
                  <button onClick={() => setShowProfileModal(false)} className="absolute top-6 right-6 text-slate-400 hover:text-white"><X size={20}/></button>
                  <div className="flex items-center gap-4 mb-8 border-b border-slate-800 pb-6">
                     <div className="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center"><User size={24} className="text-[#9cd33b]"/></div>
                     <div className="min-w-0 flex-1">
                        <h3 className="text-xl font-black uppercase text-white truncate">{customUser.username}</h3>
                        <p className="text-[#9cd33b] text-xs font-bold uppercase tracking-widest">{customUser.role}</p>
                     </div>
                  </div>
                  <div className="space-y-4">
                     <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800">
                        <p className={tw.label}>Company</p>
                        <p className="text-sm font-black text-slate-200 truncate">{customUser.companyName}</p>
                     </div>
                     <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800">
                        <p className={tw.label}>Email</p>
                        <p className="text-sm font-black text-slate-200 truncate">{customUser.email || 'N/A'}</p>
                     </div>
                  </div>
                  <div className="pt-6 mt-6 border-t border-slate-800">
                     <Button className="w-full" onClick={() => { setShowProfileModal(false); setActiveTab('settings'); }}>Change Password</Button>
                  </div>
               </Card>
            </div>
          )}

          <div className="w-20 lg:w-64 bg-slate-900/80 backdrop-blur-2xl border-r border-slate-800 flex flex-col shrink-0 print:hidden z-30 shadow-[4px_0_24px_rgba(0,0,0,0.2)] relative">
            <div className="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-[#9cd33b]/5 to-transparent pointer-events-none"></div>
            <div className="p-4 lg:p-6 border-b border-slate-800/50 min-w-0 flex flex-col items-center text-center relative z-10">
              <div className="hidden lg:flex flex-col items-center w-full">
                <h1 className={`font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 uppercase tracking-tighter break-words leading-tight w-full drop-shadow-md ${
                  (company.name?.length || 0) > 25 ? 'text-xs' : 
                  (company.name?.length || 0) > 15 ? 'text-sm' : 
                  'text-lg'
                }`}>
                  {company.name || 'Organization'}
                </h1>
                <span className="text-[10px] font-['Orbitron'] text-[#9cd33b] font-black uppercase tracking-[0.3em] mt-1.5 drop-shadow-[0_0_10px_rgba(156,211,59,0.3)]">Spray Ops</span>
                {isOnline ? (
                   <span className="text-[8px] bg-[#9cd33b]/10 border border-[#9cd33b]/30 text-[#9cd33b] px-2.5 py-1 rounded-full font-black uppercase tracking-widest mt-3 flex items-center gap-1.5 shadow-[0_0_10px_rgba(156,211,59,0.1)]"><Activity size={10}/> Online</span>
                ) : (
                   <span className="text-[8px] bg-amber-500/10 border border-amber-500/30 text-amber-500 px-2.5 py-1 rounded-full font-black uppercase tracking-widest mt-3 flex items-center gap-1.5"><AlertTriangle size={10}/> Caching</span>
                )}
              </div>
              <ShieldCheck className="lg:hidden mx-auto text-[#9cd33b] shrink-0" size={24} strokeWidth={2.5}/>
            </div>
            <nav className="flex-1 p-4 space-y-1.5 overflow-y-auto relative z-10">
              {tabs.map(t => {
                const Icon = t.icon;
                return (
                  <button key={t.id} onClick={() => {setActiveTab(t.id); setShowFormalReport(false);}} className={`w-full flex items-center justify-center lg:justify-start p-3.5 rounded-2xl transition-all duration-300 min-w-0 group ${activeTab === t.id ? 'bg-gradient-to-r from-[#9cd33b] to-[#8ac22a] text-[#020617] shadow-[0_0_20px_rgba(156,211,59,0.3)] font-black' : 'hover:bg-slate-800/50 text-slate-400 hover:text-slate-200'}`}>
                     <Icon size={18} className={`shrink-0 transition-transform duration-300 ${activeTab === t.id ? 'scale-110' : 'group-hover:scale-110'}`}/>
                     <span className={`hidden lg:inline text-[11px] uppercase tracking-widest ml-4 truncate ${activeTab === t.id ? 'font-black' : 'font-bold'}`}>{t.label}</span>
                  </button>
                );
              })}
            </nav>
            <div className="p-4 border-t border-slate-800/50 space-y-2 min-w-0 relative z-10">
               <div className="hidden lg:flex flex-col min-w-0 mb-3 px-2">
                 <span className="text-[10px] text-slate-300 font-black uppercase tracking-widest truncate">{customUser.username}</span>
                 <span className="text-[9px] text-[#9cd33b] font-bold uppercase tracking-widest truncate mt-0.5 opacity-80">{customUser.role}</span>
               </div>
               <button onClick={() => setShowProfileModal(true)} className="w-full p-3 flex items-center justify-center lg:justify-start rounded-xl text-slate-400 hover:bg-slate-800/50 transition-all min-w-0 group">
                  <User size={16} className="shrink-0 group-hover:text-white transition-colors"/>
                  <span className="hidden lg:inline text-[10px] font-black uppercase tracking-widest ml-3 truncate group-hover:text-white transition-colors">My Profile</span>
               </button>
               <button onClick={() => {setCustomUser(null); setAuthForm({...authForm, password: ''});}} className="w-full p-3 flex items-center justify-center lg:justify-start rounded-xl text-red-500/80 hover:text-red-400 hover:bg-red-500/10 transition-all min-w-0 group">
                  <LogOut size={16} className="shrink-0 group-hover:scale-110 transition-transform"/>
                  <span className="hidden lg:inline text-[10px] font-black uppercase tracking-widest ml-3 truncate">Sign Out</span>
               </button>
            </div>
          </div>
          <main className="flex-1 h-full overflow-y-auto p-6 lg:p-10 relative z-20 min-w-0">
            {activeTab === 'dashboard' && <DashboardTab fleet={company.fleet || []} company={company} customUser={customUser} logs={logs} maintRecords={maintRecords} updateFleetInfo={f => { setCompany({...company, fleet: f}); updateDoc(doc(db,'artifacts',appId,'public','data','saas_companies',customUser.companyName.toLowerCase().replace(/[^a-z0-9]/g,'-')), {fleet: f}); }} />}
            
            {activeTab === 'fleet' && <FleetTab company={company} setCompany={setCompany} customUser={customUser} notify={notify} />}
            
            {activeTab === 'settings' && <SettingsTab company={company} setCompany={setCompany} handleCompanySettingsSave={async e => { e.preventDefault(); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'saas_companies', customUser.companyName.toLowerCase().replace(/[^a-z0-9]/g, '-')), company); notify("Settings Saved", "success"); }} customUser={customUser} setCustomUser={setCustomUser} notify={notify} db={db} appId={appId} />}
            
            {activeTab === 'customers' && <CustomersTab items={customers} logs={logs} isEditing={customerState.isEditing} state={customerState} setState={setCustomerState} onSubmit={e => genericSubmit(e, 'customers', customerState, setCustomerState, defaultCustomerState, "Customer Saved")} onCancel={() => setCustomerState({...defaultCustomerState, isEditing: false})} onDelete={deleteItem} notify={notify} companyPilots={companyPilots} customUser={customUser} />}
            
            {activeTab === 'products' && <ProductsTab items={products} isEditing={productState.isEditing} state={productState} setState={setProductState} onSubmit={e => genericSubmit(e, 'products', productState, setProductState, defaultProductState, "Product Saved")} onCancel={() => setProductState({...defaultProductState, isEditing: false})} onDelete={deleteItem} />}
            
            {activeTab === 'maintenance' && (
              <MaintenanceTab 
                items={maintRecords} 
                equipmentList={allEquipment.filter(e => e.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>a.name.localeCompare(b.name))}
                isEditing={maintState.isEditing} 
                state={maintState} 
                setState={setMaintState} 
                equipState={equipState}
                setEquipState={setEquipState}
                onSubmitLog={async (e, newEquipData) => {
                  e.preventDefault();
                  let asset = maintState.assetId;
                  if (newEquipData && newEquipData.name) {
                      asset = newEquipData.name;
                      try { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'equipment'), { ...newEquipData, companyName: customUser.companyName, timestamp: new Date().toISOString() }); } catch(err) {}
                  }
                  const finalState = { ...maintState, assetId: asset, picUsername: customUser.username };
                  genericSubmit(e, 'maintenance_records', finalState, setMaintState, defaultMaintState, "Log Saved");
                }}
                onSubmitEquip={e => genericSubmit(e, 'equipment', equipState, setEquipState, defaultEquipState, "Equipment Saved")}
                onCancel={() => setMaintState({...defaultMaintState, isEditing: false})} 
                onCancelEquip={() => setEquipState({...defaultEquipState, isEditing: false})}
                onDelete={deleteItem} 
              />
            )}
            
            {activeTab === 'certifications' && <CertificationsTab items={certs} company={company} isEditing={certState.isEditing} state={certState} setState={setCertState} onSubmit={e => genericSubmit(e, 'certifications', {...certState, picUsername: customUser.username}, setCertState, defaultCertState, "Cert Saved")} onCancel={() => setCertState({...defaultCertState, isEditing: false})} onDelete={deleteItem} />}
            
            {activeTab === 'notam' && (
              <NotamTab 
                 notams={notamLogs} isEditing={notamState.isEditing} state={notamState} setState={setNotamState} 
                 derived={{ utcStart: computeUtcStart() }} 
                 generate={generateNotamScript} 
                 onSubmit={handleNotamSubmit} 
                 onCancel={() => setNotamState({...defaultNotamState, isEditing: false})} 
                 onDelete={deleteItem} 
                 notify={notify} 
                 company={company} 
                 certs={certs} 
              />
            )}
            
            {activeTab === 'faa-report' && <FaaReportTab company={company} fleet={company.fleet || []} certs={certs} monthlyReport={faaReportData} reportMonth={reportMonth} setReportMonth={setReportMonth} showFormalReport={showFormalReport} setShowFormalReport={setShowFormalReport} notify={notify} faaReports={faaReports} onDelete={deleteItem} db={db} appId={appId} />}
            
            {activeTab === 'schedule' && (
              <ScheduleTab 
                workOrders={workOrders} 
                isEditing={workOrderState.isEditing} 
                state={workOrderState} 
                setState={setWorkOrderState} 
                fleet={company.fleet || []} 
                onSubmit={handleScheduleSubmit} 
                onCancel={() => setWorkOrderState({...defaultWorkOrderState, isEditing: false})} 
                customers={customers} 
                products={products} 
                deleteItem={deleteItem} 
                customUser={customUser} 
                getStatusColor={getStatusColor} 
                notify={notify} 
                onLogMission={handleLogMissionFromSchedule} 
                handleDrop={handleScheduleDrop}
                handleDropToBacklog={async (e) => { 
                   e.preventDefault(); 
                   const id=e.dataTransfer.getData('text/plain'); 
                   if(!id) return; 
                   await updateDoc(doc(db,'artifacts',appId,'public','data','work_orders',id),{date:'',isScheduled:false,status:'Pending'}); notify("Moved to Backlog", "info"); 
                }} 
              />
            )}
            
            {activeTab === 'dispatch' && (
              <DispatcherOrdersTab 
                workOrders={workOrders.filter(w => w.creator === customUser.username)}
                isEditing={workOrderState.isEditing} state={workOrderState} setState={setWorkOrderState}
                onSubmit={handleDispatcherSubmit}
                onCancel={() => setWorkOrderState({...defaultWorkOrderState, isEditing: false})} customers={customers} products={products}
                deleteItem={deleteItem} customUser={customUser} getStatusColor={getStatusColor} notify={notify}
              />
            )}
            
            {activeTab === 'smart-weather' && (
               <WeatherRoutingTab workOrders={workOrders} notify={notify} />
            )}
            
            {activeTab === 'log' && (
              <MissionLogTab 
                logs={logs} 
                fleet={company.fleet || []} 
                customers={customers} 
                products={products} 
                crops={crops} 
                isEditing={logState.isEditing} 
                state={logState} 
                setState={setLogState} 
                notify={notify} 
                notams={notamLogs}
                onSubmit={handleLogSubmit} 
                onCancel={() => setLogState({...defaultLogState, isEditing: false})} 
                onDelete={deleteItem} 
                kmlRef={kmlInputRef} 
                handleKml={(e) => { 
                   const file = e.target.files[0]; 
                   if (!file) return; 
                   const r = new FileReader(); 
                   r.onload = (ev) => setLogState(p => ({...p, kmlData: ev.target.result, kmlFileName: file.name})); 
                   r.readAsText(file); 
                }} 
              />
            )}
          </main>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
