<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volitix AG Compliance Hub</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel for compiling React JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Maps for React, Lucide Icons, and Firebase -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"
      }
    }
  </script>

  <!-- Custom Styles embedded directly in the HTML -->
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background-color: #020617; /* Tailwind slate-950 */
      color: #e2e8f0; /* Tailwind slate-200 */
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    /* Custom scrollbar for dark theme */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    
    /* Print specific styles for FAA report */
    @media print {
      body { background-color: white !important; color: black !important; }
      .print\:p-0 { padding: 0 !important; }
      .print\:hidden { display: none !important; }
    }

    /* Simple animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- The React Application -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ShieldCheck, Plane, Plus, History, Navigation, Download, User, CheckCircle2, 
      Droplets, Thermometer, ClipboardCheck, FileCode, Paperclip, X, FlaskConical, 
      AlertTriangle, LayoutTemplate, Save, Trash2, Send, Zap, Clock, MapPin, 
      Settings2, Wrench, Edit3, Award, Calendar, FileText, ChevronDown, UploadCloud, 
      FileBarChart, MailCheck, Printer, Eye, Activity, Compass, Building2, LogIn, 
      LogOut, Globe, PlusCircle, ArrowRight
    } from 'lucide-react';
    
    import { initializeApp } from 'firebase/app';
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, setDoc, getDocs } from 'firebase/firestore';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut } from 'firebase/auth';

    // --- Firebase Configuration (Graceful fallback if not run in canvas) ---
    const rawConfig = typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey": "mock", "projectId": "mock"}';
    const firebaseConfig = JSON.parse(rawConfig);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'volitix-saas-compliance';

    // --- Global Constants ---
    const WIND_DIRECTIONS = ["N", "NE", "E", "SE", "S", "SW", "W", "NW", "CALM"];
    const EQUIPMENT_TYPES = ["Drone", "Battery", "Generator", "Controller", "Spray System", "Other"];
    const TIME_ZONES = [
      { label: "Eastern (EST/EDT)", offset: -5 },
      { label: "Central (CST/CDT)", offset: -6 },
      { label: "Mountain (MST/MDT)", offset: -7 },
      { label: "Pacific (PST/PDT)", offset: -8 }
    ];

    const defaultLogState = {
      date: new Date().toLocaleDateString('en-CA'),
      startTime: '00:00',
      endTime: '00:00',
      selectedAircraft: [],
      pic: '',
      customer: '',
      locationName: '', 
      totalAcreage: '',
      treatedAcreage: '',
      whatWasTreated: '',
      targetPest: '',
      nozzleDesc: '',
      targetDistance: '',
      pumpPressure: '',
      travelSpeed: '',
      driftPractices: '',
      coordinates: '',
      chemical: '',
      adjuvantName: '',
      adjuvantRate: '',
      additiveName: '',
      additiveRate: '',
      windSpeed: '',
      windDir: 'N',
      temp: '',
      humidity: '',
      incidents: 'None',
      checklistCompleted: false,
      flightTookPlace: false,
      flightTimeMinutes: '',
      kmlData: null,
      kmlFileName: ''
    };

    // --- Helper Functions ---
    const formatToNotamDMS = (input, isLon = false) => {
      if (!input) return "000000";
      const parts = input.toString().trim().split(/\s+/);
      let decimal;
      if (parts.length >= 2) {
        const d = parseFloat(parts[0]) || 0;
        const m = parseFloat(parts[1]) || 0;
        const s = parseFloat(parts[2]) || 0;
        decimal = Math.abs(d) + (m / 60) + (s / 3600);
      } else {
        decimal = Math.abs(parseFloat(input));
      }
      if (isNaN(decimal)) return "000000";
      const degrees = Math.floor(decimal);
      const minutes = Math.floor((decimal - degrees) * 60);
      const seconds = Math.round((decimal - degrees - (minutes / 60)) * 3600);
      const dStr = degrees.toString().padStart(isLon ? 3 : 2, '0');
      const mStr = minutes.toString().padStart(2, '0');
      const sStr = seconds.toString().padStart(2, '0');
      return `${dStr}${mStr}${sStr}`;
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [showFormalReport, setShowFormalReport] = useState(false);
      const [onboardingMode, setOnboardingMode] = useState(false);
      const [loading, setLoading] = useState(true);

      // Dynamic Company Profile
      const [company, setCompany] = useState({
        name: 'New Aviation Co.',
        supervisor: 'Lead Pilot Name',
        email: '',
        certNo: 'State License #',
        exemption: '12345',
        timezone: -6 
      });

      const [logs, setLogs] = useState([]);
      const [templates, setTemplates] = useState([]);
      const [certs, setCerts] = useState([]);
      const [maintRecords, setMaintRecords] = useState([]);
      const [fleet, setFleet] = useState([]);
      const [templateName, setTemplateName] = useState('');
      const [editingDrone, setEditingDrone] = useState(null);
      const [reportMonth, setReportMonth] = useState(new Date().toISOString().slice(0, 7));

      const kmlInputRef = useRef(null);

      // State for forms
      const [notamData, setNotamData] = useState({ 
        lat: '38.243', lon: '-90.284', radius: '0.5', 
        date: new Date().toLocaleDateString('en-CA'), localStartTime: '08:00', duration: '4' 
      });
      const [newMaint, setNewMaint] = useState({
        date: new Date().toLocaleDateString('en-CA'), equipmentType: 'Drone', customEquipment: '', assetId: '', workPerformed: '', performedBy: ''
      });
      const [newCert, setNewCert] = useState({
        name: 'FAA Part 107', customName: '', licenseNumber: '', state: '', expirationDate: '', additionalInfo: '', owner: ''
      });
      const [newLog, setNewLog] = useState(defaultLogState);

      // (1) Auth Initialize
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) { console.error("Auth failed", err); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          if (!u) setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // (2) Fetch SaaS Data
      useEffect(() => {
        if (!user) return;

        const profileDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'profile');
        const unsubProfile = onSnapshot(profileDoc, (snap) => {
          if (snap.exists()) {
            const data = snap.data();
            setCompany(data);
            setNewLog(prev => ({ ...prev, pic: data.supervisor }));
            setNewMaint(prev => ({ ...prev, performedBy: data.supervisor }));
            setNewCert(prev => ({ ...prev, owner: data.supervisor }));
            setOnboardingMode(false);
          } else {
            setOnboardingMode(true);
          }
        });

        const fleetDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'fleet');
        const unsubFleet = onSnapshot(fleetDoc, (snap) => {
          if (snap.exists()) setFleet(snap.data().units);
          else setFleet([{ id: 'N-NUMBER', model: 'Aircraft Model', sn: 'SN-0000' }]);
        });

        const unsubLogs = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'flight_logs')), (s) => setLogs(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubTemplates = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'templates')), (s) => setTemplates(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubCerts = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'certifications')), (s) => setCerts(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubMaint = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'maintenance_records')), (s) => setMaintRecords(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        
        setLoading(false);
        return () => { unsubProfile(); unsubFleet(); unsubLogs(); unsubTemplates(); unsubCerts(); unsubMaint(); };
      }, [user]);

      // Derived Logic
      const derivedValues = useMemo(() => {
        let startStr = '0000', endStr = '0000';
        if (notamData.localStartTime) {
          const [hours, minutes] = notamData.localStartTime.split(':').map(Number);
          const dateObj = new Date(notamData.date); dateObj.setHours(hours, minutes);
          const utcHours = (dateObj.getHours() - company.timezone + 24) % 24;
          startStr = `${utcHours.toString().padStart(2, '0')}${dateObj.getMinutes().toString().padStart(2, '0')}`;
          const endObj = new Date(dateObj.getTime() + (notamData.duration * 60 * 60 * 1000));
          const utcEndHours = (endObj.getHours() - company.timezone + 24) % 24;
          endStr = `${utcEndHours.toString().padStart(2, '0')}${endObj.getMinutes().toString().padStart(2, '0')}`;
        }
        return { utcStart: startStr, utcEnd: endStr, dmsLat: formatToNotamDMS(notamData.lat, false), dmsLon: formatToNotamDMS(notamData.lon, true) };
      }, [notamData, company.timezone]);

      const monthlyReport = useMemo(() => {
        const filteredLogs = logs.filter(l => l.date && l.date.startsWith(reportMonth));
        const totalMinutes = filteredLogs.reduce((acc, l) => acc + (parseFloat(l.flightTimeMinutes) || 0), 0);
        const locations = [...new Set(filteredLogs.map(l => l.locationName))].filter(Boolean);
        const incidents = filteredLogs.filter(l => l.incidents && l.incidents !== 'None');
        return { month: reportMonth, logs: filteredLogs, totalHours: (totalMinutes / 60).toFixed(2), flightCount: filteredLogs.length, locations, incidents };
      }, [logs, reportMonth]);

      function generateNotam() {
        return `!FDC UAS ... ${company.name.toUpperCase()}. ${notamData.date} AIRSPACE UAS WI AN AREA DEFINED AS ${notamData.radius}NM RADIUS OF ${derivedValues.dmsLat}N${derivedValues.dmsLon}W SFC-200FT AGL. ${derivedValues.utcStart}Z - ${derivedValues.utcEnd}Z. PURSUANT TO EXEMPTION ${company.exemption}.`;
      }

      // Handlers
      const handleOnboardingSubmit = async (e) => {
        e.preventDefault();
        if (!user) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'profile'), company);
          setOnboardingMode(false);
          alert("Profile Saved.");
        } catch (err) { console.error(err); }
      };

      const handleLogSubmit = async (e) => {
        e.preventDefault();
        if (!user || !newLog.checklistCompleted || !newLog.flightTookPlace) return alert("Verify checklist/flight.");
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'flight_logs'), { ...newLog, timestamp: new Date().toISOString() });
          setActiveTab('history');
          setNewLog({ ...defaultLogState, pic: company.supervisor });
        } catch (err) { console.error(err); }
      };

      const handleCertSubmit = async (e) => {
        e.preventDefault();
        if (!user) return;
        const finalName = newCert.name === 'Other' ? newCert.customName : newCert.name;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'certifications'), { 
            ...newCert, name: finalName, timestamp: new Date().toISOString() 
          });
          alert("Certification Archived.");
          setNewCert({ name: 'FAA Part 107', customName: '', licenseNumber: '', state: '', expirationDate: '', additionalInfo: '', owner: company.supervisor });
        } catch (err) { console.error(err); }
      };

      const handleMaintSubmit = async (e) => {
        e.preventDefault();
        if (!user) return;
        const finalType = newMaint.equipmentType === 'Other' ? newMaint.customEquipment : newMaint.equipmentType;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'maintenance_records'), { 
            ...newMaint, equipmentType: finalType, timestamp: new Date().toISOString() 
          });
          alert("Maintenance Recorded.");
          setNewMaint({ date: new Date().toLocaleDateString('en-CA'), equipmentType: 'Drone', customEquipment: '', assetId: '', workPerformed: '', performedBy: company.supervisor });
        } catch (err) { console.error(err); }
      };

      const handleSaveTemplate = async () => {
        if (!templateName.trim() || !user) return alert("Enter Profile Name.");
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'templates'), { ...newLog, templateName, timestamp: new Date().toISOString() });
          setTemplateName('');
          alert("Template Profile Saved.");
        } catch (err) { console.error(err); }
      };

      const loadTemplate = (t) => setNewLog({ ...t, date: new Date().toLocaleDateString('en-CA'), startTime: '00:00', endTime: '00:00' });

      const deleteItem = async (col, docId) => {
        if (!user) return;
        try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, col, docId)); } catch (e) { console.error(e); }
      };

      const handleAircraftToggle = (id) => {
        setNewLog(prev => {
          const current = prev.selectedAircraft;
          return current.includes(id) ? { ...prev, selectedAircraft: current.filter(a => a !== id) } : { ...prev, selectedAircraft: [...current, id] };
        });
      };

      const handleKmlUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => setNewLog(prev => ({ ...prev, kmlData: event.target.result, kmlFileName: file.name }));
        reader.readAsDataURL(file);
      };

      const removeKml = () => { setNewLog(prev => ({ ...prev, kmlData: null, kmlFileName: '' })); if (kmlInputRef.current) kmlInputRef.current.value = ""; };

      const addNewDrone = () => {
        const newUnit = { id: 'NEW-UNIT', model: 'Drone Model', sn: 'TBD' };
        setFleet([...fleet, newUnit]);
        setEditingDrone(fleet.length);
      };

      const updateFleetInfo = async () => {
        if (!user) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'fleet'), { units: fleet });
          setEditingDrone(null);
          alert("Fleet Synchronized.");
        } catch (err) { console.error(err); }
      };

      if (loading) return <div className="flex h-screen items-center justify-center bg-slate-950 text-green-500 font-mono animate-fade-in uppercase tracking-widest">Awaiting Command Link...</div>;

      if (onboardingMode) {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-950 p-6 animate-fade-in">
            <div className="max-w-xl w-full bg-slate-900 border border-slate-800 p-10 rounded-[3rem] shadow-2xl space-y-8">
               <div className="text-center space-y-2">
                  <div className="w-20 h-20 bg-green-600/10 border border-green-600/20 rounded-full flex items-center justify-center mx-auto mb-4"><Building2 className="text-green-500" size={40} /></div>
                  <h1 className="text-3xl font-black uppercase tracking-tighter text-slate-100">Establish Hub Profile</h1>
                  <p className="text-slate-400 text-sm font-bold uppercase tracking-widest">Setup your operational business data</p>
               </div>
               <form onSubmit={handleOnboardingSubmit} className="space-y-4">
                  <div className="space-y-1">
                     <label className="text-[10px] font-black uppercase text-slate-500 ml-1">Business Operating Name</label>
                     <input className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-slate-200 outline-none focus:border-green-600 font-black" value={company.name} onChange={e => setCompany({...company, name: e.target.value})} required/>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-1">
                      <label className="text-[10px] font-black uppercase text-slate-500 ml-1">Lead PIC</label>
                      <input className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-slate-200 outline-none focus:border-green-600 font-bold" value={company.supervisor} onChange={e => setCompany({...company, supervisor: e.target.value})} required/>
                    </div>
                    <div className="space-y-1">
                      <label className="text-[10px] font-black uppercase text-slate-500 ml-1">Exemption #</label>
                      <input className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-slate-200 outline-none focus:border-green-600 font-mono" value={company.exemption} onChange={e => setCompany({...company, exemption: e.target.value})} required/>
                    </div>
                  </div>
                  <div className="space-y-1">
                     <label className="text-[10px] font-black uppercase text-slate-500 ml-1">Operating Time Zone</label>
                     <select className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-slate-200 outline-none font-bold" value={company.timezone} onChange={e => setCompany({...company, timezone: parseInt(e.target.value)})}>
                        {TIME_ZONES.map(tz => <option key={tz.offset} value={tz.offset}>{tz.label}</option>)}
                     </select>
                  </div>
                  <button type="submit" className="w-full bg-green-600 hover:bg-green-500 text-white p-5 rounded-3xl font-black uppercase tracking-widest flex items-center justify-center gap-3 transition-all">Begin Operations <ArrowRight size={20}/></button>
               </form>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen bg-slate-950 text-slate-200 overflow-hidden font-sans animate-fade-in">
          {/* Sidebar Navigation */}
          <div className="w-20 lg:w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 print:hidden">
            <div className="p-6 border-b border-slate-800">
              <div className="flex items-center gap-2 text-green-500 mb-1">
                <ShieldCheck size={24} />
                <span className="hidden lg:inline font-black text-lg uppercase tracking-tight truncate">{company.name}</span>
              </div>
            </div>
            <nav className="flex-1 p-2 lg:p-4 space-y-1">
              {[
                { id: 'dashboard', icon: ShieldCheck, label: 'Dashboard' },
                { id: 'certs', icon: Award, label: 'Certifications' },
                { id: 'maintenance', icon: Wrench, label: 'Maintenance' },
                { id: 'log', icon: Plus, label: 'Log Mission' },
                { id: 'notam', icon: Navigation, label: 'NOTAM Tool' },
                { id: 'faa-report', icon: FileBarChart, label: 'FAA Report' },
                { id: 'history', icon: History, label: 'Archives' },
                { id: 'settings', icon: Settings2, label: 'Settings' }
              ].map(item => (
                <button key={item.id} onClick={() => {setActiveTab(item.id); setShowFormalReport(false);}}
                  className={`w-full flex items-center justify-center lg:justify-start gap-3 p-3 rounded-2xl transition-all ${activeTab === item.id ? 'bg-green-600 text-white shadow-lg' : 'hover:bg-slate-800 text-slate-500'}`}>
                  <item.icon size={20} /><span className="hidden lg:inline text-[11px] font-black uppercase tracking-widest ml-3">{item.label}</span>
                </button>
              ))}
            </nav>
          </div>

          <div className="flex-1 overflow-y-auto bg-slate-950 print:bg-white">
            <header className="h-16 border-b border-slate-800 bg-slate-900/40 backdrop-blur-md sticky top-0 z-10 flex items-center justify-between px-8 print:hidden">
              <h1 className="text-[10px] font-black uppercase tracking-[0.4em] text-slate-500">{activeTab}</h1>
              <div className="flex items-center gap-2 px-4 py-1.5 bg-slate-900 border border-slate-800 rounded-full">
                <div className="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,1)]"></div>
                <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Exemption #{company.exemption}</span>
              </div>
            </header>

            <main className="p-6 lg:p-10 max-w-7xl mx-auto space-y-6 print:p-0">
              {activeTab === 'dashboard' && (
                 <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] shadow-xl relative group">
                       <div className="flex justify-between items-center mb-6">
                          <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2"><Plane size={14} /> Active Fleet</p>
                          <button onClick={addNewDrone} className="text-green-500 hover:text-green-400 transition-colors"><PlusCircle size={20}/></button>
                       </div>
                       {fleet.map((d, idx) => (
                         <div key={idx} className="bg-slate-950 p-4 rounded-2xl border border-slate-800 mb-3">
                            <div className="flex justify-between items-start">
                              <div><span className="text-sm font-black text-slate-300 block">{String(d.id)}</span><span className="text-[9px] text-slate-500 font-bold uppercase">{String(d.model)}</span></div>
                              <button onClick={() => setEditingDrone(idx)} className="text-blue-500 hover:text-blue-400 transition-all"><Edit3 size={14}/></button>
                            </div>
                            <p className="text-[9px] font-mono text-slate-600 mt-1 uppercase">S/N: {String(d.sn)}</p>
                         </div>
                       ))}
                       {editingDrone !== null && (
                         <div className="mt-4 p-4 bg-slate-950 border border-blue-900/30 rounded-2xl space-y-3">
                            <input className="w-full bg-slate-900 border border-slate-800 p-2 rounded text-xs text-slate-200" value={fleet[editingDrone].id} onChange={e => { const f = [...fleet]; f[editingDrone].id = e.target.value; setFleet(f); }} placeholder="N-Number"/>
                            <input className="w-full bg-slate-900 border border-slate-800 p-2 rounded text-xs text-slate-200" value={fleet[editingDrone].model} onChange={e => { const f = [...fleet]; f[editingDrone].model = e.target.value; setFleet(f); }} placeholder="Model"/>
                            <input className="w-full bg-slate-900 border border-slate-800 p-2 rounded text-xs text-slate-200" value={fleet[editingDrone].sn} onChange={e => { const f = [...fleet]; f[editingDrone].sn = e.target.value; setFleet(f); }} placeholder="S/N"/>
                            <div className="flex gap-2">
                               <button onClick={updateFleetInfo} className="flex-1 bg-blue-600 text-white text-[10px] font-black p-2 rounded-xl">SYNC</button>

                        <div className="space-y-3 lg:col-span-1"><label className="text-[10px] text-slate-500 font-black uppercase">Fleet</label><div className="flex flex-wrap gap-2">{fleet.map(d => (<button key={d.id} type="button" onClick={() => handleAircraftToggle(d.id)} className={`flex-1 p-3 rounded-xl border text-[10px] font-black transition-all ${newLog.selectedAircraft.includes(d.id) ? 'bg-green-600 text-white border-green-500' : 'bg-slate-950 border-slate-800 text-slate-500'}`}>{String(d.id)}</button>))}</div></div>
                        <div className="space-y-3 lg:col-span-1"><label className="text-[10px] text-slate-500 font-black uppercase">Date</label><input type="date" className="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-sm outline-none text-slate-200" value={newLog.date} onChange={e => setNewLog({...newLog, date: e.target.value})}/></div>
                        <div className="space-y-3 lg:col-span-2"><label className="text-[10px] text-slate-500 font-black uppercase">Times</label><div className="flex gap-2"><input type="time" className="flex-1 bg-slate-950 border border-slate-800 p-3 rounded-2xl text-sm outline-none text-slate-200" value={newLog.startTime} onChange={e => setNewLog({...newLog, startTime: e.target.value})}/><input type="time" className="flex-1 bg-slate-950 border border-slate-800 p-3 rounded-2xl text-sm outline-none text-slate-200" value={newLog.endTime} onChange={e => setNewLog({...newLog, endTime: e.target.value})}/></div></div>
                        <div className="space-y-3 lg:col-span-2"><label className="text-[10px] text-slate-500 font-black uppercase">Customer</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-sm font-bold text-slate-200 outline-none" value={newLog.customer} onChange={e => setNewLog({...newLog, customer: e.target.value})} placeholder="e.g. John Smith"/></div>
                      </div>
                    </div>

                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-xl space-y-10">
                      <div className="flex items-center gap-2 text-blue-400 font-black uppercase text-[10px] border-b border-slate-800 pb-4"><Activity size={14} /> Flight Parameters</div>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase">Field Name</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none" value={newLog.locationName} onChange={e => setNewLog({...newLog, locationName: e.target.value})}/></div>
                        <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase">Total Acreage</label><div className="relative"><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none pr-10" value={newLog.totalAcreage} onChange={e => setNewLog({...newLog, totalAcreage: e.target.value})}/><span className="absolute right-4 top-4 text-[9px] text-slate-600 font-black">AC</span></div></div>
                        <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase">Treated Acreage</label><div className="relative"><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none pr-10" value={newLog.treatedAcreage} onChange={e => setNewLog({...newLog, treatedAcreage: e.target.value})}/><span className="absolute right-4 top-4 text-[9px] text-slate-600 font-black">AC</span></div></div>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase">What Was Treated?</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none" value={newLog.whatWasTreated} onChange={e => setNewLog({...newLog, whatWasTreated: e.target.value})}/></div>
                        <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase">Target Pest</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none" value={newLog.targetPest} onChange={e => setNewLog({...newLog, targetPest: e.target.value})}/></div>
                      </div>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                        <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase">Nozzle Description</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none" value={newLog.nozzleDesc} onChange={e => setNewLog({...newLog, nozzleDesc: e.target.value})}/></div>
                        <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase">Target Distance</label><div className="relative"><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none pr-10" value={newLog.targetDistance} onChange={e => setNewLog({...newLog, targetDistance: e.target.value})}/><span className="absolute right-4 top-4 text-[9px] text-slate-600 font-black">FT</span></div></div>
                        <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase">Pump Pressure</label><div className="relative"><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none pr-10" value={newLog.pumpPressure} onChange={e => setNewLog({...newLog, pumpPressure: e.target.value})}/><span className="absolute right-4 top-4 text-[9px] text-slate-600 font-black">PSI</span></div></div>
                        <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase">Travel Speed</label><div className="relative"><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none pr-12" value={newLog.travelSpeed} onChange={e => setNewLog({...newLog, travelSpeed: e.target.value})}/><span className="absolute right-4 top-4 text-[9px] text-slate-600 font-black">MPH</span></div></div>
                      </div>
                      <div className="space-y-2"><label className="text-[10px] text-slate-400 font-black uppercase ml-1">Drift Management Strategy</label><textarea className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm h-32 text-slate-200 outline-none" value={newLog.driftPractices} onChange={e => setNewLog({...newLog, driftPractices: e.target.value})} placeholder="Describe protocol..."/></div>
                    </div>

                    <div className="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-xl space-y-8">
                      <div className="flex items-center gap-2 text-green-500 font-black uppercase text-[10px] border-b border-slate-800 pb-4"><Droplets size={14} /> Product & Environment</div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-end">
                        <div className="space-y-3"><label className="text-[10px] text-slate-500 font-black uppercase">Chemical Product</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-black text-green-400 outline-none" value={newLog.chemical} onChange={e => setNewLog({...newLog, chemical: e.target.value})}/></div>
                        <div className="space-y-3"><label className="text-[10px] text-slate-500 font-black uppercase">Rate (OZ/AC)</label><div className="relative"><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-mono text-slate-200 outline-none pr-16" value={newLog.appRate} onChange={e => setNewLog({...newLog, appRate: e.target.value})}/><span className="absolute right-4 top-4 text-[9px] text-slate-600 font-black">OZ/AC</span></div></div>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-6 items-end border-t border-slate-800/40 pt-6">
                        <div className="space-y-2 lg:col-span-1"><label className="text-[10px] text-slate-400 uppercase font-black">Wind (MPH)</label><div className="relative"><input type="text" className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs text-slate-200 pr-10 outline-none" value={newLog.windSpeed} onChange={e => setNewLog({...newLog, windSpeed: e.target.value})}/><span className="absolute right-2 top-3.5 text-[8px] text-slate-700">MPH</span></div></div>
                        <div className="space-y-2 lg:col-span-1"><label className="text-[10px] text-slate-400 uppercase font-black">Temp (°F)</label><div className="relative"><input type="text" className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs text-slate-200 pr-8 outline-none" value={newLog.temp} onChange={e => setNewLog({...newLog, temp: e.target.value})}/><span className="absolute right-2 top-3.5 text-[8px] text-slate-700">°F</span></div></div>
                        <div className="space-y-2 lg:col-span-1"><label className="text-[10px] text-slate-400 uppercase font-black">Humidity (%)</label><div className="relative"><input type="text" className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs text-slate-200 pr-8 outline-none" value={newLog.humidity} onChange={e => setNewLog({...newLog, humidity: e.target.value})}/><span className="absolute right-2 top-3.5 text-[8px] text-slate-700">%</span></div></div>
                        <div className="space-y-2 md:col-span-3 lg:col-span-3"><label className="text-[10px] text-slate-400 uppercase font-black ml-1 flex items-center gap-1"><Paperclip size={10}/> KML Boundary (Optional)</label><div className="flex gap-2"><button type="button" onClick={() => kmlInputRef.current?.click()} className={`flex-1 p-3 rounded-xl text-[10px] font-black uppercase border truncate ${newLog.kmlFileName ? 'bg-blue-600/20 border-blue-500 text-blue-400' : 'bg-slate-950 border-slate-800 text-slate-500'}`}>{newLog.kmlFileName || 'Attach KML'}</button>{newLog.kmlFileName && <button type="button" onClick={removeKml} className="bg-red-600/20 p-2 rounded-xl text-red-500"><X size={14}/></button>}<input type="file" accept=".kml" ref={kmlInputRef} className="hidden" onChange={handleKmlUpload}/></div></div>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
                         <div className="space-y-2"><label className="text-[10px] text-slate-500 font-black uppercase">Coordinates (Dec/DMS)</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-xs font-mono text-slate-200 outline-none" value={newLog.coordinates} onChange={e => setNewLog({...newLog, coordinates: e.target.value})} placeholder="38.2, -90.2"/></div>
                         <div className="space-y-2"><label className="text-[10px] text-slate-500 font-black uppercase">Cycle Min</label><div className="relative"><input type="number" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 text-center pr-12 outline-none" value={newLog.flightTimeMinutes} onChange={e => setNewLog({...newLog, flightTimeMinutes: e.target.value})}/><span className="absolute right-4 top-4 text-[9px] text-slate-600 font-black">Min</span></div></div>
                      </div>
                      <div className="space-y-2">
                        <label className="text-[10px] text-slate-500 uppercase font-black">FAA Incidents</label>
                        <select className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-black text-slate-200 outline-none" value={newLog.incidents} onChange={e => setNewLog({...newLog, incidents: e.target.value})}>
                          <option value="None">None Reported</option><option value="Damage">Takeoff/Landing Damage</option><option value="Failure">Equipment Malfunction</option>
                        </select>
                      </div>
                    </div>

                    <div className="pt-6"><button type="submit" disabled={!newLog.checklistCompleted || !newLog.flightTookPlace}
                        className={`w-full p-6 rounded-[3rem] font-black text-xl flex items-center justify-center gap-4 transition-all duration-300 ${(!newLog.checklistCompleted || !newLog.flightTookPlace) ? 'bg-slate-800 text-slate-600 cursor-not-allowed opacity-50' : 'bg-green-600 hover:bg-green-500 text-white shadow-lg'}`}>
                        <ShieldCheck size={28} /> COMMIT TO SECURE VAULT</button>
                    </div>
                  </form>
                </div>
              )}

              {activeTab === 'history' && (
                <div className="space-y-8 animate-in fade-in duration-700">
                   <h3 className="text-[11px] font-black uppercase tracking-[0.4em] text-slate-500 ml-4">Aerial Application Vault Ledger</h3>
                   <div className="bg-slate-900 border border-slate-800 rounded-[3rem] overflow-hidden shadow-2xl">
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-[11px] font-medium tracking-tight"><thead className="bg-slate-800/60 text-slate-600 uppercase text-[9px] font-black tracking-[0.2em]"><tr><th className="p-6">Mission / Timing</th><th className="p-6">Fleet / Client</th><th className="p-6">Product / Application</th><th className="p-6 text-right">Audit</th></tr></thead><tbody className="divide-y divide-slate-800/40">
                          {logs.map(log => (
                            <tr key={log.id} className="hover:bg-slate-800/50 transition-all duration-200"><td className="p-6"><p className="font-black text-slate-200 text-xs">{String(log.date)}</p><p className="text-[10px] text-slate-600 font-mono mt-1 uppercase">{String(log.startTime)} - {String(log.endTime)}</p></td><td className="p-6"><div className="flex gap-1.5 mb-2">{log.selectedAircraft?.map((acID, i) => <span key={i} className="text-[9px] font-black text-slate-400 bg-slate-950 px-2 py-0.5 rounded-full border border-slate-800 shadow-sm">{String(acID)}</span>)}</div><p className="text-[10px] text-slate-500 font-black uppercase tracking-tight">{String(log.customer)}</p></td><td className="p-6"><p className="font-black text-green-500 uppercase text-xs">{String(log.chemical)}</p><p className="text-[10px] text-slate-500 uppercase font-bold">{String(log.locationName)} | {String(log.treatedAcreage)} AC</p></td><td className="p-6 text-right">{log.checklistCompleted && log.flightTookPlace ? (<div className="inline-flex items-center gap-2 text-[9px] font-black text-green-500 border border-green-900 bg-green-950/30 px-4 py-1.5 rounded-full uppercase tracking-widest"><ShieldCheck size={12} /> Verified</div>) : (<div className="inline-flex items-center gap-2 text-[9px] font-black text-red-500 border border-red-900 bg-red-950/30 px-4 py-1.5 rounded-full uppercase tracking-widest"><AlertTriangle size={12} /> Gap</div>)}</td></tr>
                          ))}
                        </tbody></table>
                      </div>
                   </div>
                </div>
              )}

              {activeTab === 'notam' && (
                <div className="bg-slate-900 border border-slate-800 p-10 rounded-[2.5rem] shadow-2xl animate-in slide-in-from-bottom-8 duration-500">
                   <div className="flex justify-between items-center"><div className="flex gap-4 items-center text-green-500"><Navigation size={32} /><h3 className="text-2xl font-black uppercase tracking-tighter">FAA FLIGHT SERVICE BRIDGE</h3></div></div>
                   <div className="grid grid-cols-1 md:grid-cols-2 gap-12 pt-8">
                      <div className="space-y-8">
                        <div className="space-y-3"><label className="text-[11px] text-slate-500 font-black ml-1 uppercase">Filing Date</label><input type="date" className="w-full bg-slate-950 border border-slate-800 p-5 rounded-3xl text-sm text-slate-200 outline-none" value={notamData.date} onChange={e => setNotamData({...notamData, date: e.target.value})} /></div>
                        <div className="grid grid-cols-3 gap-6">
                          <div className="space-y-3 col-span-1"><label className="text-[11px] text-slate-500 uppercase font-black ml-1">Local Start</label><input type="time" className="w-full bg-slate-950 border border-slate-800 p-5 rounded-3xl text-sm font-mono text-center text-slate-200 outline-none" value={notamData.localStartTime} onChange={e => setNotamData({...notamData, localStartTime: e.target.value})} /><div className="text-[9px] font-black text-green-600 uppercase mt-2 ml-1">Zulu: {derivedValues.utcStart}Z</div></div>
                          <div className="space-y-3 col-span-1"><label className="text-[11px] text-slate-500 uppercase font-black ml-1">Radius (NM)</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-5 rounded-3xl text-sm text-center text-slate-200 outline-none" value={notamData.radius} onChange={e => setNotamData({...notamData, radius: e.target.value})} /></div>
                          <div className="space-y-3 col-span-1"><label className="text-[11px] text-slate-500 uppercase font-black ml-1">Dur (Hrs)</label><input type="number" className="w-full bg-slate-950 border border-slate-800 p-5 rounded-3xl text-sm text-center text-slate-200 outline-none" value={notamData.duration} onChange={e => setNotamData({...notamData, duration: e.target.value})} /></div>
                        </div>
                        <div className="grid grid-cols-2 gap-6">
                          <div className="space-y-3"><label className="text-[11px] text-slate-500 font-black ml-1 flex items-center gap-1 uppercase"><MapPin size={12}/> Lat (DMS/Dec)</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-5 rounded-3xl text-sm font-mono text-center text-slate-200 outline-none" value={notamData.lat} onChange={e => setNotamData({...notamData, lat: e.target.value})} /></div>
                          <div className="space-y-3"><label className="text-[11px] text-slate-500 font-black ml-1 flex items-center gap-1 uppercase"><Compass size={12}/> Lon (DMS/Dec)</label><input type="text" className="w-full bg-slate-950 border border-slate-800 p-5 rounded-3xl text-sm font-mono text-center text-slate-200 outline-none" value={notamData.lon} onChange={e => setNotamData({...notamData, lon: e.target.value})} /></div>
                        </div>
                      </div>
                      <div className="bg-slate-950 p-8 rounded-[2.5rem] border border-slate-800 flex flex-col shadow-inner">
                        <div className="flex justify-between items-center mb-6"><span className="text-[11px] text-slate-600 font-black uppercase tracking-[0.2em]">Verified SCRIPT Output</span><button onClick={() => {navigator.clipboard.writeText(generateNotam()); alert("Script Copied!");}} className="text-green-500 hover:text-green-400 text-[11px] font-black underline decoration-green-900 underline-offset-8 uppercase">COPY SCRIPT</button></div>
                        <div className="flex-1 font-mono text-xs leading-loose text-green-400 bg-slate-900/40 p-8 rounded-[1.5rem] border border-slate-800 h-48 overflow-y-auto mb-6">{generateNotam()}</div>
                      </div>
                   </div>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
