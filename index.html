<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volitix AG Compliance Hub</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"
      }
    }
  </script>

  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background-color: #020617 !important; 
      color: #e2e8f0 !important; 
      font-family: system-ui, -apple-system, sans-serif;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    @media print {
      body { background-color: white !important; color: black !important; background-image: none !important; }
      .print\:p-0 { padding: 0 !important; }
      .print\:hidden { display: none !important; }
      .print\:shadow-none { box-shadow: none !important; }
      .print\:bg-transparent { background-color: transparent !important; }
      .print\:border-none { border: none !important; }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ShieldCheck, Plane, Plus, History, Navigation, User, CheckCircle2, 
      Droplets, ClipboardCheck, FileCode, Paperclip, X, FlaskConical, 
      AlertTriangle, LayoutTemplate, Trash2, Clock, MapPin, 
      Settings2, Wrench, Edit3, Award, CalendarDays, FileText, 
      FileBarChart, Printer, Eye, Activity, Compass, LogOut, ArrowRight, Lock, 
      Users, ChevronLeft, ChevronRight, Target, GripVertical, Map as MapIcon, Send
    } from 'lucide-react';

    import { initializeApp } from 'firebase/app';
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, setDoc, getDocs, getDoc, updateDoc } from 'firebase/firestore';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';

    // ============================================================================
    // 📂 CONFIG & CONSTANTS
    // ============================================================================

    const rawConfig = typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey": "mock", "projectId": "mock"}';
    const firebaseConfig = JSON.parse(rawConfig);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'aviation-compliance-hub';

    const EQUIPMENT_TYPES = ["Drone", "Battery", "Generator", "Controller", "Spray System", "Other"];
    const TIME_ZONES = [
      { label: "Eastern (EST/EDT)", offset: -5 }, { label: "Central (CST/CDT)", offset: -6 },
      { label: "Mountain (MST/MDT)", offset: -7 }, { label: "Pacific (PST/PDT)", offset: -8 }
    ];

    const defaultWorkOrderState = { title: '', customer: '', date: '', acres: '', kmlFileName: '', kmlData: null, status: 'Pending', isScheduled: false, coordType: 'Decimal', latDec: '', lonDec: '', latDMS: { d: '', m: '', s: '', dir: 'N' }, lonDMS: { d: '', m: '', s: '', dir: 'W' } };
    
    // Upgraded Mission Log State variables
    const defaultLogState = { 
      date: new Date().toLocaleDateString('en-CA'), startTime: '08:00', endTime: '10:00', selectedAircraft: [], customer: '', locationName: '', 
      totalAcreage: '', treatedAcreage: '', whatWasTreated: '', targetPest: '', nozzleDesc: 'Atomizer Sprinklers', targetDistance: '', 
      pumpPressure: '', travelSpeed: '', speedUnit: 'ft/sec', driftPractices: '', coordType: 'Decimal', latDec: '', lonDec: '', 
      latDMS: { d: '', m: '', s: '', dir: 'N' }, lonDMS: { d: '', m: '', s: '', dir: 'W' }, coordinates: '', 
      chemical: '', appRate: '', windSpeed: '', windDirection: 'N', temp: '', tempUnit: 'F', humidity: '', 
      incidents: 'None', damageDescription: '', flightTimeValue: '', flightTimeUnit: 'Hours', flightTimeMinutes: '', 
      kmlData: null, kmlFileName: '' 
    };
    
    const defaultMaintState = { date: new Date().toLocaleDateString('en-CA'), equipmentType: 'Drone', customEquipment: '', assetId: '', workPerformed: '' };
    const defaultCertState = { name: 'FAA Part 107', customName: '', licenseNumber: '', state: '', expirationDate: '', owner: '' };
    const defaultCustomerState = { name: '', contactName: '', email: '', phone: '', address: '', city: '', state: '', zip: '', notes: '' };
    const defaultProductState = { name: '', defaultRate: '' };
    const defaultNotamState = { date: new Date().toLocaleDateString('en-CA'), notamNumber: '', script: '', localStartTime: '08:00', duration: '4', radius: '0.5', lat: '0', lon: '0' };

    const formatToNotamDMS = (input, isLon = false) => {
      if (!input) return "000000";
      const parts = input.toString().trim().split(/\s+/);
      let decimal = parts.length >= 2 ? Math.abs(parseFloat(parts[0]) || 0) + ((parseFloat(parts[1]) || 0) / 60) + ((parseFloat(parts[2]) || 0) / 3600) : Math.abs(parseFloat(input));
      if (isNaN(decimal)) return "000000";
      const degrees = Math.floor(decimal), minutes = Math.floor((decimal - degrees) * 60), seconds = Math.round((decimal - degrees - (minutes / 60)) * 3600);
      return `${degrees.toString().padStart(isLon ? 3 : 2, '0')}${minutes.toString().padStart(2, '0')}${seconds.toString().padStart(2, '0')}`;
    };

    const getStatusColor = (status) => {
      switch(status) {
         case 'In Progress': return 'border-blue-500/50 bg-blue-500/10 text-blue-400';
         case 'Paused': return 'border-amber-500/50 bg-amber-500/10 text-amber-500';
         case 'Completed': return 'border-[#9cd33b]/50 bg-[#9cd33b]/10 text-[#9cd33b]';
         case 'Cancelled': return 'border-slate-600 bg-slate-800 text-slate-400';
         default: return 'border-yellow-500/50 bg-yellow-500/10 text-yellow-500'; 
      }
    };

    const copyToClipboard = (text) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.top = "0";
      textArea.style.left = "0";
      textArea.style.position = "fixed";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        document.execCommand('copy');
      } catch (err) {
        console.error('Fallback: Oops, unable to copy', err);
      }
      document.body.removeChild(textArea);
    };

    // ============================================================================
    // 📂 REUSABLE UI COMPONENTS
    // ============================================================================

    const Toast = ({ notification }) => {
      if (!notification.show) return null;
      return (
        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-2xl shadow-2xl font-black uppercase tracking-widest text-[11px] flex items-center gap-3 animate-fade-in ${notification.type === 'error' ? 'bg-red-600 text-white' : notification.type === 'success' ? 'bg-[#9cd33b] text-[#020617]' : 'bg-blue-600 text-white'}`}>
          {notification.type === 'error' ? <AlertTriangle size={16} /> : <ShieldCheck size={16} />}
          {String(notification.message)}
        </div>
      );
    };

    const Card = ({ children, className = "" }) => <div className={`bg-slate-900 border border-slate-800 p-8 rounded-[2rem] shadow-xl ${className}`}>{children}</div>;

    const Button = ({ children, onClick, type="button", variant="primary", className="", disabled=false }) => {
      const base = "px-4 py-3 rounded-2xl font-black uppercase text-[11px] tracking-widest transition-all flex items-center justify-center gap-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.98]";
      const variants = { primary: "bg-[#9cd33b] text-[#020617] hover:bg-[#bce455]", secondary: "bg-slate-800 text-slate-200 hover:bg-slate-700", danger: "bg-red-500/10 text-red-500 hover:bg-red-500/20 border border-red-500/20" };
      return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
    };

    const Input = ({ label, className="", ...props }) => (
      <div className="space-y-2 min-w-0">
        {label && <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest pl-1 truncate block">{label}</label>}
        <input className={`w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none focus:border-[#9cd33b] transition-colors min-w-0 ${className}`} {...props} />
      </div>
    );

    const Select = ({ label, children, className="", ...props }) => (
      <div className="space-y-2 min-w-0">
        {label && <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest pl-1 truncate block">{label}</label>}
        <select className={`w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold text-slate-200 outline-none focus:border-[#9cd33b] transition-colors min-w-0 ${className}`} {...props}>{children}</select>
      </div>
    );

    const TextArea = ({ label, className="", ...props }) => (
      <div className="space-y-2 min-w-0">
        {label && <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest pl-1 truncate block">{label}</label>}
        <textarea className={`w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none focus:border-[#9cd33b] transition-colors h-32 resize-none min-w-0 ${className}`} {...props} />
      </div>
    );

    const FormCard = ({ title, icon: Icon, onSubmit, onCancel, submitLabel, children }) => (
      <div className="space-y-6 animate-fade-in">
        {onCancel && <div className="flex"><button type="button" onClick={onCancel} className="flex items-center gap-2 text-slate-400 hover:text-white font-black text-[10px] uppercase tracking-widest bg-slate-900 border border-slate-800 px-5 py-3 rounded-xl"><X size={14} /> Cancel Edit</button></div>}
        <Card>
          <div className="flex flex-col sm:flex-row sm:items-center gap-3 text-[#9cd33b] font-black uppercase text-xs tracking-widest border-b border-slate-800 pb-6 mb-8 min-w-0">
            <div className="flex items-center gap-3 truncate">{Icon && <Icon size={18} className="shrink-0" />} <span className="truncate">{title}</span></div>
          </div>
          <form onSubmit={onSubmit} className="space-y-8">{children}<div className="pt-6 border-t border-slate-800"><Button type="submit" className="w-full py-5 text-sm">{submitLabel || 'Save Record'}</Button></div></form>
        </Card>
      </div>
    );

    const TableCard = ({ title, icon: Icon, actionLabel, onAction, children }) => (
      <div className="space-y-8 animate-fade-in">
        <Card className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
          <div className="flex items-center gap-4 min-w-0 flex-1">
            <div className="p-4 bg-[#9cd33b]/10 border border-[#9cd33b]/20 rounded-3xl text-[#9cd33b] shrink-0">{Icon && <Icon size={32} />}</div>
            <div className="min-w-0"><h2 className="text-xl font-black uppercase tracking-tighter text-slate-100 truncate">{title}</h2><p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1 truncate">Manage database records</p></div>
          </div>
          {onAction && <Button onClick={onAction} className="w-full md:w-auto shrink-0"><Plus size={16}/> {actionLabel}</Button>}
        </Card>
        <div className="bg-slate-900 border border-slate-800 rounded-[3rem] overflow-hidden shadow-xl"><div className="overflow-x-auto">{children}</div></div>
      </div>
    );

    // ============================================================================
    // 📂 MODULAR TAB COMPONENTS
    // ============================================================================

    const DashboardTab = ({ fleet, company, customUser, logs, maintRecords, updateFleetInfo }) => {
      const [editingDrone, setEditingDrone] = useState(null);

      const addNewDrone = () => {
        const updated = [...fleet, { id: 'NEW-ID', model: 'Model', sn: '0000' }];
        updateFleetInfo(updated); setEditingDrone(updated.length - 1);
      };

      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade-in">
          <Card className="relative group">
            <div className="flex justify-between items-center mb-6">
              <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><Plane size={14} className="text-[#9cd33b]" /> Active Fleet</p>
              {customUser?.role === 'Manager' && <button onClick={addNewDrone} className="bg-[#9cd33b] text-[#020617] p-2 rounded-full hover:bg-[#bce455] transition-all"><Plus size={14}/></button>}
            </div>
            {fleet.map((d, idx) => (
              <div key={idx} className="bg-slate-950 border border-slate-800 p-4 rounded-2xl mb-3 flex flex-col gap-2 min-w-0">
                <div className="flex justify-between items-start gap-4">
                  <div className="min-w-0"><span className="text-sm font-black text-slate-100 block truncate">{String(d.id)}</span><p className="text-[9px] text-slate-500 font-bold uppercase mt-1 truncate">{String(d.model)} | S/N: {String(d.sn)}</p></div>
                  {customUser?.role === 'Manager' && <button onClick={() => setEditingDrone(editingDrone === idx ? null : idx)} className="text-blue-500 hover:text-blue-400 shrink-0 ml-4"><Edit3 size={14}/></button>}
                </div>
                {editingDrone === idx && (
                  <div className="mt-2 pt-4 border-t border-slate-800 space-y-2">
                    <Input placeholder="N-Number" value={fleet[idx].id} onChange={e => { const f = [...fleet]; f[idx].id = e.target.value; updateFleetInfo(f); }} />
                    <Input placeholder="Model" value={fleet[idx].model} onChange={e => { const f = [...fleet]; f[idx].model = e.target.value; updateFleetInfo(f); }} />
                    <Input placeholder="S/N" value={fleet[idx].sn} onChange={e => { const f = [...fleet]; f[idx].sn = e.target.value; updateFleetInfo(f); }} />
                    <div className="flex gap-2 pt-2"><Button variant="secondary" className="flex-1 py-2 text-[9px]" onClick={() => setEditingDrone(null)}>Done</Button><Button variant="danger" className="py-2" onClick={() => { const f = fleet.filter((_, i) => i !== idx); updateFleetInfo(f); setEditingDrone(null); }}><Trash2 size={14}/></Button></div>
                  </div>
                )}
              </div>
            ))}
            {fleet.length === 0 && <p className="text-[10px] text-slate-500 font-bold uppercase text-center py-4">No aircraft in fleet</p>}
          </Card>
          <Card className="min-w-0">
            <p className="text-[10px] font-black text-slate-500 uppercase mb-6 tracking-widest flex items-center gap-2"><User size={14} className="text-[#9cd33b]" /> PIC In-Charge</p>
            <p className="text-xl font-black text-slate-100 uppercase tracking-tight truncate">{String(company.supervisor)}</p>
            <p className="text-xs text-[#9cd33b] font-black mt-2 uppercase tracking-widest truncate">{String(company.name)}</p>
            <p className="text-[10px] text-slate-500 font-mono mt-4 uppercase tracking-widest p-4 bg-slate-950 rounded-xl border border-slate-800 truncate">FAA Exemption: <span className="text-slate-300">{String(company.exemption || 'N/A')}</span></p>
          </Card>
          <Card>
            <p className="text-[10px] font-black text-slate-500 uppercase mb-6 tracking-widest flex items-center gap-2"><History size={14} className="text-[#9cd33b]" /> Database Metrics</p>
            <div className="flex items-baseline gap-4 mb-4"><span className="text-5xl font-black text-[#9cd33b] truncate">{logs.length}</span><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest truncate">Missions Logged</span></div>
            <div className="flex items-baseline gap-4"><span className="text-3xl font-black text-slate-300 truncate">{maintRecords.length}</span><span className="text-[10px] font-black text-slate-500 uppercase tracking-widest truncate">Maintenance Records</span></div>
          </Card>
        </div>
      );
    };

    const SettingsTab = ({ company, setCompany, handleCompanySettingsSave }) => (
      <FormCard title="Command Settings" icon={Settings2} onSubmit={handleCompanySettingsSave} submitLabel="Update Settings">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
          <Input label="Organization Name" value={company.name} onChange={e => setCompany({...company, name: e.target.value})} required/>
          <Input label="FAA Exemption Number" value={company.exemption} onChange={e => setCompany({...company, exemption: e.target.value})} />
          <Input label="Chief Supervisor / Pilot" value={company.supervisor} onChange={e => setCompany({...company, supervisor: e.target.value})} required/>
          <Input label="Part 137 / 107 Cert Number" value={company.certNo} onChange={e => setCompany({...company, certNo: e.target.value})} />
          <Input label="Business Phone" value={company.phone || ''} onChange={e => setCompany({...company, phone: e.target.value})} />
          <Input label="Business Email" type="email" value={company.email || ''} onChange={e => setCompany({...company, email: e.target.value})} />
          <Select label="Local Time Zone" value={company.timezone} onChange={e => setCompany({...company, timezone: parseInt(e.target.value)})}>
             {TIME_ZONES.map(tz => <option className="bg-slate-900" key={tz.offset} value={tz.offset}>{tz.label}</option>)}
          </Select>
          <div className="md:col-span-2"><Input label="Business Address" value={company.address || ''} onChange={e => setCompany({...company, address: e.target.value})} /></div>
        </div>
      </FormCard>
    );

    const ScheduleTab = ({ workOrders, isEditing, state, setState, onCancel, onSubmit, customers, customUser, handleDrop, getStatusColor, deleteItem, notify }) => {
      const [viewMode, setViewMode] = useState('calendar');
      const [calendarBaseDate, setCalendarBaseDate] = useState(new Date());
      const [inlineCustomer, setInlineCustomer] = useState(false);
      const [newCustData, setNewCustData] = useState(defaultCustomerState);
      const [selectedMapJob, setSelectedMapJob] = useState(null);
      const kmlRef = useRef(null);

      const handleKml = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => setState(prev => ({ ...prev, kmlData: ev.target.result, kmlFileName: file.name }));
        reader.readAsDataURL(file);
      };

      const weekDays = Array.from({length: 7}).map((_, i) => { 
        const start = new Date(calendarBaseDate);
        start.setDate(calendarBaseDate.getDate() - calendarBaseDate.getDay());
        const d = new Date(start); d.setDate(start.getDate() + i); return d; 
      });
      
      const scheduleStats = useMemo(() => {
         const endOfWeek = new Date(weekDays[0]); endOfWeek.setDate(weekDays[0].getDate() + 6);
         return {
            unscheduled: workOrders.filter(w => !w.isScheduled).length,
            unscheduledJobs: workOrders.filter(w => !w.isScheduled),
            thisWeekCount: workOrders.filter(w => w.isScheduled && new Date(w.date) >= weekDays[0] && new Date(w.date) <= endOfWeek).length,
            activeCount: workOrders.filter(w => w.status === 'Scheduled' || w.status === 'In Progress').length,
            schedAcres: workOrders.filter(w => w.status === 'Scheduled' || w.status === 'In Progress').reduce((a, w) => a + (parseFloat(w.acres)||0), 0),
            compAcres: workOrders.filter(w => w.status === 'Completed').reduce((a, w) => a + (parseFloat(w.acres)||0), 0)
         };
      }, [workOrders, weekDays]);

      const formatMonthDay = (date) => date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const calendarDateRange = `${formatMonthDay(weekDays[0])} - ${formatMonthDay(weekDays[6])}, ${weekDays[6].getFullYear()}`;

      if (isEditing) {
        return (
          <FormCard title={state.id ? "Edit Work Order" : "Create Work Order"} icon={CalendarDays} onSubmit={(e) => onSubmit(e, inlineCustomer ? newCustData : null)} onCancel={onCancel} submitLabel="Save Schedule">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 min-w-0">
              <Input label="Job Title" value={state.title} onChange={e => setState({...state, title: e.target.value})} required placeholder="e.g. Field 1 Spray"/>
              <Select label="Customer" value={inlineCustomer ? 'ADD_NEW' : state.customer} onChange={e => { if(e.target.value === 'ADD_NEW') setInlineCustomer(true); else { setInlineCustomer(false); setState({...state, customer: e.target.value}); } }} required>
                <option className="bg-slate-900" value="">Select Customer...</option>
                {customers.map(c => <option className="bg-slate-900" key={c.id} value={c.name}>{String(c.name)}</option>)}
                <option className="bg-slate-800 text-[#9cd33b]" value="ADD_NEW">+ Create New Customer</option>
              </Select>
              
              {inlineCustomer && (
                <div className="md:col-span-2 p-6 bg-slate-950 border border-[#9cd33b]/50 rounded-2xl space-y-4 min-w-0">
                  <div className="flex justify-between items-center border-b border-slate-800 pb-4 mb-2">
                    <span className="text-[10px] text-[#9cd33b] font-black uppercase tracking-widest truncate pr-2">New Customer Profile</span>
                    <Button variant="secondary" onClick={() => setInlineCustomer(false)} className="py-2 px-3 shrink-0"><X size={14}/></Button>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <Input label="Company/Farm Name" value={newCustData.name} onChange={e => setNewCustData({...newCustData, name: e.target.value})} required/>
                    <Input label="Contact Name" value={newCustData.contactName} onChange={e => setNewCustData({...newCustData, contactName: e.target.value})}/>
                    <Input label="Email" type="email" value={newCustData.email} onChange={e => setNewCustData({...newCustData, email: e.target.value})}/>
                    <Input label="Phone" value={newCustData.phone} onChange={e => setNewCustData({...newCustData, phone: e.target.value})}/>
                    <div className="md:col-span-2"><Input label="Address" value={newCustData.address} onChange={e => setNewCustData({...newCustData, address: e.target.value})}/></div>
                    <Input label="City" value={newCustData.city} onChange={e => setNewCustData({...newCustData, city: e.target.value})}/>
                    <div className="flex gap-4"><div className="flex-1 min-w-0"><Input label="State" value={newCustData.state} onChange={e => setNewCustData({...newCustData, state: e.target.value})}/></div><div className="flex-1 min-w-0"><Input label="Zip" value={newCustData.zip} onChange={e => setNewCustData({...newCustData, zip: e.target.value})}/></div></div>
                    <div className="md:col-span-2"><TextArea label="Notes" value={newCustData.notes} onChange={e => setNewCustData({...newCustData, notes: e.target.value})}/></div>
                  </div>
                </div>
              )}
              
              <Input type="date" label="Scheduled Date" value={state.date} onChange={e => setState({...state, date: e.target.value})} />
              <Input type="number" label="Acreage" value={state.acres} onChange={e => setState({...state, acres: e.target.value})} required/>
            </div>
            
            <div className="bg-slate-950 p-8 rounded-3xl border border-slate-800 space-y-6 min-w-0">

                     <section key={i} className="space-y-4 pt-6 break-inside-avoid">

    // ============================================================================
    // 📂 MAIN APPLICATION ("The Brain")

    const App = () => {
      const [user, setUser] = useState(null); 
      const [customUser, setCustomUser] = useState(null); 
      const [authMode, setAuthMode] = useState('login'); 
      const [authForm, setAuthForm] = useState({ companyName: '', username: '', password: '', role: 'Pilot' });

      const [notification, setNotification] = useState({ show: false, message: '', type: 'info' });
      const notify = (message, type = 'info') => {
        setNotification({ show: true, message, type });
        setTimeout(() => setNotification(prev => ({ ...prev, show: false })), 4000);
      };

      const [activeTab, setActiveTab] = useState('dashboard');
      const [showFormalReport, setShowFormalReport] = useState(false);
      const [loading, setLoading] = useState(true);

      // Raw Data States
      const [allLogs, setAllLogs] = useState([]);
      const [allCerts, setAllCerts] = useState([]);
      const [allMaintRecords, setAllMaintRecords] = useState([]);
      const [allCustomers, setAllCustomers] = useState([]);
      const [allProducts, setAllProducts] = useState([]);
      const [allNotams, setAllNotams] = useState([]);
      const [allWorkOrders, setAllWorkOrders] = useState([]);

      // Form States
      const [company, setCompany] = useState({ name: 'Compliance Hub', supervisor: 'Lead Pilot', email: '', phone: '', address: '', certNo: '', exemption: '12345', timezone: -6, fleet: [] });
      const [reportMonth, setReportMonth] = useState(new Date().toISOString().slice(0, 7));

      const [notamState, setNotamState] = useState({ ...defaultNotamState, isEditing: false });
      const [maintState, setMaintState] = useState({ ...defaultMaintState, isEditing: false });
      const [certState, setCertState] = useState({ ...defaultCertState, isEditing: false });
      const [customerState, setCustomerState] = useState({ ...defaultCustomerState, isEditing: false });
      const [productState, setProductState] = useState({ ...defaultProductState, isEditing: false });
      const [logState, setLogState] = useState({ ...defaultLogState, isEditing: false });
      const [workOrderState, setWorkOrderState] = useState({ ...defaultWorkOrderState, isEditing: false });

      const kmlInputRef = useRef(null);

      useEffect(() => {
        const initAuth = async () => {
          try { 
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token); } 
            else { await signInAnonymously(auth); } 
          } catch (err) { console.error(err); }
        };
        initAuth();
        return onAuthStateChanged(auth, (u) => { setUser(u); if (!u) setLoading(false); });
      }, []);

      useEffect(() => {
        if (!user) return;
        const qLogs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'flight_logs'), s => setAllLogs(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qWO = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'work_orders'), s => setAllWorkOrders(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qCerts = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'certifications'), s => setAllCerts(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qMaint = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'maintenance_records'), s => setAllMaintRecords(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qCust = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), s => setAllCustomers(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qProd = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), s => setAllProducts(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qNotam = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'notam_logs'), s => setAllNotams(s.docs.map(d => ({id: d.id, ...d.data()}))));
        setLoading(false);
        return () => { qLogs(); qWO(); qCerts(); qMaint(); qCust(); qProd(); qNotam(); };
      }, [user]);

      useEffect(() => {
         if (!customUser) return;
         const compDocId = customUser.companyName.toLowerCase().replace(/[^a-z0-9]/g, '-');
         return onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'saas_companies', compDocId), (snap) => {
            if (snap.exists()) setCompany(snap.data()); 
         });
      }, [customUser]);

      const logs = useMemo(() => allLogs.filter(l => l.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>new Date(b.date)-new Date(a.date)), [allLogs, customUser]);
      const workOrders = useMemo(() => allWorkOrders.filter(w => w.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()), [allWorkOrders, customUser]);
      const customers = useMemo(() => allCustomers.filter(c => c.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>a.name.localeCompare(b.name)), [allCustomers, customUser]);
      const products = useMemo(() => allProducts.filter(p => p.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>a.name.localeCompare(b.name)), [allProducts, customUser]);
      const certs = useMemo(() => allCerts.filter(c => c.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()), [allCerts, customUser]);
      const maintRecords = useMemo(() => allMaintRecords.filter(m => m.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>new Date(b.date)-new Date(a.date)), [allMaintRecords, customUser]);
      const notamLogs = useMemo(() => allNotams.filter(n => n.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>new Date(b.date)-new Date(a.date)), [allNotams, customUser]);

      const genericSubmit = async (e, col, stateObj, setFn, defaultState, msg) => {
        e.preventDefault(); if (!customUser) return;
        const finalData = { ...stateObj, companyName: customUser.companyName, timestamp: stateObj.timestamp || new Date().toISOString() };
        delete finalData.isEditing;
        try {
          if (stateObj.id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', col, stateObj.id), finalData);
          else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', col), finalData);
          setFn({...defaultState, isEditing: false}); notify(msg, "success");
        } catch (err) { notify("Error saving.", "error"); }
      };

      const deleteItem = async (col, id) => {
        if (!window.confirm("Delete record?")) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id)); notify("Deleted", "info");
      };

      const handleLogin = async (e) => {
         e.preventDefault();
         if (!user) return notify("Secure connection failed.", "error");
         const cName = authForm.companyName?.trim().toLowerCase();
         const uName = authForm.username?.trim().toLowerCase();
         
         const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'saas_users'));
         
         const found = snap.docs.map(d => d.data()).find(u => {
            return u.companyName?.toLowerCase() === cName && u.username?.toLowerCase() === uName && u.password === authForm.password;
         });
         
         if (found) { 
           setCustomUser(found); 
           setActiveTab(found.role === 'Dispatcher' ? 'schedule' : 'dashboard'); 
           notify("Welcome back", 'success'); 
         } else {
           notify("Invalid credentials.", "error");
         }
      };

      const handleRegister = async (e) => {
         e.preventDefault();
         if (!user) return notify("Secure connection failed.", "error");
         const cName = authForm.companyName?.trim();
         const uName = authForm.username?.trim();
         const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'saas_users'));
         if (snap.docs.map(d=>d.data()).find(u => u.companyName?.toLowerCase() === cName.toLowerCase() && u.username?.toLowerCase() === uName.toLowerCase())) return notify("Username exists.", "error");
         
         const newUser = { companyName: cName, username: uName, password: authForm.password, role: authForm.role };
         await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'saas_users'), newUser);
         if (authForm.role === 'Manager') {
            const cId = cName.toLowerCase().replace(/[^a-z0-9]/g, '-');
            const cDoc = doc(db, 'artifacts', appId, 'public', 'data', 'saas_companies', cId);
            const cDocSnap = await getDoc(cDoc);
            if (!cDocSnap.exists()) await setDoc(cDoc, { name: cName, supervisor: uName, email: '', phone: '', address: '', certNo: '', exemption: '12345', timezone: -6, fleet: [] });
         }
         setCustomUser(newUser); setActiveTab(newUser.role === 'Dispatcher' ? 'schedule' : 'dashboard'); notify("User created.", "success");
      };

      if (loading) return <div className="flex h-screen items-center justify-center bg-slate-950 text-[#9cd33b] font-black uppercase tracking-widest">Initializing...</div>;

      if (!customUser) {
        return (
          <div className="flex h-screen items-center justify-center p-6 bg-slate-950 relative">
            <Toast notification={notification} />
            <Card className="w-full max-w-md space-y-8 animate-fade-in border-[#9cd33b]/20">
               <div className="text-center flex flex-col items-center">
                  <div className="w-20 h-20 bg-[#9cd33b]/10 rounded-full flex items-center justify-center mb-6 border border-[#9cd33b]/30 shadow-[0_0_30px_rgba(156,211,59,0.15)]"><Lock className="text-[#9cd33b]" size={32} /></div>
                  <h1 className="text-3xl font-black uppercase tracking-widest text-slate-100">Ops Portal</h1>
                  <p className="text-[#9cd33b] text-[10px] font-black uppercase tracking-widest mt-2">{authMode === 'login' ? 'Secure Login' : 'Register Access'}</p>
               </div>
               <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} className="space-y-4">
                  <Input label="Company Code" value={authForm.companyName} onChange={e => setAuthForm({...authForm, companyName: e.target.value})} required/>
                  <Input label="Username" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} required/>
                  <Input label="Password" type="password" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} required/>
                  {authMode === 'register' && <Select label="Role" value={authForm.role} onChange={e => setAuthForm({...authForm, role: e.target.value})}><option value="Pilot">Pilot</option><option value="Manager">Manager</option><option value="Dispatcher">Dispatcher</option></Select>}
                  <Button type="submit" className="w-full py-4 mt-6">{authMode === 'login' ? 'Login' : 'Create Key'} <ArrowRight size={16}/></Button>
               </form>
               <div className="text-center pt-6 border-t border-slate-800"><button type="button" onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="text-[10px] text-slate-500 hover:text-slate-300 uppercase font-black tracking-widest transition-colors">{authMode === 'login' ? 'Need an account? Register Here' : 'Already have access? Login Here'}</button></div>
            </Card>
          </div>
        );
      }

      const tabs = [
        ...(customUser.role !== 'Dispatcher' ? [{ id: 'dashboard', icon: ShieldCheck, label: 'Dashboard' }] : []),
        { id: 'schedule', icon: CalendarDays, label: 'Schedule' },
        { id: 'customers', icon: Users, label: 'Customers' },
        { id: 'products', icon: FlaskConical, label: 'Products' },
        ...(customUser.role !== 'Dispatcher' ? [
           { id: 'certifications', icon: Award, label: 'Certifications' }, { id: 'maintenance', icon: Wrench, label: 'Maintenance' },
           { id: 'log', icon: FileText, label: 'Mission Log' }, { id: 'notam', icon: Navigation, label: 'NOTAM Tool' },
           { id: 'faa-report', icon: FileBarChart, label: 'FAA Report' }
        ] : []),
        ...(customUser.role === 'Manager' ? [{ id: 'settings', icon: Settings2, label: 'Settings' }] : [])
      ];

      return (
        <div className="flex h-screen bg-slate-950 overflow-hidden font-sans selection:bg-[#9cd33b] selection:text-[#020617]">
          <Toast notification={notification} />
          <div className="w-20 lg:w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 print:hidden z-30 shadow-2xl">
            <div className="p-6 border-b border-slate-800 min-w-0"><h1 className="hidden lg:block font-black text-[#9cd33b] text-xl uppercase tracking-tighter truncate">{company.name || 'Compliance Hub'}</h1><ShieldCheck className="lg:hidden mx-auto text-[#9cd33b] shrink-0" size={24}/></div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
              {tabs.map(t => {
                const Icon = t.icon;
                return (
                  <button key={t.id} onClick={() => {setActiveTab(t.id); setShowFormalReport(false);}} className={`w-full flex items-center justify-center lg:justify-start p-3 rounded-2xl transition-all min-w-0 ${activeTab === t.id ? 'bg-[#9cd33b] text-[#020617] shadow-lg' : 'hover:bg-slate-800 text-slate-400 hover:text-slate-200'}`}>
                     <Icon size={18} className="shrink-0"/>
                     <span className="hidden lg:inline text-[11px] font-black uppercase tracking-widest ml-4 truncate">{t.label}</span>
                  </button>
                );
              })}
            </nav>
            <div className="p-4 border-t border-slate-800 space-y-3 min-w-0"><div className="hidden lg:flex flex-col min-w-0"><span className="text-[10px] text-slate-400 font-bold uppercase truncate">{customUser.username}</span><span className="text-[9px] text-[#9cd33b] font-black uppercase tracking-widest truncate">{customUser.role}</span></div><button onClick={() => {setCustomUser(null); setAuthForm({...authForm, password: ''});}} className="w-full p-3 flex items-center justify-center lg:justify-start rounded-xl text-red-500 hover:bg-red-500/10 transition-all min-w-0"><LogOut size={16} className="shrink-0"/><span className="hidden lg:inline text-[10px] font-black uppercase tracking-widest ml-3 truncate">Sign Out</span></button></div>
          </div>
          <main className="flex-1 overflow-y-auto p-6 lg:p-10 relative z-20 min-w-0">
            {activeTab === 'dashboard' && <DashboardTab fleet={company.fleet || []} company={company} customUser={customUser} logs={logs} maintRecords={maintRecords} updateFleetInfo={f => { setCompany({...company, fleet: f}); updateDoc(doc(db,'artifacts',appId,'public','data','saas_companies',customUser.companyName.toLowerCase().replace(/[^a-z0-9]/g,'-')), {fleet: f}); }} />}
            {activeTab === 'settings' && <SettingsTab company={company} setCompany={setCompany} handleCompanySettingsSave={async e => { e.preventDefault(); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'saas_companies', customUser.companyName.toLowerCase().replace(/[^a-z0-9]/g, '-')), company); notify("Settings Saved", "success"); }} />}
            {activeTab === 'customers' && <CustomersTab items={customers} isEditing={customerState.isEditing} state={customerState} setState={setCustomerState} onSubmit={e => genericSubmit(e, 'customers', customerState, setCustomerState, defaultCustomerState, "Customer Saved")} onCancel={() => setCustomerState({...defaultCustomerState, isEditing: false})} onDelete={deleteItem} />}
            {activeTab === 'products' && <ProductsTab items={products} isEditing={productState.isEditing} state={productState} setState={setProductState} onSubmit={e => genericSubmit(e, 'products', productState, setProductState, defaultProductState, "Product Saved")} onCancel={() => setProductState({...defaultProductState, isEditing: false})} onDelete={deleteItem} />}
            {activeTab === 'maintenance' && <MaintenanceTab items={maintRecords} isEditing={maintState.isEditing} state={maintState} setState={setMaintState} onSubmit={e => genericSubmit(e, 'maintenance_records', {...maintState, picUsername: customUser.username}, setMaintState, defaultMaintState, "Log Saved")} onCancel={() => setMaintState({...defaultMaintState, isEditing: false})} onDelete={deleteItem} />}
            {activeTab === 'certifications' && <CertificationsTab items={certs} company={company} isEditing={certState.isEditing} state={certState} setState={setCertState} onSubmit={e => genericSubmit(e, 'certifications', {...certState, picUsername: customUser.username}, setCertState, defaultCertState, "Cert Saved")} onCancel={() => setCertState({...defaultCertState, isEditing: false})} onDelete={deleteItem} />}
            
            {activeTab === 'notam' && (
              <NotamTab 
                 notams={notamLogs} isEditing={notamState.isEditing} state={notamState} setState={setNotamState} 
                 derived={{ utcStart: `${((new Date(notamState.date + 'T' + (notamState.localStartTime || '08:00')).getHours() - (company.timezone || -6) + 24) % 24).toString().padStart(2, '0')}${new Date(notamState.date + 'T' + (notamState.localStartTime || '08:00')).getMinutes().toString().padStart(2, '0')}` }} 
                 generate={() => `!FDC UAS ... ${company.name?.toUpperCase() || 'ORG'}. ${notamState.date} AIRSPACE UAS WI AN AREA DEFINED AS ${notamState.radius}NM RADIUS OF ${formatToNotamDMS(notamState.lat, false)}N${formatToNotamDMS(notamState.lon, true)}W SFC-200FT AGL. PURSUANT TO EXEMPTION ${company.exemption || 'TBD'}.`} 
                 onSubmit={e => genericSubmit(e, 'notam_logs', {...notamState, picUsername: customUser.username}, setNotamState, defaultNotamState, "NOTAM Archived")} 
                 onCancel={() => setNotamState({...defaultNotamState, isEditing: false})} onDelete={deleteItem} notify={notify} 
              />
            )}
            
            {activeTab === 'faa-report' && <FaaReportTab company={company} fleet={company.fleet || []} monthlyReport={{ logs: logs.filter(l => l.date && l.date.startsWith(reportMonth)), totalHours: (logs.filter(l => l.date && l.date.startsWith(reportMonth)).reduce((a, l) => a + (parseFloat(l.flightTimeMinutes)||0), 0)/60).toFixed(2), flightCount: logs.filter(l => l.date && l.date.startsWith(reportMonth)).length }} reportMonth={reportMonth} setReportMonth={setReportMonth} showFormalReport={showFormalReport} setShowFormalReport={setShowFormalReport} user={user} notify={notify} />}
            
            {activeTab === 'schedule' && (
              <ScheduleTab 
                workOrders={workOrders} isEditing={workOrderState.isEditing} state={workOrderState} setState={setWorkOrderState} 
                onSubmit={async (e, newCust) => { 
                  e.preventDefault(); 
                  let c = workOrderState.customer;
                  if (newCust) { c = newCust; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), { name: c, companyName: customUser.companyName, timestamp: new Date().toISOString() }); }
                  let lat=workOrderState.latDec, lon=workOrderState.lonDec;
                  if(workOrderState.coordType==='DMS') { lat=(parseFloat(workOrderState.latDMS.d||0)+parseFloat(workOrderState.latDMS.m||0)/60+parseFloat(workOrderState.latDMS.s||0)/3600)*(workOrderState.latDMS.dir==='S'?-1:1); lon=(parseFloat(workOrderState.lonDMS.d||0)+parseFloat(workOrderState.lonDMS.m||0)/60+parseFloat(workOrderState.lonDMS.s||0)/3600)*(workOrderState.lonDMS.dir==='W'?-1:1); }
                  const finalData = {...workOrderState, customer: c, finalLat: lat, finalLon: lon, isScheduled: !!workOrderState.date, companyName: customUser.companyName, creator: workOrderState.id ? workOrderState.creator : customUser.username}; delete finalData.isEditing;
                  if(workOrderState.id) await updateDoc(doc(db,'artifacts',appId,'public','data','work_orders',workOrderState.id), finalData); else await addDoc(collection(db,'artifacts',appId,'public','data','work_orders'), finalData);
                  setWorkOrderState({...defaultWorkOrderState, isEditing: false}); notify("Order Saved", "success");
                }} 
                onCancel={() => setWorkOrderState({...defaultWorkOrderState, isEditing: false})} customers={customers}
                deleteItem={deleteItem} customUser={customUser} getStatusColor={getStatusColor} notify={notify}
                handleDrop={async (e, d) => { const id=e.dataTransfer.getData('text/plain'); if(!id) return; await updateDoc(doc(db,'artifacts',appId,'public','data','work_orders',id),{date:d.toLocaleDateString('en-CA'),isScheduled:true,status:'Scheduled'}); notify("Scheduled", "success"); }}
              />
            )}
            
            {activeTab === 'log' && (
              <MissionLogTab 
                logs={logs} fleet={company.fleet || []} customers={customers} products={products} isEditing={logState.isEditing} state={logState} setState={setLogState} 
                onSubmit={e => {
                  e.preventDefault();
                  
                  // Compute flight time minutes for the backend FAA report
                  let mins = parseFloat(logState.flightTimeValue) || 0;
                  if (logState.flightTimeUnit === 'Hours') mins = mins * 60;
                  
                  // Compute final coordinates
                  let lat = logState.latDec, lon = logState.lonDec;
                  if(logState.coordType === 'DMS') { 
                    lat = (parseFloat(logState.latDMS.d||0)+parseFloat(logState.latDMS.m||0)/60+parseFloat(logState.latDMS.s||0)/3600)*(logState.latDMS.dir==='S'?-1:1); 
                    lon = (parseFloat(logState.lonDMS.d||0)+parseFloat(logState.lonDMS.m||0)/60+parseFloat(logState.lonDMS.s||0)/3600)*(logState.lonDMS.dir==='W'?-1:1); 
                  }
                  let finalCoords = logState.coordType === 'Decimal' ? `${lat}, ${lon}` : `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                  
                  const finalState = {
                      ...logState,
                      picUsername: customUser.username,
                      flightTimeMinutes: mins, // Used by FAA report calc
                      coordinates: finalCoords,
                      finalLat: lat,
                      finalLon: lon
                  };
                  genericSubmit(e, 'flight_logs', finalState, setLogState, defaultLogState, "Mission Logged");
                }} 
                onCancel={() => setLogState({...defaultLogState, isEditing: false})} onDelete={deleteItem} kmlRef={kmlInputRef} 
                handleKml={(e,s)=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=(ev)=>s(p=>({...p,kmlData:ev.target.result,kmlFileName:file.name}));r.readAsDataURL(file);}}
              />
            )}
          </main>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
