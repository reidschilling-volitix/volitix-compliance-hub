<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ShieldCheck, Plane, Plus, History, Navigation, User, CheckCircle2, 
      Droplets, ClipboardCheck, FileCode, Paperclip, X, FlaskConical, 
      AlertTriangle, LayoutTemplate, Trash2, Clock, MapPin,

      Users, ChevronLeft, ChevronRight, Target, GripVertical, Map as MapIcon, Send, Cloud
    } from 'lucide-react';

    import { initializeApp } from 'firebase/app';
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, setDoc, getDocs, getDoc, updateDoc, enableIndexedDbPersistence } from 'firebase/firestore';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';

    // ============================================================================
    // 📂 CONFIG & CONSTANTS
    // ============================================================================

    // 🔥 REPLACE WITH YOUR FIREBASE KEYS FOR GITHUB DEPLOYMENT 🔥
    const fallbackConfig = {
      apiKey: "AIzaSyBiW4z1vIMlznLsHs-Xhz44chOYkiYVBKI",
      authDomain: "spray-drone-compliance-hub.firebaseapp.com",
      projectId: "spray-drone-compliance-hub",
      storageBucket: "spray-drone-compliance-hub.firebasestorage.app",
      messagingSenderId: "565689528030",
      appId: "1:565689528030:web:3e405f9d0ff30b02061c4f",
      measurementId: "G-J3QZKLGNX1"
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'aviation-compliance-hub';

    // 🔥 INITIALIZE PWA OFFLINE MODE (Data Caching) 🔥
    try {
       enableIndexedDbPersistence(db).catch((err) => {
           console.warn("Offline persistence warning:", err.code);
       });
    } catch (e) {}

    const EQUIPMENT_TYPES = ["Drone", "Battery", "Generator", "Controller", "Spray System", "Other"];
    const TIME_ZONES = [
      { label: "Eastern (EST/EDT)", offset: -5 }, { label: "Central (CST/CDT)", offset: -6 },
      { label: "Mountain (MST/MDT)", offset: -7 }, { label: "Pacific (PST/PDT)", offset: -8 }
    ];

    const defaultWorkOrderState = { title: '', customer: '', date: '', acres: '', kmlFileName: '', kmlData: null, status: 'Pending', isScheduled: false, coordType: 'Decimal', latDec: '', lonDec: '', latDecDir: 'N', lonDecDir: 'W', latDMS: { d: '', m: '', s: '', dir: 'N' }, lonDMS: { d: '', m: '', s: '', dir: 'W' } };
    
    const defaultLogState = { 
      date: new Date().toLocaleDateString('en-CA'), startTime: '08:00', endTime: '10:00', selectedAircraft: [], customer: '', locationName: '', 
      totalAcreage: '', treatedAcreage: '', whatWasTreated: 'Corn', customCrop: '', targetPest: '', nozzleDesc: 'Atomizer Sprinklers', targetDistance: '', 
      pumpPressure: '', travelSpeed: '', speedUnit: 'mph', driftPractices: '', coordType: 'Decimal', latDec: '', lonDec: '', latDecDir: 'N', lonDecDir: 'W', 
      latDMS: { d: '', m: '', s: '', dir: 'N' }, lonDMS: { d: '', m: '', s: '', dir: 'W' }, coordinates: '', 
      chemical: '', appRate: '', windSpeed: '', windDirection: 'N', temp: '', tempUnit: 'F', humidity: '', 
      incidents: 'None', damageDescription: '', flightTimeValue: '', flightTimeUnit: 'Hours', flightTimeMinutes: '', 
      kmlData: null, kmlFileName: '' 
    };
    
    const defaultMaintState = { date: new Date().toLocaleDateString('en-CA'), equipmentType: 'Drone', customEquipment: '', assetId: '', workPerformed: '' };
    const defaultCertState = { name: 'FAA Part 107', customName: '', licenseNumber: '', state: '', expirationDate: '', owner: '' };
    const defaultCustomerState = { name: '', contactName: '', email: '', phone: '', address: '', city: '', state: '', zip: '', notes: '' };
    const defaultProductState = { name: '', defaultRate: '', inventory: '', description: '' };
    const defaultNotamState = { date: new Date().toLocaleDateString('en-CA'), notamNumber: '', script: '', localStartTime: '08:00', duration: '4', radius: '0.5', coordType: 'Decimal', latDec: '', lonDec: '', latDecDir: 'N', lonDecDir: 'W', latDMS: { d: '', m: '', s: '', dir: 'N' }, lonDMS: { d: '', m: '', s: '', dir: 'W' } };

    const formatToNotamDMS = (input, isLon = false) => {
      if (!input) return "000000";
      const parts = input.toString().trim().split(/\s+/);
      let decimal = parts.length >= 2 ? Math.abs(parseFloat(parts[0]) || 0) + ((parseFloat(parts[1]) || 0) / 60) + ((parseFloat(parts[2]) || 0) / 3600) : Math.abs(parseFloat(input));
      if (isNaN(decimal)) return "000000";
      const degrees = Math.floor(decimal), minutes = Math.floor((decimal - degrees) * 60), seconds = Math.round((decimal - degrees - (minutes / 60)) * 3600);
      return `${degrees.toString().padStart(isLon ? 3 : 2, '0')}${minutes.toString().padStart(2, '0')}${seconds.toString().padStart(2, '0')}`;
    };

    const getStatusColor = (status) => {
      switch(status) {
         case 'In Progress': return 'border-blue-500/50 bg-blue-500/10 text-blue-400';
         case 'Paused': return 'border-amber-500/50 bg-amber-500/10 text-amber-500';
         case 'Completed': return 'border-[#9cd33b]/50 bg-[#9cd33b]/10 text-[#9cd33b]';
         case 'Cancelled': return 'border-slate-600 bg-slate-800 text-slate-400';
         default: return 'border-yellow-500/50 bg-yellow-500/10 text-yellow-500'; 
      }
    };

    const copyToClipboard = (text) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.top = "0";
      textArea.style.left = "0";
      textArea.style.position = "fixed";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        document.execCommand('copy');
      } catch (err) {
        console.error('Fallback: Oops, unable to copy', err);
      }
      document.body.removeChild(textArea);
    };

    // ============================================================================
    // 📂 REUSABLE UI COMPONENTS
    // ============================================================================

    const GlobalStyles = () => (
      <style>{`
        body { background-color: #020617 !important; color: #e2e8f0 !important; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        @media print { body { background: white !important; color: black !important; } .print\\:hidden { display: none !important; } .print\\:p-0 { padding: 0 !important; } .print\\:shadow-none { box-shadow: none !important; } .print\\:border-none { border: none !important; } }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      `}</style>
    );

    const Toast = ({ notification }) => {
      if (!notification.show) return null;
      return (
        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-2xl shadow-2xl font-black uppercase tracking-widest text-[11px] flex items-center gap-3 animate-fade-in ${notification.type === 'error' ? 'bg-red-600 text-white' : notification.type === 'success' ? 'bg-[#9cd33b] text-[#020617]' : 'bg-blue-600 text-white'}`}>
          {notification.type === 'error' ? <AlertTriangle size={16} /> : <ShieldCheck size={16} />}
          {String(notification.message)}
        </div>
      );
    };

    const Card = ({ children, className = "" }) => <div className={`bg-slate-900 border border-slate-800 p-8 rounded-[2rem] shadow-xl ${className}`}>{children}</div>;

    const Button = ({ children, onClick, type="button", variant="primary", className="", disabled=false }) => {
      const base = "px-4 py-3 rounded-2xl font-black uppercase text-[11px] tracking-widest transition-all flex items-center justify-center gap-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.98]";
      const variants = { primary: "bg-[#9cd33b] text-[#020617] hover:bg-[#bce455]", secondary: "bg-slate-800 text-slate-200 hover:bg-slate-700", danger: "bg-red-500/10 text-red-500 hover:bg-red-500/20 border border-red-500/20" };
      return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
    };

    const Input = ({ label, className="", rightElement, type="text", ...props }) => (
      <div className="space-y-2 min-w-0">
        {label && <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest pl-1 truncate block">{label}</label>}
        <div className="relative">
          <input type={type} className={`w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none focus:border-[#9cd33b] transition-colors min-w-0 ${className} ${rightElement ? 'pr-12' : ''}`} {...props} />
          {rightElement && <div className="absolute right-4 top-1/2 -translate-y-1/2 flex items-center">{rightElement}</div>}
        </div>
      </div>
    );

    const Select = ({ label, children, className="", ...props }) => (
      <div className="space-y-2 min-w-0">
        {label && <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest pl-1 truncate block">{label}</label>}
        <select className={`w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold text-slate-200 outline-none focus:border-[#9cd33b] transition-colors min-w-0 ${className}`} {...props}>{children}</select>
      </div>
    );

    const TextArea = ({ label, className="", ...props }) => (
      <div className="space-y-2 min-w-0">
        {label && <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest pl-1 truncate block">{label}</label>}
        <textarea className={`w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none focus:border-[#9cd33b] transition-colors h-32 resize-none min-w-0 ${className}`} {...props} />
      </div>
    );

    const FormCard = ({ title, icon: Icon, onSubmit, onCancel, submitLabel, children }) => (
      <div className="space-y-6 animate-fade-in">
        {onCancel && <div className="flex"><button type="button" onClick={onCancel} className="flex items-center gap-2 text-slate-400 hover:text-white font-black text-[10px] uppercase tracking-widest bg-slate-900 border border-slate-800 px-5 py-3 rounded-xl"><X size={14} /> Cancel Edit</button></div>}
        <Card>
          <div className="flex items-center gap-3 text-[#9cd33b] font-black uppercase text-xs tracking-widest border-b border-slate-800 pb-6 mb-8 flex-wrap">
            {Icon && <Icon size={18} className="shrink-0" />} <span className="truncate">{title}</span>
          </div>
          <form onSubmit={onSubmit} className="space-y-8">{children}<div className="pt-6 border-t border-slate-800"><Button type="submit" className="w-full py-5 text-sm">{submitLabel || 'Save Record'}</Button></div></form>
        </Card>
      </div>
    );

    const TableCard = ({ title, icon: Icon, actionLabel, onAction, secondaryActionLabel, onSecondaryAction, children }) => (
      <div className="space-y-8 animate-fade-in">
        <Card className="flex flex-col md:flex-row justify-between items-center gap-6">
          <div className="flex items-center gap-4 min-w-0 flex-1">
            <div className="p-4 bg-[#9cd33b]/10 border border-[#9cd33b]/20 rounded-3xl text-[#9cd33b] shrink-0">{Icon && <Icon size={32} />}</div>
            <div className="min-w-0"><h2 className="text-xl font-black uppercase tracking-tighter text-slate-100 truncate">{title}</h2><p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1 truncate">Manage database records</p></div>
          </div>
          <div className="flex flex-wrap gap-3 w-full md:w-auto shrink-0">
            {onSecondaryAction && <Button variant="secondary" onClick={onSecondaryAction}>{secondaryActionLabel}</Button>}
            {onAction && <Button onClick={onAction} className="flex-1 md:flex-none"><Plus size={16}/> {actionLabel}</Button>}
          </div>
        </Card>
        <div className="bg-slate-900 border border-slate-800 rounded-[3rem] overflow-hidden shadow-xl"><div className="overflow-x-auto">{children}</div></div>
      </div>
    );

    // ============================================================================
    // 📂 LEAFLET MAP COMPONENT (LIVE KML)
    // ============================================================================
    
    const LeafletMap = ({ lat, lon, kmlData }) => {
      const mapContainerRef = useRef(null);
      const mapInstanceRef = useRef(null);

      useEffect(() => {
        if (!mapContainerRef.current) return;
        
        // Initialize map only once
        if (!mapInstanceRef.current) {
           mapInstanceRef.current = window.L.map(mapContainerRef.current, {
              zoomControl: false // keep it clean
           }).setView([lat || 39.82, lon || -98.57], lat ? 15 : 4);
           
           // Dark mode satellite tiles
           window.L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
              attribution: 'Tiles &copy; Esri',
              className: 'map-tiles'
           }).addTo(mapInstanceRef.current);
        }

        const map = mapInstanceRef.current;

        // Clear existing markers and KML layers
        map.eachLayer((layer) => {
           if (layer instanceof window.L.Marker || layer instanceof window.L.GeoJSON) {
              map.removeLayer(layer);
           }
        });

        // Add standard pin if lat/lon exist
        if (lat && lon) {
           window.L.marker([lat, lon]).addTo(map);
           map.setView([lat, lon], 15);
        }

        // Try parsing KML if it exists
        if (kmlData && window.omnivore) {
           try {
               const customStyle = window.L.geoJson(null, {
                   style: function() { return { color: '#9cd33b', weight: 3, opacity: 1, fillColor: '#9cd33b', fillOpacity: 0.3 }; }
               });
               
               // Omnivore parses raw XML strings natively
               const runLayer = window.omnivore.kml.parse(kmlData, null, customStyle);
               runLayer.addTo(map);
               
               // Fit map to KML bounds
               setTimeout(() => {
                 if (runLayer.getBounds().isValid()) {
                     map.fitBounds(runLayer.getBounds());
                 }
               }, 100);
           } catch(e) {
               console.error('KML Parse error', e);
           }
        }
      }, [lat, lon, kmlData]);

      return <div ref={mapContainerRef} className="w-full h-full rounded-[2.5rem] overflow-hidden bg-slate-900 border border-slate-800" style={{minHeight: '300px', zIndex: 1}} />;
    };

    // ============================================================================
    // 📂 MODULAR TAB COMPONENTS
    // ============================================================================

    const DashboardTab = ({ fleet, company, customUser, logs, maintRecords }) => {
      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade-in">
          <Card className="relative group">
            <div className="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
              <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><Plane size={14} className="text-[#9cd33b]" /> Active Fleet</p>
            </div>
            {fleet.map((d, idx) => (
              <div key={idx} className="bg-slate-950 border border-slate-800 p-4 rounded-2xl mb-3 flex flex-col gap-2 min-w-0 shadow-sm">
                <div className="flex justify-between items-start gap-4">
                  <div className="min-w-0"><span className="text-sm font-black text-slate-100 block truncate">{String(d.id)}</span><p className="text-[9px] text-slate-500 font-bold uppercase mt-1 truncate">{String(d.model)} | S/N: {String(d.sn)}</p></div>
                </div>
              </div>
            ))}
            {fleet.length === 0 && <p className="text-[10px] text-slate-500 font-bold uppercase text-center py-4">No aircraft in fleet</p>}

          <Card className="min-w-0">

            <p className="text-xl font-black text-slate-100 uppercase tracking-tight truncate">{String(company.supervisor)}</p>
            <p className="text-xs text-[#9cd33b] font-black mt-2 uppercase tracking-widest truncate">{String(company.name)}</p>
            <p className="text-[10px] text-slate-500 font-mono mt-4 uppercase tracking-widest p-4 bg-slate-950 rounded-xl border border-slate-800 truncate">FAA Exemption: <span className="text-slate-300">{String(company.exemption || 'N/A')}</span></p>
          </Card>
          <Card>
            <p className="text-[10px] font-black text-slate-500 uppercase mb-6 tracking-widest flex items-center gap-2"><History size={14} className="text-[#9cd33b]" /> Database Metrics</p>
            <div className="flex items-baseline gap-4 mb-4"><span className="text-5xl font-black text-[#9cd33b] truncate">{logs.length}</span><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest truncate">Missions Logged</span></div>
            <div className="flex items-baseline gap-4"><span className="text-3xl font-black text-slate-300 truncate">{maintRecords.length}</span><span className="text-[10px] font-black text-slate-500 uppercase tracking-widest truncate">Maintenance Records</span></div>
          </Card>
        </div>
      );
    };

    const FleetTab = ({ company, setCompany, customUser, notify }) => {
      const [editingDrone, setEditingDrone] = useState(null);

      const addNewDrone = async () => {
        const newId = `N-${Math.floor(1000 + Math.random() * 9000)}`;
        const updated = [...(company.fleet || []), { id: newId, model: 'Model', sn: '0000' }];
        setCompany({...company, fleet: updated}); 
        setEditingDrone(updated.length - 1);
      };

      const saveFleet = async (f) => {
         setCompany({...company, fleet: f});
      };

      return (
        <div className="space-y-8 animate-fade-in min-w-0">
          <Card className="flex flex-col md:flex-row justify-between items-center gap-6">
            <div className="flex items-center gap-4 min-w-0 flex-1">
              <div className="p-4 bg-[#9cd33b]/10 border border-[#9cd33b]/20 rounded-3xl text-[#9cd33b] shrink-0"><Plane size={32} /></div>
              <div className="min-w-0"><h2 className="text-xl font-black uppercase tracking-tighter text-slate-100 truncate">Aircraft Fleet</h2><p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1 truncate">Manage deployed aircraft</p></div>
            </div>
            {customUser?.role === 'Manager' && <Button onClick={addNewDrone} className="w-full md:w-auto shrink-0"><Plus size={16}/> Register Aircraft</Button>}
          </Card>
          
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
             {(company.fleet || []).map((d, idx) => (
                <div key={idx} className="bg-slate-900 border border-slate-800 p-6 rounded-[2rem] flex flex-col gap-2 min-w-0 shadow-xl relative">
                   <div className="flex justify-between items-start gap-4">
                     <div className="min-w-0">
                       <span className="text-2xl font-black text-slate-100 block truncate">{String(d.id)}</span>
                       <p className="text-sm text-[#9cd33b] font-bold uppercase mt-1 truncate">{String(d.model)}</p>
                       <p className="text-[10px] text-slate-500 font-mono mt-1 truncate">S/N: {String(d.sn)}</p>
                     </div>
                     {customUser?.role === 'Manager' && <button onClick={() => setEditingDrone(editingDrone === idx ? null : idx)} className={`shrink-0 p-3 rounded-xl transition-colors ${editingDrone === idx ? 'bg-slate-800 text-white' : 'text-blue-500 bg-blue-500/10 hover:bg-blue-500/20'}`}><Edit3 size={16}/></button>}
                   </div>
                   {editingDrone === idx && (
                     <div className="mt-4 pt-6 border-t border-slate-800 space-y-4">
                       <Input label="N-Number" placeholder="N-Number" value={d.id} onChange={e => { const f = [...company.fleet]; f[idx].id = e.target.value; setCompany({...company, fleet: f}); }} />
                       <Input label="Model" placeholder="Model" value={d.model} onChange={e => { const f = [...company.fleet]; f[idx].model = e.target.value; setCompany({...company, fleet: f}); }} />
                       <Input label="Serial Number" placeholder="S/N" value={d.sn} onChange={e => { const f = [...company.fleet]; f[idx].sn = e.target.value; setCompany({...company, fleet: f}); }} />
                       <div className="flex gap-3 pt-4 border-t border-slate-800">
                         <Button variant="secondary" className="flex-1 py-4 text-xs" onClick={() => { setEditingDrone(null); saveFleet(company.fleet); }}>Close</Button>
                         <Button variant="danger" className="py-4 px-6 shrink-0" onClick={() => { const f = company.fleet.filter((_, i) => i !== idx); saveFleet(f); setEditingDrone(null); }}><Trash2 size={16}/></Button>

           </div>
        </div>
      );

    const SettingsTab = ({ company, setCompany, handleCompanySettingsSave, customUser, setCustomUser, notify, db, appId }) => {
      const [oldPassword, setOldPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);

      const handleChangePassword = async (e) => {
         e.preventDefault();
         if (!oldPassword || !newPassword) return;
         if (oldPassword !== customUser.password) {
            return notify("Current password is incorrect.", "error");
         }
         try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'saas_users', customUser.id), { password: newPassword });
            notify("Password changed successfully!", "success");
            setCustomUser({...customUser, password: newPassword});
            setOldPassword('');
            setNewPassword('');
         } catch(err) {
            notify("Error changing password", "error");
         }
      };

      return (
        <div className="space-y-8 animate-fade-in min-w-0">
          <FormCard title="Command Settings" icon={Settings2} onSubmit={handleCompanySettingsSave} submitLabel="Update Settings">

              <Input label="Organization Name" value={company.name} onChange={e => setCompany({...company, name: e.target.value})} required/>
              <Input label="Chief Supervisor / Pilot" value={company.supervisor} onChange={e => setCompany({...company, supervisor: e.target.value})} required/>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
               <div className="space-y-2 min-w-0">
                 <label className="text-[10px] text-slate-400 font-black uppercase tracking-widest pl-1 truncate block">Username</label>
                 <input className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-500 cursor-not-allowed opacity-50" value={customUser?.username || ''} disabled />

               <div className="space-y-4 md:col-span-2 lg:col-span-1">

                 />
                 <Input 
                   label="New Password" 
                   type={showPassword ? "text" : "password"} 
                   placeholder="Enter new password..." 
                   value={newPassword} 
                   onChange={e => setNewPassword(e.target.value)}

               </div>
            </div>
          </FormCard>
        </div>
      );

        const start = new Date(calendarBaseDate);

      });
      
      const scheduleStats = useMemo(() => {
         const endOfWeek = new Date(weekDays[0]); endOfWeek.setDate(weekDays[0].getDate() + 6);
         return {
            unscheduled: workOrders.filter(w => !w.isScheduled).length,
            unscheduledJobs: workOrders.filter(w => !w.isScheduled),

            activeCount: workOrders.filter(w => w.status === 'Scheduled' || w.status === 'In Progress').length,
            schedAcres: workOrders.filter(w => w.status === 'Scheduled' || w.status === 'In Progress').reduce((a, w) => a + (parseFloat(w.acres)||0), 0),
            compAcres: workOrders.filter(w => w.status === 'Completed').reduce((a, w) => a + (parseFloat(w.acres)||0), 0)
         };

                    <span className="text-[10px] text-[#9cd33b] font-black uppercase tracking-widest truncate pr-2">New Customer Profile</span>
                    <Button variant="secondary" onClick={() => setInlineCustomer(false)} className="py-2 px-3 shrink-0"><X size={14}/></Button>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <Input label="Company/Farm Name" value={newCustData.name} onChange={e => setNewCustData({...newCustData, name: e.target.value})} required/>

                    <Input label="Phone" value={newCustData.phone} onChange={e => setNewCustData({...newCustData, phone: e.target.value})}/>
                    <div className="md:col-span-2"><Input label="Address" value={newCustData.address} onChange={e => setNewCustData({...newCustData, address: e.target.value})}/></div>
                    <Input label="City" value={newCustData.city} onChange={e => setNewCustData({...newCustData, city: e.target.value})}/>
                    <div className="flex gap-4"><div className="flex-1 min-w-0"><Input label="State" value={newCustData.state} onChange={e => setNewCustData({...newCustData, state: e.target.value})}/></div><div className="flex-1 min-w-0"><Input label="Zip" value={newCustData.zip} onChange={e => setNewCustData({...newCustData, zip: e.target.value})}/></div></div>
                    <div className="md:col-span-2"><TextArea label="Notes" value={newCustData.notes} onChange={e => setNewCustData({...newCustData, notes: e.target.value})}/></div>
                  </div>
                </div>

            </div>

                  <span className="text-[10px] font-black uppercase text-[#9cd33b] tracking-widest truncate">Geolocation</span>
                  <select className="bg-slate-900 border border-slate-700 text-xs font-bold text-slate-300 p-3 rounded-xl outline-none w-full sm:w-auto truncate" value={state.coordType} onChange={e => setState({...state, coordType: e.target.value})}>
                     <option value="Decimal">Decimal Degrees</option><option value="DMS">DMS (Deg/Min/Sec)</option>
                  </select>
               </div>
               
               {state.coordType === 'Decimal' ? (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 min-w-0">
                     <div className="space-y-2 min-w-0"><label className="text-[10px] text-slate-400 font-black uppercase pl-1 block truncate">Latitude</label><div className="flex gap-2"><input type="number" step="any" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none focus:border-[#9cd33b] transition-colors" value={state.latDec} onChange={e => setState({...state, latDec: e.target.value})}/><select className="bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold text-slate-200 outline-none focus:border-[#9cd33b] transition-colors" value={state.latDecDir || 'N'} onChange={e => setState({...state, latDecDir: e.target.value})}><option value="N">N</option><option value="S">S</option></select></div></div>
                     <div className="space-y-2 min-w-0"><label className="text-[10px] text-slate-400 font-black uppercase pl-1 block truncate">Longitude</label><div className="flex gap-2"><input type="number" step="any" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-200 outline-none focus:border-[#9cd33b] transition-colors" value={state.lonDec} onChange={e => setState({...state, lonDec: e.target.value})}/><select className="bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold text-slate-200 outline-none focus:border-[#9cd33b] transition-colors" value={state.lonDecDir || 'W'} onChange={e => setState({...state, lonDecDir: e.target.value})}><option value="W">W</option><option value="E">E</option></select></div></div>
                  </div>

                     <div className="space-y-2 min-w-0"><label className="text-[10px] text-slate-400 font-black uppercase truncate block">Longitude (D/M/S)</label><div className="grid grid-cols-4 gap-2"><input type="number" className="min-w-0 bg-slate-900 border border-slate-800 p-3 rounded-xl text-xs text-center text-slate-200" placeholder="Deg" value={state.lonDMS.d} onChange={e => setState({...state, lonDMS: {...state.lonDMS, d: e.target.value}})}/><input type="number" className="min-w-0 bg-slate-900 border border-slate-800 p-3 rounded-xl text-xs text-center text-slate-200" placeholder="Min" value={state.lonDMS.m} onChange={e => setState({...state, lonDMS: {...state.lonDMS, m: e.target.value}})}/><input type="number" className="min-w-0 bg-slate-900 border border-slate-800 p-3 rounded-xl text-xs text-center text-slate-200" placeholder="Sec" value={state.lonDMS.s} onChange={e => setState({...state, lonDMS: {...state.lonDMS, s: e.target.value}})}/><select className="min-w-0 bg-slate-900 border border-slate-800 p-3 rounded-xl font-bold text-slate-200 text-center outline-none" value={state.lonDMS.dir} onChange={e => setState({...state, lonDMS: {...state.lonDMS, dir: e.target.value}})}><option>W</option><option>E</option></select></div></div>
                  </div>
               )}
               <div className="pt-4 border-t border-slate-800 min-w-0"><label className="text-[10px] text-slate-400 font-black uppercase mb-2 flex items-center gap-1 truncate"><Paperclip size={10} className="shrink-0"/> Boundary (KML)</label><div className="flex flex-col sm:flex-row gap-2 min-w-0"><button type="button" onClick={() => kmlRef.current?.click()} className="bg-slate-900 border border-slate-800 text-slate-300 p-4 rounded-2xl flex-1 text-xs font-black uppercase truncate min-w-0">{state.kmlFileName || 'Attach Text KML'}</button>{state.kmlFileName && <Button variant="danger" className="shrink-0" onClick={() => { setState({...state, kmlData: null, kmlFileName: ''}); if(kmlRef.current) kmlRef.current.value=""; }}><X size={16}/></Button>}<input type="file" accept=".kml" ref={kmlRef} className="hidden" onChange={handleKml}/></div></div>
            </div>
            <Select label="Job Status" value={state.status} onChange={e => setState({...state, status: e.target.value})}>
              <option className="bg-slate-900" value="Pending">Pending</option><option className="bg-slate-900" value="Scheduled">Scheduled</option><option className="bg-slate-900" value="In Progress">In Progress</option><option className="bg-slate-900" value="Paused">Paused (Weather Hold)</option><option className="bg-slate-900" value="Completed">Completed</option><option className="bg-slate-900" value="Cancelled">Cancelled</option>
            </Select>
          </FormCard>
        );

             <div className="flex flex-wrap gap-4 shrink-0">
               <div className="flex bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-sm p-1">
                 <button onClick={() => setViewMode('calendar')} className={`px-4 py-2 rounded-xl transition-all flex items-center gap-2 text-xs font-black uppercase tracking-widest ${viewMode === 'calendar' ? 'bg-slate-800 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}><LayoutTemplate size={14}/> Calendar</button>
                 <button onClick={() => setViewMode('map')} className={`px-4 py-2 rounded-xl transition-all flex items-center gap-2 text-xs font-black uppercase tracking-widest ${viewMode === 'map' ? 'bg-slate-800 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}><MapIcon size={14}/> Map</button>
               </div>
               <Button onClick={() => setState({...defaultWorkOrderState, isEditing: true})}><Plus size={16}/> New Order</Button>
             </div>
           </div>

           <div className="grid grid-cols-2 md:grid-cols-5 gap-3 lg:gap-4 min-w-0">
             <Card className="p-4 flex items-center gap-3 min-w-0"><div className="p-2 lg:p-3 bg-[#9cd33b]/10 rounded-xl lg:rounded-2xl text-[#9cd33b] shrink-0"><CalendarDays size={18}/></div><div className="min-w-0"><p className="text-[9px] font-black text-slate-400 uppercase tracking-wider truncate">This Week</p><p className="text-lg lg:text-2xl font-black text-slate-100 truncate">{scheduleStats.thisWeekCount}</p></div></Card>
             <Card className="p-4 flex items-center gap-3 min-w-0"><div className="p-2 lg:p-3 bg-amber-500/10 rounded-xl lg:rounded-2xl text-amber-500 shrink-0"><Clock size={18}/></div><div className="min-w-0"><p className="text-[9px] font-black text-slate-400 uppercase tracking-wider truncate">Unscheduled</p><p className="text-lg lg:text-2xl font-black text-amber-500 truncate">{scheduleStats.unscheduled}</p></div></Card>
             <Card className="p-4 flex items-center gap-3 min-w-0"><div className="p-2 lg:p-3 bg-blue-500/10 rounded-xl lg:rounded-2xl text-blue-400 shrink-0"><ClipboardCheck size={18}/></div><div className="min-w-0"><p className="text-[9px] font-black text-slate-400 uppercase tracking-wider truncate">Total Active</p><p className="text-lg lg:text-2xl font-black text-slate-100 truncate">{scheduleStats.activeCount}</p></div></Card>
             <Card className="p-4 flex items-center gap-3 min-w-0"><div className="p-2 lg:p-3 bg-blue-500/10 rounded-xl lg:rounded-2xl text-blue-400 shrink-0"><Target size={18}/></div><div className="min-w-0"><p className="text-[9px] font-black text-slate-400 uppercase tracking-wider truncate">Sched Acres</p><p className="text-lg lg:text-2xl font-black text-slate-100 truncate">{scheduleStats.schedAcres}</p></div></Card>
             <Card className="p-4 flex items-center gap-3 min-w-0"><div className="p-2 lg:p-3 bg-[#9cd33b]/10 rounded-xl lg:rounded-2xl text-[#9cd33b] shrink-0"><CheckCircle2 size={18}/></div><div className="min-w-0"><p className="text-[9px] font-black text-slate-400 uppercase tracking-wider truncate">Comp Acres</p><p className="text-lg lg:text-2xl font-black text-[#9cd33b] truncate">{scheduleStats.compAcres}</p></div></Card>
           </div>

           {viewMode === 'calendar' ? (
             <div className="flex flex-col xl:flex-row gap-6 min-w-0">
               <div className="w-full xl:w-72 bg-slate-900 border border-slate-800 rounded-[2.5rem] flex flex-col shadow-xl overflow-hidden shrink-0">
                  <div className="p-6 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center min-w-0"><span className="text-xs font-black uppercase tracking-widest text-slate-200 flex items-center gap-2 truncate"><Clock size={14} className="text-amber-500 shrink-0"/> Backlog</span></div>
                  <div className="p-3 border-b border-slate-800 bg-amber-500/5 min-w-0"><p className="text-[9px] text-amber-500/80 font-black uppercase tracking-widest text-center truncate">Drag jobs to schedule</p></div>
                  <div className="flex-1 p-4 overflow-y-auto space-y-3 min-h-[400px]">
                    {scheduleStats.unscheduledJobs.length === 0 ? (
                      <div className="flex flex-col items-center justify-center h-full text-slate-600"><Clock size={32} className="mb-4 opacity-20"/><p className="text-[10px] font-black uppercase tracking-widest text-center px-4">All Caught Up</p></div>

    const CustomersTab = ({ items, logs, isEditing, state, setState, onCancel, onSubmit, onDelete, notify }) => {

        if (items.length === 0) return notify("No customers to export.", "error");
        if (!logs || logs.length === 0) return notify("No flight logs available to bill.", "error");
        
        // QuickBooks Standard Invoice Import CSV Headers
        const headers = [
          'InvoiceNo', 'Customer', 'InvoiceDate', 'DueDate', 
          'ServiceDate', 'Item(Product/Service)', 'ItemDescription', 'ItemQuantity'
        ];
        const csvRows = [headers.join(',')];
        
        const today = new Date();
        const invDate = today.toLocaleDateString('en-US'); // MM/DD/YYYY format preferred by QBO
        today.setDate(today.getDate() + 30); // Default Net 30 terms
        const dueDate = today.toLocaleDateString('en-US');
        
        let billedItemsCount = 0;

        items.forEach(c => {
          // Find all flights logged for this specific customer
          const customerLogs = logs.filter(l => l.customer === c.name);
          
          if (customerLogs.length > 0) {
            // Generate one unified Invoice Number per customer batch
            const invoiceNo = `INV-${c.name.substring(0,3).toUpperCase()}-${Math.floor(1000 + Math.random() * 9000)}`;
            
            customerLogs.forEach(log => {
              const escapeCSV = (str) => `"${String(str || '').replace(/"/g, '""')}"`;
              
              // Prioritize treated acreage, fallback to total acreage
              const acres = parseFloat(log.treatedAcreage) || parseFloat(log.totalAcreage) || 0;
              const crop = log.whatWasTreated === 'ADD_NEW' ? log.customCrop : log.whatWasTreated;
              const desc = `Flight on ${log.date} at ${log.locationName || 'N/A'} - Crop: ${crop || 'N/A'} - Chemical: ${log.chemical || 'N/A'}`;
              
              csvRows.push([
                escapeCSV(invoiceNo),
                escapeCSV(c.name),
                escapeCSV(invDate),
                escapeCSV(dueDate),
                escapeCSV(log.date), // Service Date
                escapeCSV('Aerial Application'), // Default QBO Service Item Name
                escapeCSV(desc),
                escapeCSV(acres) // Quantity (Acres)
              ].join(','));
              
              billedItemsCount++;
            });
          }
        });
        
        if (billedItemsCount === 0) {
           return notify("None of your customers have completed flight logs to bill.", "error");
        }
        
        const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `QuickBooks_Invoices_${new Date().toISOString().slice(0,10)}.csv`;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        notify(`Exported ${billedItemsCount} billable flights to QuickBooks format!`, "success");

    const MissionLogTab = ({ logs, fleet, customers, products, crops, isEditing, state, setState, onCancel, onSubmit, onDelete, kmlRef, handleKml, notify }) => {
      const [inlineCustomer, setInlineCustomer] = useState(false);
      const [newCustData, setNewCustData] = useState(defaultCustomerState);
      const [inlineProduct, setInlineProduct] = useState(false);
      const [newProdData, setNewProdData] = useState(defaultProductState);

      const fetchWeather = async () => {
         if (!state.date || !state.startTime) return notify("Please enter a Date and Start Time first.", "error");

         let lat = parseFloat(state.latDec), lon = parseFloat(state.lonDec);
         if (state.coordType === 'DMS') {
             lat = (parseFloat(state.latDMS.d||0)+parseFloat(state.latDMS.m||0)/60+parseFloat(state.latDMS.s||0)/3600)*(state.latDMS.dir==='S'?-1:1);
             lon = (parseFloat(state.lonDMS.d||0)+parseFloat(state.lonDMS.m||0)/60+parseFloat(state.lonDMS.s||0)/3600)*(state.lonDMS.dir==='W'?-1:1);
         }
         if (isNaN(lat) || isNaN(lon) || lat === 0 || lon === 0) return notify("Enter valid coordinates first to auto-fill weather.", "error");

         notify("Fetching historical weather data...", "info");
         try {
             const flightDate = new Date(state.date);
             const today = new Date();
             const daysDiff = (today - flightDate) / (1000 * 60 * 60 * 24);
             
             // Open-Meteo requires the archive API for dates older than 3 months
             const baseUrl = daysDiff > 90 ? 'https://archive-api.open-meteo.com/v1/archive' : 'https://api.open-meteo.com/v1/forecast';

             const res = await fetch(`${baseUrl}?latitude=${lat}&longitude=${lon}&start_date=${state.date}&end_date=${state.date}&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`);
             const data = await res.json();
             
             if (!data.hourly || data.hourly.temperature_2m.length === 0) throw new Error("No data");

             // Extract the specific hour from the Start Time (e.g. "14:30" -> index 14)
             const hour = parseInt(state.startTime.split(':')[0], 10);

             const t = data.hourly.temperature_2m[hour];
             const h = data.hourly.relative_humidity_2m[hour];
             const ws = data.hourly.wind_speed_10m[hour];
             let wd = data.hourly.wind_direction_10m[hour]; // Changed to let so it can be reassigned

             if (t === null || t === undefined) throw new Error("Not available for this specific hour yet");

             const dirs = ['N','NE','E','SE','S','SW','W','NW'];
             const dirIdx = Math.round(((wd %= 360) < 0 ? wd + 360 : wd) / 45) % 8;

             setState(prev => ({
                 ...prev,
                 temp: t,
                 humidity: h,
                 windSpeed: ws,
                 windDirection: dirs[dirIdx]
             }));
             notify(`Weather auto-filled for ${state.date} at ${state.startTime}!`, "success");
         } catch(err) {
             console.error(err);
             notify("Failed to fetch weather. Date might be too far in the future or invalid.", "error");
         }
      };

      if (isEditing) {
        return (
          <FormCard title={state.id ? 'Edit Mission Record' : 'Log New Mission'} icon={Plane} onSubmit={(e) => onSubmit(e, inlineCustomer ? newCustData : null, inlineProduct ? newProdData : null)} onCancel={onCancel} submitLabel="Save To Vault">

                   <Input type="date" label="Date" value={state.date} onChange={e => setState({...state, date: e.target.value})} required/>

      const [allCrops, setAllCrops] = useState([]);
      const [allFaaReports, setAllFaaReports] = useState([]);

      const [certState, setCertState] = useState({ ...defaultCertState, isEditing: false });

      const [logState, setLogState] = useState({ ...defaultLogState, isEditing: false });

      const [showProfileModal, setShowProfileModal] = useState(false);
      const [oldPassword, setOldPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');

      const kmlInputRef = useRef(null);

      useEffect(() => {

        return () => {
           window.removeEventListener('online', handleOnline);
           window.removeEventListener('offline', handleOffline);
        };
      }, []);

      useEffect(() => {
        const initAuth = async () => {
          try { 
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token); } 
            else { await signInAnonymously(auth); } 
          } catch (err) { 
            console.error(err); 
            if (err.code === 'auth/operation-not-allowed') notify("Firebase Setup: You must enable 'Anonymous' sign-in in Firebase Auth settings.", "error");
          }
        };
        initAuth();
        return onAuthStateChanged(auth, (u) => { setUser(u); if (!u) setLoading(false); });
      }, []);

      useEffect(() => {
        if (!user) return;
        const qLogs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'flight_logs'), s => setAllLogs(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qWO = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'work_orders'), s => setAllWorkOrders(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qCerts = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'certifications'), s => setAllCerts(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qMaint = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'maintenance_records'), s => setAllMaintRecords(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qCust = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), s => setAllCustomers(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qProd = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), s => setAllProducts(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qNotam = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'notam_logs'), s => setAllNotams(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qCrops = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'crops'), s => setAllCrops(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const qFaaReports = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'faa_reports'), s => setAllFaaReports(s.docs.map(d => ({id: d.id, ...d.data()}))));
        setLoading(false);
        return () => { qLogs(); qWO(); qCerts(); qMaint(); qCust(); qProd(); qNotam(); qCrops(); qFaaReports(); };
      }, [user]);

      useEffect(() => {
         if (!customUser) return;
         const compDocId = customUser.companyName.toLowerCase().replace(/[^a-z0-9]/g, '-');
         return onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'saas_companies', compDocId), (snap) => {
            if (snap.exists()) setCompany(snap.data()); 
         });
      }, [customUser]);

      const logs = useMemo(() => allLogs.filter(l => l.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>new Date(b.date)-new Date(a.date)), [allLogs, customUser]);
      const workOrders = useMemo(() => allWorkOrders.filter(w => w.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()), [allWorkOrders, customUser]);
      const customers = useMemo(() => allCustomers.filter(c => c.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>a.name.localeCompare(b.name)), [allCustomers, customUser]);
      const products = useMemo(() => allProducts.filter(p => p.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>a.name.localeCompare(b.name)), [allProducts, customUser]);
      const certs = useMemo(() => allCerts.filter(c => c.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()), [allCerts, customUser]);
      const maintRecords = useMemo(() => allMaintRecords.filter(m => m.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>new Date(b.date)-new Date(a.date)), [allMaintRecords, customUser]);
      const notamLogs = useMemo(() => allNotams.filter(n => n.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>new Date(b.date)-new Date(a.date)), [allNotams, customUser]);
      const crops = useMemo(() => allCrops.filter(c => c.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>a.name.localeCompare(b.name)), [allCrops, customUser]);
      const faaReports = useMemo(() => allFaaReports.filter(r => r.companyName?.toLowerCase() === customUser?.companyName.toLowerCase()).sort((a,b)=>b.month.localeCompare(a.month)), [allFaaReports, customUser]);

        e.preventDefault(); if (!customUser) return;
        const finalData = { ...stateObj, companyName: customUser.companyName, timestamp: stateObj.timestamp || new Date().toISOString() };
        delete finalData.isEditing;
        try {
          if (stateObj.id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', col, stateObj.id), finalData);
          else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', col), finalData);
          setFn({...defaultState, isEditing: false}); notify(msg, "success");
        } catch (err) { notify("Error saving.", "error"); }
      };

      const deleteItem = (col, id) => {
        setDeleteConfirm({ col, id });
      };

      const executeDelete = async () => {
        if (!deleteConfirm) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', deleteConfirm.col, deleteConfirm.id));
          notify("Record Deleted", "info");
        } catch (err) {
          notify("Error deleting record.", "error");
        }
        setDeleteConfirm(null);
      };

      const handleLogin = async (e) => {
         e.preventDefault();
         let currentUser = user;
         
         if (!currentUser) {
            if (firebaseConfig.apiKey === "YOUR_API_KEY" || firebaseConfig.apiKey === "mock") {
               return notify("Deployment Error: Missing Firebase Keys in the code!", "error");
            }
            try {
               const cred = await signInAnonymously(auth);
               currentUser = cred.user;
               setUser(cred.user);
            } catch(err) {
               if (err.code === 'auth/operation-not-allowed') return notify("Firebase Error: Enable 'Anonymous' Sign-In in Firebase Auth!", "error");
               return notify(`Connection Blocked: ${err.message}`, "error");
            }
         }
         
         const cName = authForm.companyName?.trim().toLowerCase();
         const uName = authForm.username?.trim().toLowerCase();
         
         try {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'saas_users'));
            
            const found = snap.docs.map(d => ({id: d.id, ...d.data()})).find(u => {
               return u.companyName?.toLowerCase() === cName && u.username?.toLowerCase() === uName && u.password === authForm.password;
            });
            
            if (found) { 
              setCustomUser(found); 
              setActiveTab(found.role === 'Dispatcher' ? 'schedule' : 'dashboard'); 
              notify("Welcome back", 'success'); 
            } else {
              notify("Invalid credentials.", "error");
            }
         } catch(err) {
            notify(`Database Error: ${err.message}`, "error");
         }
      };

      const handleRegister = async (e) => {
         e.preventDefault();
         let currentUser = user;
         
         if (!currentUser) {
            if (firebaseConfig.apiKey === "YOUR_API_KEY" || firebaseConfig.apiKey === "mock") {
               return notify("Deployment Error: Missing Firebase Keys in the code!", "error");
            }
            try {
               const cred = await signInAnonymously(auth);
               currentUser = cred.user;
               setUser(cred.user);
            } catch(err) {
               if (err.code === 'auth/operation-not-allowed') return notify("Firebase Error: Enable 'Anonymous' Sign-In in Firebase Auth!", "error");
               return notify(`Connection Blocked: ${err.message}`, "error");
            }
         }
         
         try {
            const cName = authForm.companyName?.trim();
            const uName = authForm.username?.trim();
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'saas_users'));
            if (snap.docs.map(d=>d.data()).find(u => u.companyName?.toLowerCase() === cName.toLowerCase() && u.username?.toLowerCase() === uName.toLowerCase())) return notify("Username exists.", "error");
            
            const newUser = { companyName: cName, username: uName, email: authForm.email?.trim() || '', password: authForm.password, role: authForm.role };
            const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'saas_users'), newUser);
            
            if (authForm.role === 'Manager') {
               const cId = cName.toLowerCase().replace(/[^a-z0-9]/g, '-');
               const cDoc = doc(db, 'artifacts', appId, 'public', 'data', 'saas_companies', cId);
               const cDocSnap = await getDoc(cDoc);
               if (!cDocSnap.exists()) await setDoc(cDoc, { name: cName, supervisor: uName, email: '', phone: '', address: '', certNo: '', exemption: '12345', timezone: -6, fleet: [] });
            }
            setCustomUser({ id: docRef.id, ...newUser }); 
            setActiveTab(newUser.role === 'Dispatcher' ? 'schedule' : 'dashboard'); 
            notify("User created.", "success");
         } catch (err) {
            notify(`Database Error: ${err.message}`, "error");
         }
      };

      const handleForgotPassword = async (e) => {
         e.preventDefault();
         const cName = authForm.companyName?.trim().toLowerCase();
         const uName = authForm.username?.trim().toLowerCase();
         const email = authForm.email?.trim().toLowerCase();

         try {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'saas_users'));
            const userDoc = snap.docs.find(d => {
                const data = d.data();
                return data.companyName?.toLowerCase() === cName && 
                       data.username?.toLowerCase() === uName && 
                       data.email && data.email.toLowerCase() === email;
            });

            if (userDoc) {
                setResetUserDoc({ id: userDoc.id, ...userDoc.data() });
                setAuthMode('reset');
                notify("Account verified. Please set a new password.", "success");
            } else {
                notify("No matching account found with those exact details.", "error");
            }
         } catch (err) {
            notify(`Error: ${err.message}`, "error");
         }
      };

      const handleResetPassword = async (e) => {
         e.preventDefault();
         if (!resetUserDoc || !authForm.password) return;
         try {
             await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'saas_users', resetUserDoc.id), {
                 password: authForm.password
             });
             notify("Password updated successfully! You can now log in.", "success");
             setAuthMode('login');
             setAuthForm({...authForm, password: ''});
             setResetUserDoc(null);
         } catch (err) {
             notify(`Error updating password: ${err.message}`, "error");
         }
      };

      const handleChangePassword = async () => {
         if (oldPassword !== customUser.password) {
             return notify("Current password is incorrect.", "error");
         }
         try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'saas_users', customUser.id), { password: newPassword });
            notify("Password changed successfully!", "success");
            setCustomUser({...customUser, password: newPassword});
            setOldPassword('');
            setNewPassword('');
            setShowProfileModal(false);
         } catch(err) {
            notify("Error changing password", "error");
         }
      };

      if (loading) return <div className="flex h-screen items-center justify-center bg-slate-950 text-[#9cd33b] font-black uppercase tracking-widest"><GlobalStyles/>Initializing...</div>;

      if (!customUser) {

            <Card className="w-full max-w-md space-y-8 animate-fade-in border-[#9cd33b]/20">
               <div className="text-center flex flex-col items-center">
                  <div className="w-20 h-20 bg-[#9cd33b]/10 rounded-full flex items-center justify-center mb-6 border border-[#9cd33b]/30 shadow-[0_0_30px_rgba(156,211,59,0.15)]"><Lock className="text-[#9cd33b]" size={32} /></div>
                  <h1 className="text-3xl font-black uppercase tracking-widest text-slate-100">Ops Portal</h1>

                     {authMode === 'login' ? 'Secure Login' : 
                      authMode === 'register' ? 'Register Access' : 
                      authMode === 'forgot' ? 'Account Recovery' : 
                      'Reset Password'}
                  </p>
               </div>
               
               {authMode === 'login' && (
                 <form onSubmit={handleLogin} className="space-y-4">
                    <Input label="Company Code" value={authForm.companyName} onChange={e => setAuthForm({...authForm, companyName: e.target.value})} required/>
                    <Input label="Username" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} required/>
                    <Input 
                      label="Password" 
                      type={showPassword ? "text" : "password"} 
                      value={authForm.password} 
                      onChange={e => setAuthForm({...authForm, password: e.target.value})}

                    />
                    <Button type="submit" className="w-full py-4 mt-6">Login <ArrowRight size={16}/></Button>
                 </form>
               )}

               {authMode === 'register' && (
                 <form onSubmit={handleRegister} className="space-y-4">
                    <Input label="Company Code" value={authForm.companyName} onChange={e => setAuthForm({...authForm, companyName: e.target.value})} required/>
                    <Input label="Username" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} required/>
                    <Input label="Email Address" type="email" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} required/>
                    <Input 
                      label="Password" 
                      type={showPassword ? "text" : "password"} 
                      value={authForm.password} 
                      onChange={e => setAuthForm({...authForm, password: e.target.value})} 
                      required 
                      rightElement={<button type="button" onClick={() => setShowPassword(!showPassword)} className="text-slate-500 hover:text-slate-300 focus:outline-none">{showPassword ? <EyeOff size={16}/> : <Eye size={16}/>}</button>} 
                    />
                    <Select label="Role" value={authForm.role} onChange={e => setAuthForm({...authForm, role: e.target.value})}><option value="Pilot">Pilot</option><option value="Manager">Manager</option><option value="Dispatcher">Dispatcher</option></Select>
                    <Button type="submit" className="w-full py-4 mt-6">Create Key <ArrowRight size={16}/></Button>
                 </form>

               {authMode === 'forgot' && (
                 <form onSubmit={handleForgotPassword} className="space-y-4">

                    <Input label="Username" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} required/>
                    <Input label="Email Address" type="email" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} required/>
                    <Button type="submit" className="w-full py-4 mt-6">Verify Account <ArrowRight size={16}/></Button>
                 </form>
               )}

               {authMode === 'reset' && (
                 <form onSubmit={handleResetPassword} className="space-y-4">
                    <p className="text-xs text-[#9cd33b] font-bold text-center mb-4">Account verified for {resetUserDoc?.username}.</p>
                    <Input 
                      label="New Password" 
                      type={showPassword ? "text" : "password"} 
                      value={authForm.password} 
                      onChange={e => setAuthForm({...authForm, password: e.target.value})} 
                      required 
                      rightElement={<button type="button" onClick={() => setShowPassword(!showPassword)} className="text-slate-500 hover:text-slate-300 focus:outline-none">{showPassword ? <EyeOff size={16}/> : <Eye size={16}/>}</button>} 
                    />
                    <Button type="submit" className="w-full py-4 mt-6">Update Password <ArrowRight size={16}/></Button>
                 </form>
               )}

               {authMode === 'login' && (
                 <div className="flex flex-col gap-3 text-center pt-6 border-t border-slate-800 mt-6">
                    <button type="button" onClick={() => setAuthMode('forgot')} className="text-[10px] text-blue-500 hover:text-blue-400 uppercase font-black tracking-widest transition-colors">Forgot Password?</button>
                    <button type="button" onClick={() => setAuthMode('register')} className="text-[10px] text-slate-500 hover:text-slate-300 uppercase font-black tracking-widest transition-colors">Need an account? Register Here</button>
                 </div>
               )}
               {(authMode === 'register' || authMode === 'forgot' || authMode === 'reset') && (
                 <div className="text-center pt-6 border-t border-slate-800 mt-6">
                    <button type="button" onClick={() => { setAuthMode('login'); setResetUserDoc(null); }} className="text-[10px] text-slate-500 hover:text-slate-300 uppercase font-black tracking-widest transition-colors">{authMode === 'reset' ? 'Cancel' : 'Already have access? Login Here'}</button>
                 </div>
               )}
            </Card>
          </div>

      }

      const tabs = [
        ...(customUser.role !== 'Dispatcher' ? [{ id: 'dashboard', icon: ShieldCheck, label: 'Dashboard' }] : []),
        { id: 'schedule', icon: CalendarDays, label: 'Schedule' },
        { id: 'customers', icon: Users, label: 'Customers' },
        { id: 'products', icon: FlaskConical, label: 'Products' },
        ...(customUser.role !== 'Dispatcher' ? [
           { id: 'fleet', icon: Plane, label: 'Aircraft Fleet' },
           { id: 'certifications', icon: Award, label: 'Certifications' }, { id: 'maintenance', icon: Wrench, label: 'Maintenance' },
           { id: 'log', icon: FileText, label: 'Mission Log' }, { id: 'notam', icon: Navigation, label: 'NOTAM Tool' },
           { id: 'faa-report', icon: FileBarChart, label: 'FAA Report' }
        ] : []),
        ...(customUser.role === 'Manager' ? [{ id: 'settings', icon: Settings2, label: 'Settings' }] : [])

      return (

          {deleteConfirm && (
            <div className="fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-4 animate-fade-in">
              <Card className="max-w-sm w-full border-red-500/30">

                   <AlertTriangle size={24} />

                </div>
                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-8 leading-relaxed">This record will be permanently removed from the database. This action cannot be reversed.</p>
                <div className="flex gap-4">
                   <Button variant="secondary" className="flex-1 py-4" onClick={() => setDeleteConfirm(null)}>Cancel</Button>
                   <Button variant="danger" className="flex-1 py-4" onClick={executeDelete}>Delete</Button>
                </div>
              </Card>
            </div>
          )}

          {showProfileModal && (

              <Card className="max-w-sm w-full border-[#9cd33b]/30">

                  <div className="flex items-center gap-3 text-[#9cd33b]">
                     <User size={20} />
                     <h3 className="text-lg font-black uppercase tracking-widest">My Profile</h3>
                  </div>
                  <button onClick={() => setShowProfileModal(false)} className="text-slate-500 hover:text-slate-300"><X size={16}/></button>
                </div>
                <div className="space-y-4">
                  <div><p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Username</p><p className="font-bold text-slate-200">{customUser.username}</p></div>
                  <div><p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Email</p><p className="font-bold text-slate-200">{customUser.email || 'No email on file'}</p></div>
                  
                  <div className="pt-6 border-t border-slate-800 mt-2">
                     <p className="text-[10px] text-[#9cd33b] font-black uppercase tracking-widest mb-4">Change Password</p>
                     <div className="space-y-3">
                         <Input 
                           type={showPassword ? "text" : "password"} 
                           placeholder="Current password..." 
                           value={oldPassword} 
                           onChange={e => setOldPassword(e.target.value)} 
                           rightElement={<button type="button" onClick={() => setShowPassword(!showPassword)} className="text-slate-500 hover:text-slate-300 focus:outline-none">{showPassword ? <EyeOff size={16}/> : <Eye size={16}/>}</button>}
                         />
                         <Input 
                           type={showPassword ? "text" : "password"} 
                           placeholder="New password..." 
                           value={newPassword} 
                           onChange={e => setNewPassword(e.target.value)} 
                         />

                ) : (
