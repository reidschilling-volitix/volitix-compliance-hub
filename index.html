                const Icon = t.icon;
                return (
                  <button key={t.id} onClick={() => {setActiveTab(t.id); setShowFormalReport(false);}} className={`w-full flex items-center justify-center lg:justify-start p-3 rounded-2xl transition-all min-w-0 ${activeTab === t.id ? 'bg-[#9cd33b] text-[#020617] shadow-lg' : 'hover:bg-slate-800 text-slate-400 hover:text-slate-200'}`}>
                     <Icon size={18} className="shrink-0"/>
                     <span className="hidden lg:inline text-[11px] font-black uppercase tracking-widest ml-4 truncate">{t.label}</span>
                  </button>
                );
              })}
            </nav>
            <div className="p-4 border-t border-slate-800 space-y-2 min-w-0">
               <div className="hidden lg:flex flex-col min-w-0 mb-2">
                 <span className="text-[10px] text-slate-400 font-bold uppercase truncate">{customUser.username}</span>
                 <span className="text-[9px] text-[#9cd33b] font-black uppercase tracking-widest truncate">{customUser.role}</span>
               </div>
               <button onClick={() => setShowProfileModal(true)} className="w-full p-3 flex items-center justify-center lg:justify-start rounded-xl text-slate-400 hover:bg-slate-800 transition-all min-w-0">
                  <User size={16} className="shrink-0"/>
                  <span className="hidden lg:inline text-[10px] font-black uppercase tracking-widest ml-3 truncate">My Profile</span>
               </button>
               <button onClick={() => {setCustomUser(null); setAuthForm({...authForm, password: ''});}} className="w-full p-3 flex items-center justify-center lg:justify-start rounded-xl text-red-500 hover:bg-red-500/10 transition-all min-w-0">
                  <LogOut size={16} className="shrink-0"/>
                  <span className="hidden lg:inline text-[10px] font-black uppercase tracking-widest ml-3 truncate">Sign Out</span>
               </button>
            </div>
          </div>
          <main className="flex-1 overflow-y-auto p-6 lg:p-10 relative z-20 min-w-0">
            {activeTab === 'dashboard' && <DashboardTab fleet={company.fleet || []} company={company} customUser={customUser} logs={logs} maintRecords={maintRecords} updateFleetInfo={f => { setCompany({...company, fleet: f}); updateDoc(doc(db,'artifacts',appId,'public','data','saas_companies',customUser.companyName.toLowerCase().replace(/[^a-z0-9]/g,'-')), {fleet: f}); }} />}
            {activeTab === 'fleet' && <FleetTab company={company} setCompany={setCompany} customUser={customUser} notify={notify} />}
            {activeTab === 'settings' && <SettingsTab company={company} setCompany={setCompany} handleCompanySettingsSave={async e => { e.preventDefault(); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'saas_companies', customUser.companyName.toLowerCase().replace(/[^a-z0-9]/g, '-')), company); notify("Settings Saved", "success"); }} customUser={customUser} setCustomUser={setCustomUser} notify={notify} db={db} appId={appId} />}
            {activeTab === 'customers' && <CustomersTab items={customers} logs={logs} isEditing={customerState.isEditing} state={customerState} setState={setCustomerState} onSubmit={e => genericSubmit(e, 'customers', customerState, setCustomerState, defaultCustomerState, "Customer Saved")} onCancel={() => setCustomerState({...defaultCustomerState, isEditing: false})} onDelete={deleteItem} notify={notify} />}
            {activeTab === 'products' && <ProductsTab items={products} isEditing={productState.isEditing} state={productState} setState={setProductState} onSubmit={e => genericSubmit(e, 'products', productState, setProductState, defaultProductState, "Product Saved")} onCancel={() => setProductState({...defaultProductState, isEditing: false})} onDelete={deleteItem} />}
            {activeTab === 'maintenance' && <MaintenanceTab items={maintRecords} isEditing={maintState.isEditing} state={maintState} setState={setMaintState} onSubmit={e => genericSubmit(e, 'maintenance_records', {...maintState, picUsername: customUser.username}, setMaintState, defaultMaintState, "Log Saved")} onCancel={() => setMaintState({...defaultMaintState, isEditing: false})} onDelete={deleteItem} />}
            {activeTab === 'certifications' && <CertificationsTab items={certs} company={company} isEditing={certState.isEditing} state={certState} setState={setCertState} onSubmit={e => genericSubmit(e, 'certifications', {...certState, picUsername: customUser.username}, setCertState, defaultCertState, "Cert Saved")} onCancel={() => setCertState({...defaultCertState, isEditing: false})} onDelete={deleteItem} />}
            
            {activeTab === 'notam' && (
              <NotamTab 
                 notams={notamLogs} isEditing={notamState.isEditing} state={notamState} setState={setNotamState} 
                 derived={{ utcStart: `${((new Date(notamState.date + 'T' + (notamState.localStartTime || '08:00')).getHours() - (company.timezone || -6) + 24) % 24).toString().padStart(2, '0')}${new Date(notamState.date + 'T' + (notamState.localStartTime || '08:00')).getMinutes().toString().padStart(2, '0')}` }} 
                 generate={() => {
                    let formattedLat = "000000"; let formattedLon = "000000"; let latDir = "N"; let lonDir = "W";
                    if (notamState.coordType === 'Decimal') {
                       let latDecVal = Math.abs(parseFloat(notamState.latDec) || 0);
                       let lonDecVal = Math.abs(parseFloat(notamState.lonDec) || 0);
                       formattedLat = formatToNotamDMS(latDecVal, false);
                       formattedLon = formatToNotamDMS(lonDecVal, true);
                       latDir = notamState.latDecDir || 'N';
                       lonDir = notamState.lonDecDir || 'W';
                    } else {
                       formattedLat = `${String(notamState.latDMS.d || 0).padStart(2, '0')}${String(notamState.latDMS.m || 0).padStart(2, '0')}${String(notamState.latDMS.s || 0).padStart(2, '0')}`;
                       formattedLon = `${String(notamState.lonDMS.d || 0).padStart(3, '0')}${String(notamState.lonDMS.m || 0).padStart(2, '0')}${String(notamState.lonDMS.s || 0).padStart(2, '0')}`;
                       latDir = notamState.latDMS.dir;
                       lonDir = notamState.lonDMS.dir;
                    }
                    const exemptionCert = certs?.find(c => c.name === 'FAA 44807');
                    const exemptionNo = exemptionCert ? exemptionCert.licenseNumber : 'TBD';
                    return `!FDC UAS ... ${company.name?.toUpperCase() || 'ORG'}. ${notamState.date} AIRSPACE UAS WI AN AREA DEFINED AS ${notamState.radius}NM RADIUS OF ${formattedLat}${latDir}${formattedLon}${lonDir} SFC-200FT AGL. PURSUANT TO EXEMPTION ${exemptionNo}.`;
                 }} 
                 onSubmit={e => {
                    e.preventDefault();
                    let lat = 0, lon = 0;
                    if(notamState.coordType === 'Decimal') { 
                      lat = Math.abs(parseFloat(notamState.latDec||0)) * (notamState.latDecDir==='S'?-1:1); 
                      lon = Math.abs(parseFloat(notamState.lonDec||0)) * (notamState.lonDecDir==='E'?1:-1); 
                    } else if(notamState.coordType === 'DMS') { 
                      lat = (parseFloat(notamState.latDMS.d||0)+parseFloat(notamState.latDMS.m||0)/60+parseFloat(notamState.latDMS.s||0)/3600)*(notamState.latDMS.dir==='S'?-1:1); 
                      lon = (parseFloat(notamState.lonDMS.d||0)+parseFloat(notamState.lonDMS.m||0)/60+parseFloat(notamState.lonDMS.s||0)/3600)*(notamState.lonDMS.dir==='W'?-1:1); 
                    }
                    const finalState = { ...notamState, picUsername: customUser.username, finalLat: lat, finalLon: lon };
                    genericSubmit(e, 'notam_logs', finalState, setNotamState, defaultNotamState, "NOTAM Archived");
                 }} 
                 onCancel={() => setNotamState({...defaultNotamState, isEditing: false})} onDelete={deleteItem} notify={notify} company={company} certs={certs}
              />
            )}
            
            {activeTab === 'faa-report' && <FaaReportTab company={company} fleet={company.fleet || []} certs={certs} monthlyReport={{ logs: logs.filter(l => l.date && l.date.startsWith(reportMonth)), totalHours: (logs.filter(l => l.date && l.date.startsWith(reportMonth)).reduce((a, l) => a + (parseFloat(l.flightTimeMinutes)||0), 0)/60).toFixed(2), flightCount: logs.filter(l => l.date && l.date.startsWith(reportMonth)).length }} reportMonth={reportMonth} setReportMonth={setReportMonth} showFormalReport={showFormalReport} setShowFormalReport={setShowFormalReport} user={user} notify={notify} faaReports={faaReports} onDelete={deleteItem} />}
            
            {activeTab === 'schedule' && (
              <ScheduleTab 
                workOrders={workOrders} isEditing={workOrderState.isEditing} state={workOrderState} setState={setWorkOrderState} 
                onSubmit={async (e, newCustData) => { 
                  e.preventDefault(); 
                  let c = workOrderState.customer;
                  if (newCustData && newCustData.name) { 
                    c = newCustData.name; 
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), { ...newCustData, companyName: customUser.companyName, timestamp: new Date().toISOString() }); 
                  }
                  let lat = 0, lon = 0;
                  if(workOrderState.coordType==='Decimal') { lat = Math.abs(parseFloat(workOrderState.latDec||0)) * (workOrderState.latDecDir==='S'?-1:1); lon = Math.abs(parseFloat(workOrderState.lonDec||0)) * (workOrderState.lonDecDir==='E'?1:-1); }
                  else if(workOrderState.coordType==='DMS') { lat=(parseFloat(workOrderState.latDMS.d||0)+parseFloat(workOrderState.latDMS.m||0)/60+parseFloat(workOrderState.latDMS.s||0)/3600)*(workOrderState.latDMS.dir==='S'?-1:1); lon=(parseFloat(workOrderState.lonDMS.d||0)+parseFloat(workOrderState.lonDMS.m||0)/60+parseFloat(workOrderState.lonDMS.s||0)/3600)*(workOrderState.lonDMS.dir==='W'?-1:1); }
                  const finalData = {...workOrderState, customer: c, finalLat: lat, finalLon: lon, isScheduled: !!workOrderState.date, companyName: customUser.companyName, creator: workOrderState.id ? workOrderState.creator : customUser.username}; delete finalData.isEditing;
                  if(workOrderState.id) await updateDoc(doc(db,'artifacts',appId,'public','data', 'work_orders', workOrderState.id), finalData); else await addDoc(collection(db,'artifacts',appId,'public','data','work_orders'), finalData);
                  setWorkOrderState({...defaultWorkOrderState, isEditing: false}); notify("Order Saved", "success");
                }} 
                onCancel={() => setWorkOrderState({...defaultWorkOrderState, isEditing: false})} customers={customers}
                deleteItem={deleteItem} customUser={customUser} getStatusColor={getStatusColor} notify={notify}
                handleDrop={async (e, d) => { const id=e.dataTransfer.getData('text/plain'); if(!id) return; await updateDoc(doc(db,'artifacts',appId,'public','data','work_orders',id),{date:d.toLocaleDateString('en-CA'),isScheduled:true,status:'Scheduled'}); notify("Scheduled", "success"); }}
              />
            )}
            
            {activeTab === 'log' && (
              <MissionLogTab 
                logs={logs} fleet={company.fleet || []} customers={customers} products={products} crops={crops} isEditing={logState.isEditing} state={logState} setState={setLogState} notify={notify}
                onSubmit={async (e, newCustData, newProdData) => {
                  e.preventDefault();
                  
                  let c = logState.customer;
                  if (newCustData && newCustData.name) {
                     c = newCustData.name;
                     try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), { ...newCustData, companyName: customUser.companyName, timestamp: new Date().toISOString() });
                     } catch(err) {}
                  }

                  let p = logState.chemical;
                  if (newProdData && newProdData.name) {
                     p = newProdData.name;
                     try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { ...newProdData, companyName: customUser.companyName, timestamp: new Date().toISOString() });
                     } catch(err) {}
                  }
                  
                  let finalCrop = logState.whatWasTreated;
                  if (logState.whatWasTreated === 'ADD_NEW') {
                     finalCrop = logState.customCrop;
                     try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'crops'), { name: finalCrop, companyName: customUser.companyName, timestamp: new Date().toISOString() });
                     } catch(err) {}
                  }
                  
                  // Chemical Subtraction Logic
                  let totalUsed = (parseFloat(logState.appRate) || 0) * (parseFloat(logState.treatedAcreage) || parseFloat(logState.totalAcreage) || 0);
                  if (p && totalUsed > 0) {
                     const prodDoc = products.find(prod => prod.name === p);
                     if (prodDoc && prodDoc.id) {
                         const currentInv = parseFloat(prodDoc.inventory) || 0;
                         const newInv = Math.max(0, currentInv - totalUsed);
                         updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', prodDoc.id), { inventory: newInv.toFixed(2) }).catch(()=>{});
                     }
                  }

                  // Compute flight time minutes for the backend FAA report
                  let mins = parseFloat(logState.flightTimeValue) || 0;
                  if (logState.flightTimeUnit === 'Hours') mins = mins * 60;
                  
                  // Compute final coordinates
                  let lat = 0, lon = 0;
                  if(logState.coordType === 'Decimal') { 
                    lat = Math.abs(parseFloat(logState.latDec||0)) * (logState.latDecDir==='S'?-1:1); 
                    lon = Math.abs(parseFloat(logState.lonDec||0)) * (logState.lonDecDir==='E'?1:-1); 
                  } else if(logState.coordType === 'DMS') { 
                    lat = (parseFloat(logState.latDMS.d||0)+parseFloat(logState.latDMS.m||0)/60+parseFloat(logState.latDMS.s||0)/3600)*(logState.latDMS.dir==='S'?-1:1); 
                    lon = (parseFloat(logState.lonDMS.d||0)+parseFloat(logState.lonDMS.m||0)/60+parseFloat(logState.lonDMS.s||0)/3600)*(logState.lonDMS.dir==='W'?-1:1); 
                  }
                  let finalCoords = logState.coordType === 'Decimal' ? `${lat}, ${lon}` : `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                  
                  const finalState = {
                      ...logState,
                      picUsername: customUser.username,
                      flightTimeMinutes: mins, // Used by FAA report calc
                      coordinates: finalCoords,
                      finalLat: lat,
                      finalLon: lon,
                      whatWasTreated: finalCrop,
                      customer: c,
                      chemical: p
                  };
                  genericSubmit(e, 'flight_logs', finalState, setLogState, defaultLogState, "Mission Logged");
                }} 
                onCancel={() => setLogState({...defaultLogState, isEditing: false})} onDelete={deleteItem} kmlRef={kmlInputRef} 
                handleKml={(e) => {
                   const file = e.target.files[0];
                   if (!file) return;
                   const r = new FileReader();
                   r.onload = (ev) => setLogState(p => ({...p, kmlData: ev.target.result, kmlFileName: file.name}));
                   r.readAsText(file);
                }}
              />
            )}
          </main>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
